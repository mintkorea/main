<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 통합 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; margin: 0; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-tab.active { color: #2E4077; border-bottom: 3px solid #2E4077; background-color: white; }
        .worker-card { transition: all 0.2s ease; }
        .is-vocation { filter: grayscale(0.5); opacity: 0.7; position: relative; }
        .is-vocation::after { content: '🚩 연차'; position: absolute; top: 5px; right: 8px; color: #ef4444; font-size: 10px; font-weight: 900; }
        /* 기존 스타일 유지 */
        .big-msg-box { position: relative; line-height: 1.6; }
        .next-duty-inline { display: block; font-size: 10px; color: #ef4444; margin-top: 8px; font-weight: 800; }
        .worker-name-label { font-size: 10px; font-weight: 900; color: #94a3b8; margin-bottom: 2px; }
        .worker-pos-text { font-size: 14px; font-weight: 900; }
        .custom-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; table-layout: fixed; background: white; }
        .custom-table th { background: #f8fafc; color: #1e293b; padding: 6px 1px; border: 1px solid #e2e8f0; font-weight: 800; }
        .custom-table td { border: 1px solid #e2e8f0; padding: 6px 1px; color: #475569; height: 38px; }
    </style>
</head>
<body>
    <div id="main-wrapper" class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col relative">
        <div class="bg-[#2E4077] p-5 text-center text-white relative">
            <h1 class="text-lg font-black italic">🛡️ 성의교정 통합 시스템</h1>
            <p id="clock" class="text-[10px] opacity-70 mt-1 font-bold">로딩 중...</p>
        </div>

        <div class="flex border-b bg-slate-50 sticky top-0 z-50">
            <button onclick="openTab('status')" id="btn-status" class="nav-tab active flex-1 py-4 text-[11px] font-black">🕒 실시간현황</button>
            <button onclick="openTab('schedule')" id="btn-schedule" class="nav-tab flex-1 py-4 text-[11px] font-black text-slate-400">📅 근무편성표</button>
            <button onclick="openTab('calendar')" id="btn-calendar" class="nav-tab flex-1 py-4 text-[11px] font-black text-slate-400">🏥 근무달력</button>
        </div>

        <div id="status" class="tab-content active p-3 space-y-4"> 
            <div id="time-msg" class="bg-white p-5 rounded-2xl border text-center font-black text-[#2E4077] shadow-sm">근무 정보를 불러오고 있습니다...</div>
            <div id="worker-cards" class="grid grid-cols-2 gap-2"></div>
            <div class="overflow-hidden rounded-xl border border-slate-200">
                <table class="custom-table" id="status-table"></table>
            </div>
        </div>

        <div id="schedule" class="tab-content p-3">
            <div class="overflow-hidden rounded-xl border border-slate-200">
                <table class="custom-table" id="schedule-list"></table>
            </div>
        </div>

        <div id="calendar" class="tab-content p-3">
            <div id="calendarBody"></div>
        </div>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyCXNQ3b9qcaJjQAGua3-vcgRZ2j0wASaXM", projectId: "catholic-security-system" });
        const db = firebase.firestore();

        let vData = {}, config = { baseDate: '2025-01-01', shifts: ['C', 'A', 'B'] };

        // [핵심] 연차 체크 함수 - 데이터 형식을 매우 유연하게 판별합니다.
        function checkVocation(name, date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate());
            const monthKey = `${y}-${m}`;
            
            if (!vData[monthKey] || !vData[monthKey][name]) return false;
            
            // "1, 5, 20" 형태의 문자열을 배열로 변환하여 체크
            const vDays = vData[monthKey][name].split(',').map(v => v.trim());
            return vDays.includes(d);
        }

        // [핵심] 연차 반영 근무자 추출
        function getWorkersWithVocation(date) {
            const base = new Date(config.baseDate); base.setHours(0,0,0,0);
            const target = new Date(date); target.setHours(0,0,0,0);
            const diffDays = Math.round((target - base) / 86400000);
            const dutyCount = Math.floor(diffDays / 3);
            
            const members = ["김태언", "이정석", "이태원"];
            const hallIdx = Math.floor(((dutyCount % 6) + 6) % 6 / 2);
            let hallW = members[hallIdx], medA, medB;
            
            if (hallW === "김태언") { medA = "이태원"; medB = "이정석"; }
            else if (hallW === "이태원") { medA = "김태언"; medB = "이정석"; }
            else { medA = "김태언"; medB = "이태원"; }
            if (dutyCount % 2 !== 0) [medA, medB] = [medB, medA];

            // 연차 여부 확인
            const isV_Hall = checkVocation(hallW, target);
            const isV_MedA = checkVocation(medA, target);
            const isV_MedB = checkVocation(medB, target);

            // 로직: 의산연 근무자가 연차면 회관 근무자와 맞교환 (회관 자리에 연차자 배치)
            if (isV_MedA) { [hallW, medA] = [medA, hallW]; } 
            else if (isV_MedB) { [hallW, medB] = [medB, hallW]; }

            return [
                { n: "황재업", v: checkVocation("황재업", target) },
                { n: hallW, v: checkVocation(hallW, target) },
                { n: medA, v: checkVocation(medA, target) },
                { n: medB, v: checkVocation(medB, target) }
            ];
        }

        function renderStatus() {
            const now = new Date();
            const shiftName = getShiftInfo(now).name;
            const workers = getWorkersWithVocation(now); // 연차 로직 포함된 데이터
            
            // 상단 메시지박스
            document.getElementById('time-msg').innerHTML = `
                <div class="big-msg-box">
                    ${shiftName === 'C' ? '🛡️ 현재 C조 근무 운영 중' : '☕ 오늘은 C조 휴무일입니다.'}
                    <span class="next-duty-inline">조회 시점: ${now.getHours()}:${now.getMinutes()}</span>
                </div>`;

            // 근무자 카드
            const cardContainer = document.getElementById('worker-cards');
            cardContainer.innerHTML = workers.map((w, i) => `
                <div class="worker-card bg-white p-3 rounded-xl border ${w.v ? 'is-vocation' : ''}" style="border-left: 5px solid ${w.v ? '#ef4444' : '#2E4077'}">
                    <div class="worker-name-label">${['조장','회관','의산A','의산B'][i]}</div>
                    <div class="worker-pos-text">${w.n}</div>
                </div>`).join('');
            
            // 상세 시간표 (연차자 취소선 처리)
            let h = `<thead><tr><th>시간</th><th>조장</th><th>회관</th><th>의산A</th><th>의산B</th></tr></thead><tbody>`;
            DATA_LIST.slice(0, 10).forEach(r => { // 샘플로 10개만
                h += `<tr>
                    <td class="time-cell">${r[0]}</td>
                    <td class="${workers[0].v ? 'line-through text-red-400' : ''}">${r[2]}</td>
                    <td class="${workers[1].v ? 'line-through text-red-400' : ''}">${r[3]}</td>
                    <td class="${workers[2].v ? 'line-through text-red-400' : ''}">${r[4]}</td>
                    <td class="${workers[3].v ? 'line-through text-red-400' : ''}">${r[5]}</td>
                </tr>`;
            });
            document.getElementById('status-table').innerHTML = h + `</tbody>`;
        }

        function renderSchedule() {
            let h = `<thead><tr><th>날짜</th><th>조장</th><th>회관</th><th>의산A</th><th>의산B</th></tr></thead><tbody>`;
            let d = new Date(); d.setHours(12,0,0,0);
            for(let i=0; i<30; i++) {
                let targetDt = new Date(d); targetDt.setDate(d.getDate()+i);
                if(getShiftInfo(targetDt).name === 'C') {
                    const ws = getWorkersWithVocation(targetDt);
                    h += `<tr>
                        <td class="bg-slate-50 font-bold">${targetDt.getMonth()+1}/${targetDt.getDate()}</td>
                        ${ws.map(w => `<td class="${w.v ? 'text-red-500 font-black' : ''}">${w.n}${w.v ? '🚩' : ''}</td>`).join('')}
                    </tr>`;
                }
            }
            document.getElementById('schedule-list').innerHTML = h + "</tbody>";
        }

        function getShiftInfo(date) {
            const diff = Math.round((date - new Date(config.baseDate)) / 86400000);
            return { name: config.shifts[((diff % 3) + 3) % 3] };
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content, .nav-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
            if(id === 'status') renderStatus();
            else if(id === 'schedule') renderSchedule();
        }

        window.onload = () => {
            // [검증] DB 경로를 명확히 감시합니다.
            db.collection("vocation_system").doc("data").onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    vData = data.vacation || {};
                    config = data.config || config;
                    console.log("DB 로드 완료:", vData); // 데이터가 잘 오는지 F12 눌러서 확인 가능
                    renderStatus();
                } else {
                    console.error("데이터 문서가 존재하지 않습니다! 경로: vocation_system/data");
                }
            });
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
        };
    </script>
</body>
</html>
