        // к·јл¬ҙ лЎңм§Ғ л°Ҹ нғӯ1 л ҢлҚ”л§Ғ (team03-нғӯ1 лЎңм§ҒмңјлЎң м „л©ҙ көҗмІҙ)
        function getShiftInfo(date) {
            const base = new Date(config.baseDate); base.setHours(0,0,0,0);
            const target = new Date(date); target.setHours(0,0,0,0);
            const diff = Math.round((target - base) / 86400000);
            const sName = config.shifts[((diff % config.shifts.length) + config.shifts.length) % config.shifts.length];
            return { name: sName, colors: config.colors[sName] || ['#f1f5f9', '#64748b'] };
        }

        function getNextCDate(date) {
            let d = new Date(date); d.setHours(12,0,0,0);
            for (let i = 0; i <= 7; i++) {
                if (getShiftInfo(d).name === 'C') return d;
                d.setDate(d.getDate() + 1);
            }
            return d;
        }

/* мЈјмӢ  нҢҢмқјмқҳ <script> л¶Җл¶„ мӨ‘ getWorkers н•ЁмҲҳл§Ң м•„лһҳ лӮҙмҡ©мңјлЎң көҗмІҙн•ҳкұ°лӮҳ, 
   м•„лһҳ м „мІҙ мҪ”л“ңлҘј мғҲ нҢҢмқјлЎң м ҖмһҘн•ҳм„ёмҡ”. */

        function getWorkers(date) {
            const base = new Date(config.baseDate); base.setHours(0,0,0,0);
            const targetDt = new Date(date); targetDt.setHours(0,0,0,0);
            const diffDays = Math.round((targetDt - base) / 86400000);
            const dutyCount = Math.floor(diffDays / 3);
            
            // 1. кё°ліё мҲңлІҲ кІ°м • (м„ мһ„ мҲңм„ң л°ҳмҳҒ: к№Җнғңм–ё, мқҙнғңмӣҗ, мқҙм •м„қ)
            // мӮ¬мҡ©мһҗлӢҳмқҳ мҲҳм • мҡ”мІӯ мӮ¬н•ӯм—җ л§һм¶° members мҲңм„ңлҘј мЎ°м •н–ҲмҠөлӢҲлӢӨ.
            const members = ["к№Җнғңм–ё", "мқҙм •м„қ", "мқҙнғңмӣҗ"];
            const hallIdx = Math.floor(((dutyCount % 6) + 6) % 6 / 2);
            let hallWorker = members[hallIdx];
            let medA, medB;
            
            if (hallWorker === "к№Җнғңм–ё") { medA = "мқҙнғңмӣҗ"; medB = "мқҙм •м„қ"; }
            else if (hallWorker === "мқҙнғңмӣҗ") { medA = "к№Җнғңм–ё"; medB = "мқҙм •м„қ"; }
            else { medA = "к№Җнғңм–ё"; medB = "мқҙнғңмӣҗ"; }
            
            if (dutyCount % 2 !== 0) [medA, medB] = [medB, medA];

            // 2. нҢҢмқҙм–ҙлІ мқҙмҠӨ м—°м°Ё лҚ°мқҙн„° нҷ•мқё
            const y = targetDt.getFullYear();
            const m = String(targetDt.getMonth() + 1).padStart(2, '0');
            const d = String(targetDt.getDate());
            const dailyVocs = vData[`${y}-${m}`] || {};

            const isV = (name) => {
                if (!dailyVocs[name]) return false;
                return dailyVocs[name].split(',').map(v => v.trim()).includes(d);
            };

            // 3. н•өмӢ¬ лЎңм§Ғ: м—°м°ЁмһҗлҠ” л¬ҙмЎ°кұҙ 'нҡҢкҙҖ' мһҗлҰ¬м—җ кі м • (л§һкөҗнҷҳ)
            // мқҳмӮ°м—°Aк°Җ м—°м°Ёл©ҙ нҡҢкҙҖ к·јл¬ҙмһҗмҷҖ мһҗлҰ¬лҘј л°”кҝҲ
            if (isV(medA)) {
                [hallWorker, medA] = [medA, hallWorker];
            } 
            // мқҳмӮ°м—°Bк°Җ м—°м°Ёл©ҙ нҡҢкҙҖ к·јл¬ҙмһҗмҷҖ мһҗлҰ¬лҘј л°”кҝҲ
            else if (isV(medB)) {
                [hallWorker, medB] = [medB, hallWorker];
            }
            // нҡҢкҙҖ к·јл¬ҙмһҗк°Җ м—°м°Ёл©ҙ ліёмқё мһҗлҰ¬лҘј к·ёлҢҖлЎң мң м§Җ

            return ["нҷ©мһ¬м—…", hallWorker, medA, medB];
        }

        function renderStatus() {
            const now = new Date();
            const hr = now.getHours();
            const min = now.getMinutes();
            const realMin = hr * 60 + min;

            const todayShift = getShiftInfo(now).name;
            const yesterdayShift = getShiftInfo(new Date(now.getTime() - 86400000)).name;

            let mainMsg = "", showCards = false, isHighlight = false, targetDate = now;
            const isBefore7 = realMin < 420;

            if (todayShift === 'C') {
                targetDate = now;
                if (isBefore7) {
                    mainMsg = (realMin < 390) ? "рҹ—“пёҸ мҳӨлҠҳ к·јл¬ҙ мҳҲм •мһ…лӢҲлӢӨ.<br>м—¬мң  мһҲкІҢ мӨҖл№„н•ҳм„ёмҡ”." : "рҹӣЎпёҸ кі§ к·јл¬ҙ нҲ¬мһ…мһ…лӢҲлӢӨ.<br>ліөмһҘ л°Ҹ мһҘл№„лҘј м җкІҖн•ҳм„ёмҡ”.";
                    showCards = (realMin >= 390);
                } else {
                    showCards = true; isHighlight = true;
                    if (realMin < 540) mainMsg = "рҹҢ… мўӢмқҖ м•„м№Ёмһ…лӢҲлӢӨ. к·јл¬ҙлҘј мӢңмһ‘н•©лӢҲлӢӨ.";
                    else if (realMin < 660) mainMsg = "рҹӣЎпёҸ к·јл¬ҙ мӨ‘мһ…лӢҲлӢӨ. м•Ҳм „м—җ мң мқҳн•ҳм„ёмҡ”.";
                    else if (realMin < 780) mainMsg = "рҹҚұ м җмӢ¬мӢңк°„мһ…лӢҲлӢӨ.";
                    else if (realMin < 960) mainMsg = "рҹӣЎпёҸ мҳӨнӣ„ к·јл¬ҙ мӨ‘мһ…лӢҲлӢӨ.";
                    else if (realMin < 1200) mainMsg = "рҹҢҷ м Җл…Ғ мӢңк°„мһ…лӢҲлӢӨ.";
                    else mainMsg = "рҹҢҢ м•јк°„ к·јл¬ҙ мӨ‘мһ…лӢҲлӢӨ.";
                }
            } else if (yesterdayShift === 'C' && isBefore7) {
                showCards = true; isHighlight = true; targetDate = new Date(now.getTime() - 86400000);
                if (realMin < 380) mainMsg = "рҹӣЎпёҸ м•јк°„ к·јл¬ҙ мӨ‘мһ…лӢҲлӢӨ. м•Ҳм „м—җ мң мқҳн•ҳм„ёмҡ”.";
                else if (realMin < 400) mainMsg = "рҹ‘Ӣ к·јл¬ҙ л§Ҳл¬ҙлҰ¬ мӨ‘мһ…лӢҲлӢӨ.";
                else mainMsg = "рҹӨқ к·јл¬ҙ көҗлҢҖ мӨ‘мһ…лӢҲлӢӨ.";
            } else {
                mainMsg = "вҳ• нңҙл¬ҙмқјмһ…лӢҲлӢӨ. нҺём•Ҳн•ҳкІҢ мү¬м„ёмҡ”.";
                showCards = false; targetDate = getNextCDate(now);
            }

            const nextC = getNextCDate(now);
            document.getElementById('time-msg').innerHTML = `<div class="big-msg-box">${mainMsg}<span class="next-duty-inline">рҹ“… лӢӨмқҢ к·јл¬ҙ: ${nextC.getMonth()+1}мӣ” ${nextC.getDate()}мқј</span></div>`;

            const workers = getWorkers(targetDate);
            const logicNowMin = hr < 7 ? realMin + 1440 : realMin;
            let currentIdx = -1;
            if (isHighlight) {
                DATA_LIST.forEach((r, i) => {
                    let [sH, sM] = r[0].split(':').map(Number);
                    let sT = (sH < 7 ? sH * 60 + sM + 1440 : sH * 60 + sM);
                    let [eH, eM] = r[1].split(':').map(Number);
                    let eT = (eH < 7 && r[1] !== "07:00") ? (eH * 60 + eM + 1440) : (eH === 7 ? 1860 : eH * 60 + eM);
                    if (logicNowMin >= sT && logicNowMin < eT) currentIdx = i;
                });
            }

            const cardsContainer = document.getElementById('worker-cards');
            cardsContainer.style.display = showCards ? 'grid' : 'none';

            workers.forEach(w => { h += `<th style="background-color:${WORKER_COLORS[w]?.toneUp}">${w}</th>`; });

            DATA_LIST.forEach((r, i) => {
                if (i >= startIdx || isFullTable) {

                    h += `<tr ${isNow ? 'style="background:#fff7ed; outline:2px solid #ef4444; font-weight:bold;"' : ''}><td class="time-cell">${r[0]}~${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td></tr>`;

        // --- нғӯ 2: к·јл¬ҙ нҺём„ұн‘ң лЎңм§Ғ ---
        function updateScheduleRange(val) { scheduleMonthRange = val; renderSchedule(); }
        function renderSchedule() {
            const focus = document.getElementById('worker-focus').value;
            const weekDays = ['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];
            let h = `<thead><tr><th>лӮ м§ң</th><th>мЎ°мһҘ</th><th>нҡҢкҙҖ</th><th>мқҳмӮ°м—°A</th><th>мқҳмӮ°м—°B</th></tr></thead><tbody>`;
    
            let startDate = new Date();
            startDate.setHours(12, 0, 0, 0); // лӮ м§ң кі„мӮ° мҳӨм°Ё л°©м§Җ
    
            let totalDays = 0;

            // scheduleMonthRangeк°Җ мқҢмҲҳл©ҙ кіјкұ° Nк°ңмӣ” м „л¶Җн„° мҳӨлҠҳк№Ңм§Җ, м–‘мҲҳл©ҙ мҳӨлҠҳл¶Җн„° лҜёлһҳк№Ңм§Җ
            if (scheduleMonthRange < 0) {
                startDate.setMonth(startDate.getMonth() + scheduleMonthRange);
                const today = new Date();
                today.setHours(12, 0, 0, 0);
                // мӢңмһ‘мқјл¶Җн„° мҳӨлҠҳк№Ңм§Җмқҳ мҙқ мқјмҲҳ кі„мӮ°
               totalDays = Math.round((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
            } else {
                totalDays = scheduleMonthRange * 31;
            }

            const todayStr = new Date().toDateString();

            for (let i = 0; i < totalDays; i++) {
                let d = new Date(startDate);
                d.setDate(startDate.getDate() + i);
        
                // CмЎ°мқё лӮ м§ңл§Ң н–үмңјлЎң мғқм„ұ
                if (getShiftInfo(d).name === 'C') {
                    const ws = getWorkers(d);
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const ds = String(d.getDate());
                    const dayIdx = d.getDay();
            
                    // мҳӨлҠҳ лӮ м§ңмқё кІҪмҡ° к°•мЎ° (кіјкұ° лӘ©лЎқ ліј л•Ң мң мҡ©н•Ё)
                    const isToday = d.toDateString() === todayStr;
                    const rowStyle = isToday ? 'style="background-color: #fff7ed; outline: 2px solid #fdba74;"' : '';
            
                    const holidayList = config.holidays[`${y}-${m}`] || [];
                    let dateColorClass = (dayIdx === 0 || holidayList.includes(parseInt(ds))) ? "text-red-500" : (dayIdx === 6 ? "text-blue-500" : "text-slate-800");
            
                    const mv = vData[`${y}-${m}`] || {};
                    h += `<tr ${rowStyle}><td class="font-black bg-slate-50 ${dateColorClass}">${d.getMonth() + 1}/${d.getDate()}(${weekDays[dayIdx]})</td>`;
            
                    ws.forEach(w => {
                        const isV = mv[w] && mv[w].split(',').map(v => v.trim()).includes(ds);
                        // мқёлҚұмҠӨ м•Ҳм „ м ‘к·јмқ„ мң„н•ҙ ? мӮ¬мҡ©
                        const bgColor = w === focus ? WORKER_COLORS[w]?.bg : WORKER_COLORS[w]?.toneUp;
                        const textColor = w === focus ? 'white' : 'black';
                        h += `<td style="background:${bgColor}; color:${textColor}">${w}${isV ? 'рҹҡ©' : ''}</td>`;
                    });
                    h += "</tr>";
                }
            }
            document.getElementById('schedule-list').innerHTML = h + "</tbody>";
        }

        // --- нғӯ 3: лӢ¬л Ҙ лЎңм§Ғ ---
        function getSortedDayVocs(y, m, d) {
            const key = `${y}-${String(m+1).padStart(2,'0')}`;
            let list = [];
            if(vData[key]) {
                for(let name in vData[key]) {
                    if(vData[key][name].split(',').includes(String(d))) {
                        const info = staffData.find(s => s.n === name) || { g: 'кё°нғҖ', s: '?' };
                        list.push({ name, g: info.g, s: info.s });
                    }
                }
            }
            return list.sort((a, b) => (a.g.includes('м„ұмқҳ') ? -1 : 1));
        }

        function createGrid(year, month) {
            const grid = document.createElement('div'); grid.className = 'calendar-grid';
            ['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '].forEach(d => grid.innerHTML += `<div class="text-center font-bold text-[10px] py-2 bg-slate-50 border-b text-slate-400">${d}</div>`);
            const first = new Date(year, month, 1).getDay(), last = new Date(year, month+1, 0).getDate();
            const targetS = document.getElementById('shiftSelect').value;
            const todayStr = new Date().toDateString();
            for (let i=0; i<first; i++) grid.innerHTML += `<div class="calendar-cell bg-slate-50/50"></div>`;
            for (let d=1; d<=last; d++) {
                const dt = new Date(year, month, d), sInfo = getShiftInfo(dt), isH = (targetS === sInfo.name);
                const isToday = dt.toDateString() === todayStr;
                const holidayList = config.holidays[`${year}-${String(month+1).padStart(2,'0')}`] || [];
                const isHoliday = holidayList.includes(d);
                const dayVocs = getSortedDayVocs(year, month, d);
                const cell = document.createElement('div');
                cell.className = `calendar-cell ${isToday ? 'is-today' : ''} ${isH ? 'is-highlighted' : ''}`;
                if(isH) cell.style.backgroundColor = sInfo.colors[1];
                cell.innerHTML = `<div class="date-area ${dt.getDay()===0 || isHoliday ? 'text-red-500' : ''} ${isH ? 'text-white' : ''}">
                        <span>${d}</span><div class="dot-container">
                            ${dayVocs.some(v=>v.g.includes("м„ұмқҳ")) ? '<div class="v-dot dot-sung"></div>' : ''}
                            ${dayVocs.some(v=>v.g.includes("мҳҙлӢҲ")) ? '<div class="v-dot dot-omni"></div>' : ''}
                        </div></div>
                    <div class="shift-area" style="background:${isH?'transparent':sInfo.colors[0]}; color:${isH?'white':sInfo.colors[1]}">${sInfo.name}</div>`;
                if(dayVocs.length > 0) cell.onclick = () => showDetail(`${month+1}мӣ” ${d}мқј м—°м°Ёмһҗ`, dayVocs);
                grid.appendChild(cell);
            }
            return grid;
        }

        function renderCalendar() {
            document.getElementById('monthTitle').innerText = `${currentYear}л…„ ${currentMonth + 1}мӣ”`;
            const body = document.getElementById('calendarBody'); body.innerHTML = '';
            body.appendChild(createGrid(currentYear, currentMonth));
            const mv = document.getElementById('multiView'); mv.innerHTML = '';
            if(viewMode === 'multi') {
                for(let i=0; i<6; i++) {
                    const d = new Date(currentYear, currentMonth + i, 1);
                    const wrap = document.createElement('div'); wrap.className = "bg-white rounded-2xl shadow-sm border overflow-hidden p-2";
                    wrap.innerHTML = `<div class="text-center font-black text-xs mb-2">${d.getFullYear()}л…„ ${d.getMonth()+1}мӣ”</div>`;
                    wrap.appendChild(createGrid(d.getFullYear(), d.getMonth()));
                    mv.appendChild(wrap);
                }
            }
        }

        function renderFloatingList() {
    const container = document.getElementById('listContent');
    const showAll = document.getElementById('showAllCheck').checked;
    if (!container) return;
    
    container.innerHTML = '';
    const now = new Date();
    now.setHours(0,0,0,0);
    
    // м„ нғқлҗң мӣ”мқҳ л§Ҳм§Җл§ү лӮ м§ң кі„мӮ°
    const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
    
    for (let d = 1; d <= lastDate; d++) {
        const targetDate = new Date(currentYear, currentMonth, d);
        if (!showAll && targetDate < now) continue;

        const vocs = getSortedDayVocs(currentYear, currentMonth, d);
        if (vocs.length > 0) {
            const sInfo = getShiftInfo(targetDate);
            const item = document.createElement('div');
            // к°ҖлЎң н•ң мӨ„ л Ҳмқҙм•„мӣғ м Ғмҡ©
            item.className = "flex items-center gap-2 p-3 bg-white border rounded-2xl shadow-sm mb-2";
            
            let html = `
                <div class="text-[12px] font-black text-slate-700 whitespace-nowrap min-w-[55px]">
                    ${currentMonth + 1}/${d} (${['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '][targetDate.getDay()]})
                </div>
                <div class="px-2 py-0.5 rounded text-[10px] font-black text-white" style="background-color:${sInfo.colors[1]}">
                    ${sInfo.name}
                </div>
                <div class="flex flex-wrap gap-1 items-center">
            `;
            
            vocs.forEach(v => {
                const isSung = v.g.includes('м„ұмқҳ');
                html += `
                    <div class="flex items-center gap-1">
                        <span class="px-1.5 py-0.5 rounded text-[8px] font-bold text-white ${isSung ? 'bg-purple-500' : 'bg-orange-500'}">
                            ${isSung ? 'м„ұмқҳнҡҢкҙҖ' : 'мҳҙлӢҲлІ„мҠӨ'}
                        </span>
                        <span class="text-[12px] font-bold text-slate-700">${v.name}</span>
                    </div>
                `;
            });
            
            item.innerHTML = html + `</div>`;
            container.appendChild(item);
        }
    }
}

        function saveAdminSettings() {
            const rows = document.querySelectorAll('.pattern-row');
            let ns = []; let nc = {};
            rows.forEach(r => {
                const n = r.querySelector('.r-name').value.trim().toUpperCase();
                if(n) { ns.push(n); nc[n] = [r.querySelector('.r-bg').value, r.querySelector('.r-point').value]; }
            });
            const hYear = document.getElementById('holidayYear').value, hMonth = document.getElementById('holidayMonth').value;
            const hDays = document.getElementById('holidayDays').value.split(',').map(d => parseInt(d.trim())).filter(d => !isNaN(d));
            config.holidays[`${hYear}-${String(hMonth).padStart(2,'0')}`] = hDays;
            const newPw = document.getElementById('adminPwInput').value.trim();
            if(newPw) config.adminPw = newPw;
            config.shifts = ns; config.colors = nc; config.baseDate = document.getElementById('baseDateInput').value;
            db.collection("vocation_app").doc("config").set(config); 
            updateShiftSelector(); renderCalendar(); closeModal('adminModal'); alert("м ҖмһҘлҗҳм—ҲмҠөлӢҲлӢӨ.");
        }
        function updateShiftSelector() {
            const sel = document.getElementById('shiftSelect');
            sel.innerHTML = '<option value="none">мЎ°лі„ к°•мЎ° м„ нғқ</option>';
            config.shifts.forEach(s => sel.innerHTML += `<option value="${s}">${s}мЎ° н•ҳмқҙлқјмқҙнҠё</option>`);
        }

        window.onload = () => {
            updateShiftSelector();
            db.collection("vocation_app").doc("config").get().then(doc => { if(doc.exists) { config = {...config, ...doc.data()}; updateShiftSelector(); } });
            db.collection("vocation_app").doc("data").onSnapshot(doc => { if(doc.exists) { vData = doc.data().vocation || {}; staffData = doc.data().staff || []; // нғӯ1мқ„ м—ҙл©ҙм„ң кҙҖл Ё лҚ°мқҙн„°лҘј лӘЁл‘җ л ҢлҚ”л§Ғн•ҳлҸ„лЎқ к°•м ң нҳём¶ң
        openTab('status'); } });
            setInterval(() => { 
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleString(); 
                if(document.getElementById('status').classList.contains('active')) renderStatus();
            }, 1000);
        };
    </script>
</body>
