<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 주간식단</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .tab-transition { transition: all 0.2s ease-in-out; }
        .menu-main-style { letter-spacing: -0.03em !important; word-break: keep-all; font-size: 1.5rem; line-height: 2rem; }
        .status-pill { display: flex; align-items: center; gap: 4px; padding: 0 8px; border-radius: 6px; border: 1px solid #e2e8f0; background: white; height: 32px; }
        .status-dot { width: 5px; height: 5px; border-radius: 50%; }
        .dot-online { background-color: #10B981; box-shadow: 0 0 4px #10B981; }
        .dot-offline { background-color: #EF4444; box-shadow: 0 0 4px #EF4444; }
        .dot-sync { background-color: #F59E0B; box-shadow: 0 0 4px #F59E0B; }
        .menu-card-custom { background-color: white; border-radius: 0 0 2rem 2rem; border-top-width: 7px; border-right-width: 2px; border-bottom-width: 2px; border-left-width: 2px; border-style: solid; }
        .btn-nav-custom { height: 32px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; }
    </style>
</head>
<body class="text-slate-800">
    <div id="app" class="max-w-2xl mx-auto flex flex-col items-center p-2 pt-3 pb-20">
        <div id="header" class="w-full bg-[#EEF2F6] rounded-2xl p-4 flex flex-col mb-3 border border-slate-200 shadow-sm items-center">
            <div class="flex items-center gap-2 mb-1">
                <h1 class="text-lg font-black text-[#1E3A5F] tracking-tighter">성의교정 주간식단</h1>
                <span id="shiftBadge" class="text-white text-[10px] px-2 py-0.5 rounded-md font-black shadow-sm tracking-tight">--</span>
            </div>
            <div class="relative flex items-center">
                <span id="dateDisplay" class="font-black text-slate-600 text-xl tracking-tight cursor-pointer">날짜 로딩...</span>
            </div>
        </div>

        <div class="w-full flex items-center justify-between mb-3 px-1">
            <div id="statusPill" class="status-pill">
                <span id="statusDot" class="status-dot dot-offline"></span>
                <span id="statusText" class="text-[9px] font-black text-slate-400 uppercase tracking-tight">WAITING</span>
            </div>
            <div class="flex gap-1.5">
                <button onclick="changeDate(-1)" class="btn-nav-custom bg-white border border-slate-300 rounded-lg px-3">← PREV</button>
                <button onclick="goToday()" class="btn-nav-custom bg-white border border-slate-300 rounded-lg px-4 text-[#1E3A5F]">TODAY</button>
                <button onclick="changeDate(1)" class="btn-nav-custom bg-white border border-slate-300 rounded-lg px-3">NEXT →</button>
            </div>
        </div>

        <div id="tabs-container" class="grid grid-cols-5 w-full"></div>
        <div id="menu-card" class="w-full menu-card-custom min-h-[250px] flex flex-col shadow-sm">
            <div class="flex-grow flex flex-col justify-center items-center text-center p-6">
                <h2 id="main-menu" class="font-black mb-3 menu-main-style"></h2>
                <p id="sub-menu" class="text-slate-600 font-bold text-base md:text-lg"></p>
            </div>
            <div class="px-6 py-4 bg-slate-50 border-t flex justify-center gap-2">
                <p id="comment-text" class="text-sm font-bold text-slate-500"></p>
            </div>
        </div>

        <div class="w-full mt-10 p-6 bg-white rounded-2xl border-2 border-dashed border-slate-200">
            <h3 class="text-sm font-black text-slate-500 mb-4 flex items-center gap-2">
                🚀 식단표 이미지 자동 등록 (Gemini AI)
            </h3>
            <div class="flex flex-col gap-3">
                <input type="file" id="imageInput" accept="image/*" class="text-xs text-slate-500 file:bg-blue-50 file:text-blue-700 file:border-0 file:rounded-lg file:px-4 file:py-2">
                <button id="uploadBtn" onclick="handleUpload()" class="w-full bg-[#1E3A5F] text-white font-black py-3 rounded-xl shadow-lg active:scale-95 transition-all">
                    이미지 데이터 추출하기
                </button>
                <p id="uploadStatus" class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest"></p>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "당신의_GAS_웹앱_URL";
        let allData = {}; let currentDate = new Date(); let activeTab = "중식";
        const MEAL_ORDER = ["조식", "간편식", "중식", "석식", "야식"];

        // 1. 데이터 로드 (기존 로직)
        async function loadData() {
            try {
                const res = await fetch(GAS_URL + "?t=" + new Date().getTime());
                allData = await res.json();
                document.getElementById('statusDot').className = "status-dot dot-online";
                document.getElementById('statusText').innerText = "ON(SYNCED)";
                updateUI();
            } catch (e) { console.error(e); }
        }

        // 2. 이미지 업로드 처리 (새로 추가된 로직)
        async function handleUpload() {
            const input = document.getElementById('imageInput');
            const status = document.getElementById('uploadStatus');
            const btn = document.getElementById('uploadBtn');

            if (!input.files.length) { alert("이미지를 먼저 선택해주세요."); return; }

            btn.disabled = true; btn.innerText = "Gemini가 분석 중..."; status.innerText = "잠시만 기다려주세요...";

            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const base64 = reader.result.split(',')[1];
                try {
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ base64: base64, mimeType: file.type })
                    });
                    const result = await res.json();
                    if (result.result === "success") {
                        alert(`${result.count}개의 식단 정보가 추가되었습니다!`);
                        location.reload();
                    } else { alert("오류: " + result.error); }
                } catch (e) { alert("통신 실패"); }
                finally { btn.disabled = false; btn.innerText = "이미지 데이터 추출하기"; }
            };
            reader.readAsDataURL(file);
        }

        // UI 업데이트 등 기타 함수 (기존 소스와 동일)
        function updateUI() {
            const y = currentDate.getFullYear(), m = currentDate.getMonth() + 1, d = currentDate.getDate();
            const dateKey = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            document.getElementById('dateDisplay').innerText = dateKey;

            const tabsContainer = document.getElementById('tabs-container');
            tabsContainer.innerHTML = '';
            MEAL_ORDER.forEach(meal => {
                const btn = document.createElement('button');
                btn.innerText = meal;
                btn.className = `py-3 text-[11px] font-black ${meal===activeTab?'bg-blue-600 text-white':'bg-slate-100'}`;
                btn.onclick = () => { activeTab = meal; updateUI(); };
                tabsContainer.appendChild(btn);
            });

            const dayData = allData[dateKey] || {};
            const info = dayData[activeTab] || { menu: "정보 없음", side: "-", comment: "데이터를 등록해주세요." };
            document.getElementById('main-menu').innerText = info.menu;
            document.getElementById('sub-menu').innerText = info.side;
            document.getElementById('comment-text').innerText = info.comment;
        }

        function changeDate(n) { currentDate.setDate(currentDate.getDate() + n); updateUI(); }
        function goToday() { currentDate = new Date(); updateUI(); }
        window.onload = loadData;
    </script>
</body>
</html>
