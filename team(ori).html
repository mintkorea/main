<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 통합 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; margin: 0; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-tab.active { color: #2E4077; border-bottom: 3px solid #2E4077; background-color: white; }
        .big-msg-box { position: relative; line-height: 1.6; }
        .next-duty-inline { display: block; font-size: 10px; color: #ef4444; margin-top: 8px; font-weight: 800; }
        .worker-name-label { font-size: 10px; font-weight: 900; color: #94a3b8; margin-bottom: 2px; }
        .worker-pos-text { font-size: 14px; font-weight: 900; }
        .time-cell { background-color: #f8fafc; font-weight: bold; color: #1e293b; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid #e2e8f0; background: white; border-radius: 12px; overflow: hidden; }
        .calendar-cell { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; position: relative; cursor: pointer; min-height: 85px; }
        .date-area { height: 38px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; z-index: 10; position: relative; }
        .is-highlighted .date-area { background-color: rgba(255, 255, 255, 0.2); }
        .shift-area { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; z-index: 5; }
        .is-today { border: 2.5px solid #ef4444 !important; z-index: 50; }
        .is-today::before { content: 'TODAY'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 1px 5px; border-radius: 4px; z-index: 60; }
        .dot-container { display: flex; gap: 2px; justify-content: center; height: 6px; margin-top: 2px; }
        .v-dot { width: 5px; height: 5px; border-radius: 50%; }
        .dot-sung { background-color: #a855f7; } 
        .dot-omni { background-color: #f97316; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .custom-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; table-layout: fixed; background: white; }
        .custom-table th { background: #f8fafc; color: #1e293b; padding: 6px 1px; border: 1px solid #e2e8f0; font-weight: 800; }
        .custom-table td { border: 1px solid #e2e8f0; padding: 6px 1px; color: #475569; height: 38px; }
        #floatingList { position: fixed; top: 0; right: -100%; width: 100%; max-width: 448px; height: 100%; background: #f8f9fa; z-index: 1000; transition: 0.3s ease; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        #floatingList.active { right: 0; }
        @media (min-width: 448px) { #floatingList.active { right: 50%; transform: translateX(50%); } }
    </style>
</head>
<body>
    <div id="main-wrapper" class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col relative">
        <div class="bg-[#2E4077] p-5 text-center text-white relative">
            <h1 class="text-lg font-black italic">🛡️ 성의교정 통합 시스템</h1>
            <p id="clock" class="text-[10px] opacity-70 mt-1 font-bold">--:--:--</p>
            <button onclick="openAdmin()" class="absolute right-4 top-5 text-xl opacity-80 hover:opacity-100">⚙️</button>
        </div>

        <div class="flex border-b bg-slate-50 sticky top-0 z-50">
            <button onclick="openTab('status')" id="btn-status" class="nav-tab active flex-1 py-4 text-[11px] font-black">🕒 실시간현황</button>
            <button onclick="openTab('schedule')" id="btn-schedule" class="nav-tab flex-1 py-4 text-[11px] font-black text-slate-400">📅 근무편성표</button>
            <button onclick="openTab('calendar')" id="btn-calendar" class="nav-tab flex-1 py-4 text-[11px] font-black text-slate-400">🏥 근무달력</button>
        </div>

        <div id="status" class="tab-content active p-3 space-y-4"> 
            <div id="time-msg" class="bg-white p-5 rounded-2xl border text-center font-black text-[#2E4077] shadow-sm">데이터 로딩 중...</div>
            <div id="worker-cards" class="grid grid-cols-2 gap-2"></div>
            <div class="flex justify-between items-center px-1">
                <span class="text-[10px] font-black text-slate-400">🕒 상세 근무 시간표</span>
                <button onclick="toggleFullTable()" class="text-[9px] bg-slate-700 text-white px-3 py-1 rounded-full font-bold">전체보기 토글</button>
            </div>
            <div class="overflow-hidden rounded-xl border border-slate-200 shadow-sm">
                <table class="custom-table" id="status-table"></table>
            </div>
        </div>

        <div id="schedule" class="tab-content p-3 space-y-4">
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-inner space-y-3">
                <div class="flex gap-2">
                    <button onclick="updateScheduleRange(-1)" class="flex-1 py-2 bg-slate-200 border rounded-lg text-[10px] font-bold">- 1개월</button>
                    <button onclick="updateScheduleRange(1)" class="flex-1 py-2 bg-white border rounded-lg text-[10px] font-bold">+ 1개월</button>
                    <button onclick="updateScheduleRange(3)" class="flex-1 py-2 bg-white border rounded-lg text-[10px] font-bold">+ 3개월</button>
                </div>
                <select id="worker-focus" onchange="renderSchedule()" class="w-full p-3 border rounded-xl text-xs font-bold bg-white outline-none">
                    <option value="none">✨ 이름 강조 선택</option>
                    <option value="황재업">황재업</option><option value="김태언">김태언</option><option value="이태원">이태원</option><option value="이정석">이정석</option>
                </select>
            </div>
            <div class="overflow-hidden rounded-xl border border-slate-200 shadow-sm">
                <table class="custom-table" id="schedule-list"></table>
            </div>
        </div>

        <div id="calendar" class="tab-content p-3 space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <div class="flex items-center bg-white border rounded-xl h-12 shadow-sm overflow-hidden">
                    <button onclick="changeMonth(-1)" class="px-4 font-bold text-slate-300">＜</button>
                    <span id="monthTitle" class="text-xs font-black flex-1 text-center"></span>
                    <button onclick="changeMonth(1)" class="px-4 font-bold text-slate-300">＞</button>
                </div>
                <select id="shiftSelect" class="text-xs h-12 bg-white rounded-xl font-bold border text-center shadow-sm" onchange="renderCalendar()"></select>
            </div>
            <div id="calendarBody"></div>
            <div class="flex gap-2">
                <button onclick="toggleFloatingList()" class="flex-1 py-4 bg-slate-800 text-white rounded-xl text-xs font-black shadow-lg">연차명단 확인</button>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal-overlay" onclick="this.classList.remove('active')">
        <div class="bg-white w-80 rounded-2xl overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <div id="detailHeader" class="bg-[#2E4077] p-4 text-white font-black text-center text-sm"></div>
            <div id="detailBody" class="p-5 space-y-3 max-h-[400px] overflow-y-auto"></div>
            <button onclick="document.getElementById('detailModal').classList.remove('active')" class="w-full p-4 border-t font-black text-slate-400 text-xs">닫기</button>
        </div>
    </div>

    <div id="floatingList">
        <div class="p-5 bg-white border-b flex justify-between items-center">
            <h2 class="font-black text-lg">월간 연차 명단</h2>
            <button onclick="toggleFloatingList()" class="text-xl">✕</button>
        </div>
        <div id="listContent" class="p-4 flex-1 overflow-y-auto space-y-2"></div>
    </div>

    <script>
        // 1. 초기화 및 전역 변수
        firebase.initializeApp({ apiKey: "AIzaSyCXNQ3b9qcaJjQAGua3-vcgRZ2j0wASaXM", projectId: "catholic-security-system" });
        const db = firebase.firestore();

        let vData = {}, staffData = [], config = {}; 
        let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth();
        let isFullTable = false, scheduleMonthRange = 1;

        const WORKER_COLORS = { "황재업": { bg: "#2E4077", toneUp: "#E3F2FD" }, "김태언": { bg: "#059669", toneUp: "#ECFDF5" }, "이태원": { bg: "#D97706", toneUp: "#FFFBEB" }, "이정석": { bg: "#7C3AED", toneUp: "#F5F3FF" } };
        const DATA_LIST = [["07:00", "08:00", "보안실", "로비", "로비", "휴게"], ["08:00", "09:00", "보안실", "휴게", "휴게", "로비"], ["09:00", "10:00", "보안실", "순찰", "휴게", "로비"], ["10:00", "11:00", "휴게", "보안실", "로비", "휴게"], ["11:00", "12:00", "보안실", "중식", "로비", "중식"], ["12:00", "13:00", "중식", "보안실", "중식", "로비"], ["13:00", "14:00", "보안실", "휴게", "순찰", "로비"], ["14:00", "15:00", "순찰", "보안실", "로비", "휴게"], ["15:00", "16:00", "보안실", "휴게", "로비", "휴게"], ["16:00", "17:00", "휴게", "보안실", "휴게", "로비"], ["17:00", "18:00", "보안실", "휴게", "휴게", "로비"], ["18:00", "19:00", "보안실", "석식", "로비", "석식"], ["19:00", "20:00", "보안실", "보안실", "석식", "로비"], ["20:00", "21:00", "석식", "보안실", "로비", "휴게"], ["21:00", "22:00", "보안실", "순찰", "로비", "휴게"], ["22:00", "23:00", "순찰", "보안실", "순찰", "로비"], ["23:00", "00:00", "보안실", "휴게", "휴게", "로비"], ["00:00", "01:00", "보안실", "휴게", "휴게", "로비"], ["01:00", "01:40", "보안실", "휴게", "휴게", "로비"], ["01:40", "02:00", "보안실", "보안실", "로비", "로비"], ["02:00", "03:00", "휴게", "보안실", "로비", "휴게"], ["03:00", "04:00", "휴게", "보안실", "로비", "휴게"], ["04:00", "05:00", "휴게", "보안실", "로비", "휴게"], ["05:00", "06:00", "보안실", "순찰", "로비", "순찰"], ["06:00", "07:00", "보안실", "정리", "로비", "정리"]];

        // 2. 핵심 로직 (근무 및 연차 교환)
        function getShiftInfo(date) {
            const base = new Date(config.baseDate || '2025-01-01'); base.setHours(0,0,0,0);
            const target = new Date(date); target.setHours(0,0,0,0);
            const diff = Math.round((target - base) / 86400000);
            const shifts = config.shifts || ['C', 'A', 'B'];
            const sName = shifts[((diff % shifts.length) + shifts.length) % shifts.length];
            return { name: sName, colors: (config.colors && config.colors[sName]) ? config.colors[sName] : ['#f1f5f9', '#64748b'] };
        }

        function getWorkers(date) {
            const base = new Date(config.baseDate || '2025-01-01'); base.setHours(0,0,0,0);
            const targetDt = new Date(date); targetDt.setHours(0,0,0,0);
            const diffDays = Math.round((targetDt - base) / 86400000);
            const dutyCount = Math.floor(diffDays / 3);
            
            const members = ["김태언", "이정석", "이태원"];
            const hallIdx = Math.floor(((dutyCount % 6) + 6) % 6 / 2);
            let hallW = members[hallIdx], medA, medB;
            
            if (hallW === "김태언") { medA = "이태원"; medB = "이정석"; }
            else if (hallW === "이태원") { medA = "김태언"; medB = "이정석"; }
            else { medA = "김태언"; medB = "이태원"; }
            if (dutyCount % 2 !== 0) [medA, medB] = [medB, medA];

            const y = targetDt.getFullYear(), m = String(targetDt.getMonth() + 1).padStart(2, '0'), d = String(targetDt.getDate());
            const dailyV = vData[`${y}-${m}`] || {};
            const isV = (n) => dailyV[n] && dailyV[n].split(',').map(v => v.trim()).includes(d);

            // 연차자 회관 자리 교대 로직
            if (isV(medA)) { [hallW, medA] = [medA, hallW]; } 
            else if (isV(medB)) { [hallW, medB] = [medB, hallW]; }

            return ["황재업", hallW, medA, medB];
        }

        // 3. 각 탭 렌더링 함수
        function renderStatus() {
            if (!config.baseDate) return; 
            const now = new Date();
            const realMin = now.getHours() * 60 + now.getMinutes();
            const todayS = getShiftInfo(now).name;
            const yesterdayS = getShiftInfo(new Date(now.getTime() - 86400000)).name;

            let showCards = false, targetDate = now;
            const isBefore7 = realMin < 420;

            if (todayS === 'C') { targetDate = now; showCards = !isBefore7 || realMin >= 390; }
            else if (yesterdayS === 'C' && isBefore7) { targetDate = new Date(now.getTime() - 86400000); showCards = true; }

            const nextC = (todayS === 'C' && !isBefore7) ? "오늘 근무 중" : "계산 중..."; 
            document.getElementById('time-msg').innerHTML = `<div class="big-msg-box">🛡️ 안전하고 행복한 성의교정<span class="next-duty-inline">현재 근무조: ${todayS === 'C' ? 'C조' : '휴무'}</span></div>`;

            const ws = getWorkers(targetDate);
            const logicNowMin = now.getHours() < 7 ? realMin + 1440 : realMin;
            let currentIdx = -1;
            DATA_LIST.forEach((r, i) => {
                let [sH, sM] = r[0].split(':').map(Number);
                let sT = (sH < 7 ? sH * 60 + sM + 1440 : sH * 60 + sM);
                let [eH, eM] = r[1].split(':').map(Number);
                let eT = (eH < 7 && r[1] !== "07:00") ? (eH * 60 + eM + 1440) : (eH === 7 ? 1860 : eH * 60 + eM);
                if (logicNowMin >= sT && logicNowMin < eT) currentIdx = i;
            });

            const cards = document.getElementById('worker-cards');
            cards.style.display = showCards ? 'grid' : 'none';
            cards.innerHTML = ws.map((w, idx) => `
                <div class="worker-card bg-white p-3 rounded-xl border" style="border-left: 8px solid ${WORKER_COLORS[w]?.bg || '#ccc'}">
                    <div class="worker-name-label">${['조장','회관','의산A','의산B'][idx]} ${w}</div>
                    <div class="worker-pos-text" style="color:${WORKER_COLORS[w]?.bg || '#000'}">${(currentIdx !== -1 && showCards) ? DATA_LIST[currentIdx][idx+2] : '대기'}</div>
                </div>`).join('');

            let h = `<thead><tr><th rowspan="2" class="time-cell">시간</th><th colspan="4">성의교정 근무 편성 (${targetDate.getMonth()+1}/${targetDate.getDate()})</th></tr><tr>`;
            ws.forEach(w => { h += `<th style="background-color:${WORKER_COLORS[w]?.toneUp || '#f1f5f9'}">${w}</th>`; });
            h += `</tr></thead><tbody>`;
            DATA_LIST.forEach((r, i) => {
                if (isFullTable || (currentIdx !== -1 && i >= currentIdx)) {
                    const isNow = i === currentIdx;
                    h += `<tr ${isNow ? 'style="background:#fff7ed; outline:2px solid #ef4444;"' : ''}><td class="time-cell">${r[0]}~${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td></tr>`;
                }
            });
            document.getElementById('status-table').innerHTML = h + `</tbody>`;
        }

        function renderSchedule() {
            const focus = document.getElementById('worker-focus').value;
            const weekDays = ['일','월','화','수','목','금','토'];
            let h = `<thead><tr><th>날짜</th><th>조장</th><th>회관</th><th>의산A</th><th>의산B</th></tr></thead><tbody>`;
            let d = new Date(); d.setHours(12,0,0,0);
            for (let i = 0; i < 90; i++) { // 최대 3개월
                let targetDt = new Date(d); targetDt.setDate(d.getDate() + i);
                if (getShiftInfo(targetDt).name === 'C') {
                    const ws = getWorkers(targetDt);
                    const y = targetDt.getFullYear(), m = String(targetDt.getMonth()+1).padStart(2,'0'), ds = String(targetDt.getDate());
                    const mv = vData[`${y}-${m}`] || {};
                    h += `<tr><td class="font-black bg-slate-50">${targetDt.getMonth()+1}/${targetDt.getDate()}(${weekDays[targetDt.getDay()]})</td>`;
                    ws.forEach(w => {
                        const isV = mv[w] && mv[w].split(',').map(v=>v.trim()).includes(ds);
                        const isFocus = w === focus;
                        h += `<td style="background:${isFocus ? WORKER_COLORS[w].bg : WORKER_COLORS[w]?.toneUp || '#fff'}; color:${isFocus?'white':'black'}">${w}${isV?'🚩':''}</td>`;
                    });
                    h += "</tr>";
                }
            }
            document.getElementById('schedule-list').innerHTML = h + "</tbody>";
        }

        function renderCalendar() {
            document.getElementById('monthTitle').innerText = `${currentYear}년 ${currentMonth + 1}월`;
            const body = document.getElementById('calendarBody'); body.innerHTML = '';
            const grid = document.createElement('div'); grid.className = 'calendar-grid';
            ['일','월','화','수','목','금','토'].forEach(d => grid.innerHTML += `<div class="text-center font-bold text-[10px] py-2 bg-slate-50 border-b text-slate-400">${d}</div>`);
            
            const first = new Date(currentYear, currentMonth, 1).getDay();
            const last = new Date(currentYear, currentMonth+1, 0).getDate();
            const targetS = document.getElementById('shiftSelect').value;

            for (let i=0; i<first; i++) grid.innerHTML += `<div class="calendar-cell bg-slate-50/50"></div>`;
            for (let d=1; d<=last; d++) {
                const dt = new Date(currentYear, currentMonth, d), sInfo = getShiftInfo(dt), isH = (targetS === sInfo.name);
                const isToday = dt.toDateString() === new Date().toDateString();
                const dayVocs = [];
                const key = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
                if(vData[key]) {
                    for(let name in vData[key]) {
                        if(vData[key][name].split(',').includes(String(d))) {
                            const staff = staffData.find(s => s.n === name) || { g: '기타' };
                            dayVocs.push({ name, g: staff.g });
                        }
                    }
                }
                const cell = document.createElement('div');
                cell.className = `calendar-cell ${isToday ? 'is-today' : ''} ${isH ? 'is-highlighted' : ''}`;
                if(isH) cell.style.backgroundColor = sInfo.colors[1];
                cell.innerHTML = `<div class="date-area ${dt.getDay()===0?'text-red-500':''} ${isH?'text-white':''}">${d}
                    <div class="dot-container">
                        ${dayVocs.some(v=>v.g.includes("성의")) ? '<div class="v-dot dot-sung"></div>' : ''}
                        ${dayVocs.some(v=>v.g.includes("옴니")) ? '<div class="v-dot dot-omni"></div>' : ''}
                    </div></div><div class="shift-area" style="background:${isH?'transparent':sInfo.colors[0]}; color:${isH?'white':sInfo.colors[1]}">${sInfo.name}</div>`;
                if(dayVocs.length > 0) cell.onclick = () => showDetail(`${currentMonth+1}월 ${d}일 연차자`, dayVocs);
                grid.appendChild(cell);
            }
            body.appendChild(grid);
        }

        // 4. 공통 UI 및 데이터 연동
        function openTab(id) {
            document.querySelectorAll('.tab-content, .nav-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
            if(id==='status') renderStatus(); else if(id==='schedule') renderSchedule(); else if(id==='calendar') renderCalendar();
        }

        function toggleFloatingList() {
            const list = document.getElementById('floatingList');
            list.classList.toggle('active');
            if(list.classList.contains('active')) {
                const container = document.getElementById('listContent'); container.innerHTML = '';
                const key = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
                const monthly = vData[key] || {};
                for(let d=1; d<=31; d++) {
                    let vocs = [];
                    for(let name in monthly) if(monthly[name].split(',').includes(String(d))) vocs.push(name);
                    if(vocs.length > 0) {
                        const dt = new Date(currentYear, currentMonth, d);
                        container.innerHTML += `<div class="p-3 bg-white border rounded-xl flex justify-between items-center"><span class="font-bold text-xs">${currentMonth+1}/${d} (${['일','월','화','수','목','금','토'][dt.getDay()]})</span><span class="text-blue-600 font-black text-xs">${vocs.join(', ')}</span></div>`;
                    }
                }
            }
        }

        function showDetail(title, vocs) {
            document.getElementById('detailHeader').innerText = title;
            document.getElementById('detailBody').innerHTML = vocs.map(v => `<div class="p-3 bg-slate-50 rounded-xl flex justify-between"><b>${v.name}</b><small class="text-slate-400">${v.g}</small></div>`).join('');
            document.getElementById('detailModal').classList.add('active');
        }

        function changeMonth(v) { currentMonth += v; if(currentMonth<0){currentMonth=11;currentYear--;} else if(currentMonth>11){currentMonth=0;currentYear++;} renderCalendar(); }
        function toggleFullTable() { isFullTable = !isFullTable; renderStatus(); }

        // 5. DB 실시간 연동 (가장 중요)
        window.onload = () => {
            // [중요] 컬렉션과 문서 경로를 하나로 통일하여 감시합니다.
            db.collection("vocation_system").doc("data").onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    vData = data.vacation || {};
                    staffData = data.staff || [];
                    config = data.config || { baseDate: '2025-01-01', shifts: ['C', 'A', 'B'] };
                    
                    // 강조 선택 드롭다운 업데이트
                    const sel = document.getElementById('shiftSelect');
                    sel.innerHTML = '<option value="none">조별 강조</option>';
                    (config.shifts || []).forEach(s => sel.innerHTML += `<option value="${s}">${s}조</option>`);
                    
                    // 현재 활성화된 탭 리프레시
                    const activeTab = document.querySelector('.tab-content.active').id;
                    openTab(activeTab);
                }
            });

            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
        };
    </script>
</body>
</html>
