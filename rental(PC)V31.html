<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/732/732220.png">
    <title>성의교정 대관 현황</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .bu-chip { transition: all 0.2s; border: 1.5px solid #e2e8f0; cursor: pointer; background: white; white-space: nowrap; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; height: 40px; border-radius: 12px; }
        .bu-chip.active { background-color: #1E3A5F; color: white; border-color: #1E3A5F; font-weight: 900; }
        .fixed-table { table-layout: fixed; width: 100%; border-collapse: collapse; background: white; }
        .fixed-table th { background-color: #f8fafc; color: #64748b; font-weight: 700; font-size: 10px; padding: 10px 2px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        .fixed-table td { padding: 10px 4px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; line-height: 1.3; font-size: 11px; }
        .col-place { width: 110px; } .col-time { width: 75px; } .col-count { width: 45px; } .col-dept { width: 100px; } .col-status { width: 55px; }
        .status-badge { font-weight: 800; padding: 2px 4px; border-radius: 4px; font-size: 9px; display: inline-block; border: 1px solid transparent; }
        .period-text { font-size: 9px; font-weight: 800; color: #8B5CF6; margin-top: 2px; line-height: 1.1; }
        .ctrl-bar { display: flex; align-items: center; gap: 8px; margin-top: 12px; width: 100%; }
        .ctrl-btn { height: 36px; padding: 0 12px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-weight: 900; font-size: 11px; color: #1E3A5F; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .status-indicator { font-size: 10px; font-weight: 900; color: #94a3b8; border: 1px solid #e2e8f0; padding: 0 8px; height: 36px; border-radius: 8px; display: flex; align-items: center; gap: 5px; background: white; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: #cbd5e1; }
        .dot-on { background: #10b981; box-shadow: 0 0 4px #10b981; }
        .rental-card { border: 1.2px solid #e2e8f0; background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; border-left-width: 6px; }

        @media (max-width: 768px) and (orientation: portrait) {
            .view-pc { display: none !important; }
            .view-mo { display: block !important; }
        }
        @media (min-width: 769px), (orientation: landscape) {
            .view-pc { display: block !important; }
            .view-mo { display: none !important; }
        }
    </style>
</head>
<body class="p-3 md:p-6">
    <div class="max-w-4xl mx-auto">
        <div class="bg-[#EEF2F6] rounded-3xl p-5 mb-4 border border-slate-200 shadow-sm flex flex-col items-center">
            <div class="flex items-center gap-2 mb-4">
                <h1 class="text-xl font-black text-[#1E3A5F] tracking-tighter">성의교정 대관 현황</h1>
            </div>
            <div class="relative w-full max-w-xs mb-4">
                <input type="text" id="rangePicker" class="w-full h-12 rounded-2xl border-2 border-white font-black text-slate-700 shadow-sm text-center text-sm" placeholder="조회 기간 선택">
            </div>
            <div class="grid grid-cols-4 gap-1.5 w-full" id="buContainer"></div>
            <div class="ctrl-bar">
                <div class="status-indicator">
                    <span id="statusDot" class="dot"></span>
                    <span id="statusText">WAIT</span>
                </div>
                <button onclick="loadFromGoogle()" class="ctrl-btn">🔄 동기화</button>
                <button onclick="downloadExcel()" class="ctrl-btn" style="background:#1E3A5F; color:white; border:none;">📥 엑셀다운(인쇄)</button>
                <div class="flex-grow"></div>
            </div>
        </div>
        <div id="outputArea" class="space-y-6 pb-20"></div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzKtqrzNK11rX4sCdDFv0lcgUcdVwsNiUnlXYc8Zjm0dJNlNV8ThwKrtqOgKBeVrP3g/exec";
        const BUILDINGS = ["전체", "성의회관", "의산연", "옴니버스 파크", "의과대학", "간호대학", "대학본관", "서울성모별관"];
        let selectedBu = ["성의회관", "의산연", "옴니버스 파크"];
        let sheetData = [];
        let dateRange = { start: new Date().toISOString().split('T')[0], end: new Date().toISOString().split('T')[0] };

        // [복구] 원본 V30의 동기화 및 캐시 로직 적용
        async function loadFromGoogle() {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            txt.innerText = "SYNC...";
            
            try {
                // 타임스탬프를 추가하여 강제 새로고침 유도
                const response = await fetch(`${GAS_URL}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Network response was not ok');
                
                sheetData = await response.json();
                
                // 데이터가 비어있지 않을 때만 캐시 저장
                if (sheetData && sheetData.length > 0) {
                    localStorage.setItem("rental_db_cache", JSON.stringify(sheetData));
                    dot.className = "dot dot-on";
                    txt.innerText = "ONLINE";
                }
                renderUI();
            } catch (e) {
                console.error("Sync failed:", e);
                const cached = localStorage.getItem("rental_db_cache");
                if (cached) {
                    sheetData = JSON.parse(cached);
                    dot.className = "dot";
                    txt.innerText = "OFFLINE";
                    renderUI();
                } else {
                    txt.innerText = "ERROR";
                }
            }
        }

        function getShift(dateStr) {
            const base = new Date('2026-03-09').setHours(0,0,0,0);
            const target = new Date(dateStr).setHours(0,0,0,0);
            const diff = Math.floor((target - base) / 86400000);
            const patterns = [{n:'C', c:'#1976D2'}, {n:'A', c:'#F57C00'}, {n:'B', c:'#D32F2F'}];
            return patterns[((diff % 3) + 3) % 3];
        }

        function renderUI() {
            const area = document.getElementById('outputArea');
            area.innerHTML = '';
            if (!sheetData || sheetData.length === 0) return;

            let curr = new Date(dateRange.start + 'T00:00:00');
            const stop = new Date(dateRange.end + 'T00:00:00');

            while (curr <= stop) {
                const dStr = curr.toLocaleDateString('en-CA');
                const shift = getShift(dStr);
                const dayIdx = curr.getDay();
                const dayName = ["일","월","화","수","목","금","토"][dayIdx];
                const dayClass = dayIdx === 0 ? 'text-red-500' : (dayIdx === 6 ? 'text-blue-500' : 'text-slate-600');

                let dayHtml = `<div>
                    <div class="flex items-center justify-between bg-[#EEF2F6] border border-slate-200 p-3 rounded-2xl mb-4 shadow-sm">
                        <span class="font-black text-sm text-slate-600">${dStr.replace(/-/g,'.')} <span class="${dayClass}">(${dayName})</span></span>
                        <span class="text-white text-[10px] px-2 py-0.5 rounded-md font-black" style="background-color:${shift.c}">${shift.n}조 근무</span>
                    </div>`;

                selectedBu.forEach(buName => {
                    if (buName === "전체") return;
                    const searchBu = buName === "의산연" ? "의생명산업연구원" : buName;
                    const filtered = sheetData.filter(d => d.rawDate === dStr && d.bu.includes(searchBu));

                    dayHtml += `<div class="mb-6"><div class="flex items-center gap-2 px-1 font-black text-xs text-[#1E3A5F] mb-2"><span class="w-1.5 h-3 bg-[#1E3A5F] rounded-full"></span>${buName} (${filtered.length}건)</div>`;

                    if (filtered.length > 0) {
                        dayHtml += `<div class="view-pc overflow-hidden border border-slate-200 rounded-xl bg-white shadow-sm"><table class="fixed-table"><thead><tr><th class="col-place">장소</th><th class="col-time">시간</th><th>행사명</th><th class="col-count">인원</th><th class="col-dept">부서</th><th class="col-status">상태</th></tr></thead><tbody>`;
                        filtered.forEach(i => {
                            const isPeriod = i.type === '기간';
                            dayHtml += `<tr>
                                <td class="text-center font-bold text-slate-600">${i.place}</td>
                                <td class="text-center font-bold text-red-500">${i.time}</td>
                                <td class="px-2">
                                    <div class="font-black text-slate-900">${i.event}</div>
                                    ${isPeriod ? `<div class="period-text">📅 ${i.period} (${i.yoil || i.week})</div>` : ''}
                                </td>
                                <td class="text-center font-bold text-slate-500">${i.people || i.count || '-'}</td>
                                <td class="text-center text-slate-400 font-bold italic">${i.dept}</td>
                                <td class="text-center"><span class="status-badge ${i.status==='확정'?'text-orange-600 bg-orange-50':'text-slate-400 bg-slate-50'}">${i.status}</span></td>
                            </tr>`;
                        });
                        dayHtml += `</tbody></table></div>`;

                        dayHtml += `<div class="view-mo hidden space-y-2">`;
                        filtered.forEach(i => {
                            const isPeriod = i.type === '기간';
                            dayHtml += `<div class="rental-card ${isPeriod ? 'border-l-purple-500' : 'border-l-blue-500'}">
                                <div class="flex justify-between text-[10px] font-bold mb-1"><span class="text-slate-400">📍 ${i.place}</span><span class="text-red-500">🕒 ${i.time}</span></div>
                                <div class="text-[14px] font-black text-slate-900 leading-tight mb-1">${i.event}</div>
                                ${isPeriod ? `<div class="period-text mb-2">📅 ${i.period} (${i.yoil || i.week})</div>` : '<div class="mb-2"></div>'}
                                <div class="flex justify-between items-center text-[10px] font-bold">
                                    <span class="text-slate-400 italic">${i.dept}</span>
                                    <span class="text-orange-600">${i.status}</span>
                                </div>
                            </div>`;
                        });
                        dayHtml += `</div>`;
                    } else {
                        dayHtml += `<div class="p-4 text-center bg-white rounded-xl text-slate-300 text-[10px] font-bold border border-dashed border-slate-200">대관 내역이 없습니다.</div>`;
                    }
                    dayHtml += `</div>`;
                });
                dayHtml += `</div>`;
                area.innerHTML += dayHtml;
                curr.setDate(curr.getDate() + 1);
            }
        }

        async function downloadExcel() {
            if (!sheetData || sheetData.length === 0) return alert("데이터가 없습니다.");
            const workbook = new ExcelJS.Workbook();
            const sheet = workbook.addWorksheet('대관현황');
            sheet.columns = [{ width: 22 }, { width: 14 }, { width: 45 }, { width: 22 }, { width: 10 }, { width: 10 }];
            let rIdx = 1;
            let curr = new Date(dateRange.start + 'T00:00:00');
            const end = new Date(dateRange.end + 'T00:00:00');

            while (curr <= end) {
                const dStr = curr.toLocaleDateString('en-CA');
                const shift = getShift(dStr);
                sheet.mergeCells(`A${rIdx}:F${rIdx}`);
                const dCell = sheet.getCell(`A${rIdx}`);
                dCell.value = `📅 ${dStr} | ${shift.n}조 근무`;
                dCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF334155'} };
                dCell.font = { color:{argb:'FFFFFFFF'}, bold:true };
                dCell.alignment = { vertical: 'middle', horizontal: 'center' };
                sheet.getRow(rIdx).height = 25;
                rIdx++;

                selectedBu.forEach(bu => {
                    const searchName = (bu === "의산연") ? "의생명산업연구원" : bu;
                    const filtered = sheetData.filter(d => d.rawDate === dStr && d.bu.includes(searchName));
                    sheet.mergeCells(`A${rIdx}:F${rIdx}`);
                    const bCell = sheet.getCell(`A${rIdx}`);
                    bCell.value = `🏢 ${bu} (${filtered.length}건)`;
                    bCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFE9ECEF'} };
                    bCell.font = { color:{argb:'FF1E3A5F'}, bold:true };
                    rIdx++;
                    if (filtered.length > 0) {
                        const hRow = sheet.addRow(['장소', '시간', '행사명', '부서', '인원', '상태']);
                        hRow.eachCell(c => { c.font={bold:true}; c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF8F9FA'}}; c.alignment={horizontal:'center'}});
                        rIdx++;
                        filtered.forEach(i => {
                            const eventName = i.type === '기간' ? `${i.event}\n(📅 ${i.period} / ${i.yoil || i.week})` : i.event;
                            const row = sheet.addRow([i.place, i.time, eventName, i.dept, i.people || i.count || '-', i.status]);
                            row.eachCell(c => { c.alignment = { vertical:'middle', horizontal:'center', wrapText:true }; });
                            row.getCell(3).alignment = { vertical:'middle', horizontal:'left', wrapText:true };
                            rIdx++;
                        });
                    }
                    rIdx++;
                });
                curr.setDate(curr.getDate() + 1);
            }
            const buffer = await workbook.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), `성의대관현황_${dateRange.start}.xlsx`);
        }

        window.onload = () => {
            initBuChips();
            flatpickr("#rangePicker", {
                mode: "range", locale: "ko", dateFormat: "Y-m-d", defaultDate: [dateRange.start, dateRange.end],
                onClose: (dates) => { if (dates.length === 2) { 
                    dateRange.start = dates[0].toLocaleDateString('en-CA'); 
                    dateRange.end = dates[1].toLocaleDateString('en-CA'); 
                    renderUI(); 
                }}
            });
            // 초기 로드 시 캐시 먼저 확인 후 동기화 시도
            const cached = localStorage.getItem("rental_db_cache");
            if (cached) {
                sheetData = JSON.parse(cached);
                renderUI();
            }
            loadFromGoogle();
        };

        function initBuChips() {
            const container = document.getElementById('buContainer');
            BUILDINGS.forEach(bu => {
                const chip = document.createElement('div');
                chip.className = `bu-chip shadow-sm ${selectedBu.includes(bu) ? 'active' : ''}`;
                chip.innerText = bu;
                chip.onclick = () => {
                    if (bu === "전체") selectedBu = (selectedBu.length === BUILDINGS.length - 1) ? [] : BUILDINGS.filter(b => b !== "전체");
                    else selectedBu.includes(bu) ? selectedBu = selectedBu.filter(b => b !== bu) : selectedBu.push(bu);
                    document.querySelectorAll('.bu-chip').forEach(c => c.classList.toggle('active', c.innerText === "전체" ? selectedBu.length === BUILDINGS.length - 1 : selectedBu.includes(c.innerText)));
                    renderUI();
                };
                container.appendChild(chip);
            });
        }
    </script>
</body>
</html>
