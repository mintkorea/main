<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUK Security - System Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .safety-gradient { background: linear-gradient(135deg, #003594 0%, #00266b 100%); }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- 로딩 및 복구 화면 -->
    <div id="init-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#001a4d] text-white">
        <div id="loader-icon" class="mb-8 relative">
            <div class="w-16 h-16 border-4 border-blue-400/30 border-t-blue-400 rounded-full animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-2 h-2 bg-white rounded-full status-pulse"></div>
            </div>
        </div>
        <h2 class="text-2xl font-black tracking-tight mb-2 uppercase italic">System Booting</h2>
        <p id="boot-status" class="text-blue-200 text-sm font-mono">가톨릭대학교 보안 환경 변수 확인 중...</p>
        
        <div id="manual-reboot" class="hidden mt-10 w-full max-w-xs px-4">
            <div class="bg-red-500/10 border border-red-500/30 p-4 rounded-2xl mb-4 text-center">
                <p class="text-red-400 text-xs font-bold mb-1 uppercase">Warning: ENV_VAR_MISSING</p>
                <p class="text-slate-300 text-[10px]">설정값을 가져오지 못했습니다. <br>일부 기능이 제한될 수 있습니다.</p>
            </div>
            <button onclick="forceStart()" class="w-full bg-white text-[#001a4d] py-4 rounded-2xl font-black hover:bg-blue-50 transition-all active:scale-95 shadow-xl">
                오프라인 모드로 시작
            </button>
            <button onclick="location.reload()" class="w-full mt-3 text-white/60 py-2 text-xs font-bold hover:text-white transition-all underline decoration-dotted">
                시스템 다시 읽기
            </button>
        </div>
    </div>

    <!-- 메인 대시보드 -->
    <div id="app-container" class="hidden w-full max-w-lg">
        <header class="safety-gradient text-white p-8 rounded-t-[3rem] shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center justify-between mb-8">
                    <div class="font-black italic text-xl tracking-tighter">CUK SECURITY</div>
                    <div id="mode-badge" class="bg-yellow-500/20 text-yellow-400 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-yellow-500/30">
                        OFFLINE
                    </div>
                </div>
                <h1 class="text-4xl font-black leading-tight mb-1">상황 관제 알림</h1>
                <p class="text-blue-200/80 text-xs font-bold uppercase tracking-widest">The Catholic University of Korea</p>
            </div>
            <div class="absolute -right-10 -bottom-10 w-48 h-48 bg-white/5 rounded-full blur-3xl"></div>
        </header>

        <main class="bg-white p-8 rounded-b-[3rem] -mt-6 shadow-xl space-y-8">
            <section>
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-1.5 h-6 bg-blue-600 rounded-full"></div>
                    <h2 class="font-black text-slate-800 text-lg">신규 상황 보고</h2>
                </div>
                
                <div class="space-y-4">
                    <div class="relative">
                        <input type="text" id="rep-title" placeholder="상황 제목" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 pl-12 text-sm font-bold focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                        <svg class="absolute left-4 top-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    
                    <div class="relative">
                        <input type="text" id="rep-loc" placeholder="발생 장소 (예: 성심관 4층)" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 pl-12 text-sm font-bold focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                        <svg class="absolute left-4 top-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="11" r="3"/><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 0 1-2.827 0l-4.244-4.243a8 8 0 1 1 11.314 0z"/></svg>
                    </div>

                    <div class="relative">
                        <textarea id="rep-desc" placeholder="구체적인 상황을 입력하세요..." class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-sm font-bold h-32 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none"></textarea>
                    </div>

                    <button id="submit-btn" class="w-full safety-gradient text-white py-5 rounded-[2rem] font-black text-lg shadow-[0_10px_30px_rgba(0,53,148,0.3)] hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-3">
                        <span id="btn-text">보고서 전송</span>
                    </button>
                </div>
            </section>
        </main>
        
        <footer class="mt-8 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest pb-10">
            Emergency Response System v2.1.0-Stabilized
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        let db, auth;
        let isOnline = false;
        let retryCount = 0;
        const MAX_RETRIES = 10;

        // 시스템 강제 시작 (설정값 없을 때)
        window.forceStart = () => {
            document.getElementById('init-overlay').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('mode-badge').innerText = "LIMITED MODE";
            document.getElementById('mode-badge').classList.replace('bg-yellow-500/20', 'bg-red-500/20');
            document.getElementById('mode-badge').classList.replace('text-yellow-400', 'text-red-400');
        };

        async function attemptInit() {
            const configRaw = window.__firebase_config;
            const appId = window.__app_id || 'cuk-safety-default';

            if (!configRaw) {
                if (retryCount < MAX_RETRIES) {
                    retryCount++;
                    document.getElementById('boot-status').innerText = `환경 로드 중... (${retryCount}/${MAX_RETRIES})`;
                    setTimeout(attemptInit, 800);
                    return;
                }
                // 최종 실패 시 매뉴얼 UI 노출
                document.getElementById('loader-icon').classList.add('hidden');
                document.getElementById('manual-reboot').classList.remove('hidden');
                document.getElementById('boot-status').innerText = "설정값을 로드할 수 없습니다.";
                return;
            }

            try {
                const config = JSON.parse(configRaw);
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                const token = window.__initial_auth_token;
                if (token) {
                    await signInWithCustomToken(auth, token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        isOnline = true;
                        document.getElementById('init-overlay').classList.add('hidden');
                        document.getElementById('app-container').classList.remove('hidden');
                        document.getElementById('mode-badge').innerText = "ONLINE";
                        document.getElementById('mode-badge').classList.replace('bg-yellow-500/20', 'bg-green-500/20');
                        document.getElementById('mode-badge').classList.replace('text-yellow-400', 'text-green-400');
                    }
                });
            } catch (err) {
                console.error("Init Error:", err);
                window.forceStart();
            }
        }

        // 지수 백오프를 이용한 전송 함수
        async function sendReportWithRetry(data, maxRetries = 5) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const aid = window.__app_id || 'cuk-safety-default';
                    await addDoc(collection(db, 'artifacts', aid, 'public', 'data', 'reports'), {
                        ...data,
                        createdAt: serverTimestamp()
                    });
                    return true;
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        document.getElementById('submit-btn').onclick = async () => {
            if (!isOnline) {
                alert("현재 제한 모드입니다. 네트워크 설정이 완료된 후 전송이 가능합니다.");
                return;
            }

            const title = document.getElementById('rep-title').value;
            const loc = document.getElementById('rep-loc').value;
            const desc = document.getElementById('rep-desc').value;

            if (!title || !loc) {
                alert("상황 제목과 장소를 입력해 주세요.");
                return;
            }

            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            btn.disabled = true;
            btnText.innerText = "상황 보고 중...";

            try {
                await sendReportWithRetry({
                    title,
                    location: loc,
                    description: desc,
                    sender: auth.currentUser.uid
                });

                alert("보고가 완료되었습니다.");
                document.getElementById('rep-title').value = "";
                document.getElementById('rep-loc').value = "";
                document.getElementById('rep-desc').value = "";
            } catch (err) {
                alert("전송 실패: " + err.message);
            } finally {
                btn.disabled = false;
                btnText.innerText = "보고서 전송";
            }
        };

        // 초기화 실행
        attemptInit();
    </script>
</body>
</html>
