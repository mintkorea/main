<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>인수인계 및 공지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --brand-navy: #2d3e75; }
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #1e293b; letter-spacing: -0.02em; margin: 0; }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; background: #f8fafc; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.05); }
        .header { background: var(--brand-navy); color: white; padding: 20px; display: flex; align-items: center; position: sticky; top: 0; z-index: 50; }
        
        /* 카드 디자인 수정: 말머리와 제목을 한 줄로 */
        .notice-card { background: white; padding: 18px 20px; border-radius: 20px; border: 1px solid #e2e8f0; margin: 0 16px 12px; cursor: pointer; transition: transform 0.2s ease; }
        .notice-card:active { transform: scale(0.98); }
        
        .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .tag { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
        .tag-notice { background: #fef2f2; color: #ef4444; border: 1px solid #fee2e2; }
        
        .title { font-size: 16px; font-weight: 800; color: #0f172a; white-space: nowrap; overflow: hidden; text-ellipsis: true; flex: 1; }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
        .modal-box { background: white; width: 100%; max-width: 420px; border-radius: 32px; display: flex; flex-direction: column; max-height: 85vh; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-body { padding: 32px; overflow-y: auto; }
        .html-content { line-height: 1.7; color: #334155; }
        .html-content p { margin-bottom: 1rem; }
        .close-btn { margin: 0 24px 24px; padding: 16px; background: #f1f5f9; border-radius: 16px; text-align: center; font-weight: 800; cursor: pointer; color: #475569; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1 class="text-xl font-black">인수인계 및 공지</h1>
        </header>
        <div id="notice-list" class="py-4">
            <!-- 자바스크립트 렌더링 영역 -->
        </div>
    </div>

    <!-- 상세 보기 모달 -->
    <div id="modal" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-body">
                <div id="m-tag" class="tag tag-notice" style="margin-bottom: 12px; font-size: 11px; padding: 4px 10px;">공지사항</div>
                <h2 id="m-title" style="font-size: 22px; font-weight: 800; line-height: 1.3; color: #0f172a; margin-bottom: 12px;"></h2>
                <div id="m-meta" class="text-xs text-slate-400 mb-6 font-bold flex justify-between">
                    <span id="m-author">관리자</span>
                    <span id="m-date"></span>
                </div>
                <div id="m-content" class="html-content text-[15px]"></div>
            </div>
            <div class="close-btn" onclick="closeModal()">닫기</div>
        </div>
    </div>

    <script>
        const noticeData = [
            {
                id: 3,
                author: "관리자",
                category: "공지사항",
                title: "시신기증 접수증 전송 후 통화의 건",
                date: "2026-04-13",
                content: "<p>시신기증 접수증 전송 후 기존에는 즉시모심에 한하여 담당자와 통화하였으나, 현 담당자인 주상건 차장의 요청에 의하여 모든 건에 대하여 통화를 실시하여야 합니다.</p><p>즉시모심, 삼일장 구분 없이 접수증 전송 후 통화하시기 바랍니다.</p>"
            },
            {
                id: 2,
                author: "관리자",
                category: "공지사항",
                title: "성의회관 옥상 방수공사의 건",
                date: "2026-04-12",
                content: "<p>금주 금요일부터 성의회관 옥상 방수공사가 진행될 예정입니다. 소음이 발생할 수 있으니 업무에 참고하시기 바랍니다.</p>"
            },
            {
                id: 1,
                author: "관리자",
                category: "공지사항",
                title: "2월 연차오류에 따른 급여차감 건",
                date: "2026-04-10",
                content: "<p>지난 2월 연차 정산 과정에서 발생한 전산 오류로 인해 이번 달 급여에서 일부 차감이 발생할 예정입니다. 상세 내역은 개별 메일을 확인해 주세요.</p>"
            }
        ];

        function renderList() {
            const listDiv = document.getElementById('notice-list');
            listDiv.innerHTML = noticeData.map(post => {
                const previewText = post.content.replace(/<[^>]*>?/gm, '').substring(0, 45);
                return `
                    <div class="notice-card" onclick="openModal(${post.id})">
                        <div class="card-top">
                            <span class="tag tag-notice">${post.category}</span>
                            <h2 class="title">${post.title}</h2>
                        </div>
                        <div class="text-[11px] text-slate-400 font-bold mb-2">${post.author} · ${post.date}</div>
                        <div class="text-[13px] text-slate-500 overflow-hidden text-ellipsis whitespace-nowrap opacity-80">${previewText}...</div>
                    </div>
                `;
            }).join('');
        }

        function openModal(id) {
            const post = noticeData.find(p => p.id === id);
            if (!post) return;
            document.getElementById('m-title').innerText = post.title;
            document.getElementById('m-author').innerText = post.author;
            document.getElementById('m-date').innerText = post.date;
            document.getElementById('m-content').innerHTML = post.content;
            document.getElementById('modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = renderList;
    </script>
</body>
</html>
