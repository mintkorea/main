<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공지사항 - 성의교정</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --brand-navy: #2d3e75; }
        body { 
            font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b;
            letter-spacing: -0.05em; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;
        }
        .header { background-color: var(--brand-navy); color: white; padding: 16px; display: flex; align-items: center; position: sticky; top: 0; z-index: 50; }
        .btn-back { margin-right: 12px; padding: 8px; cursor: pointer; }
        .list-item { background: white; border-bottom: 1px solid #f1f5f9; padding: 16px; cursor: pointer; transition: background 0.2s; }
        .list-item:active { background: #f1f5f9; }
        .category-badge { font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; background: #e2e8f0; color: #475569; margin-bottom: 6px; display: inline-block; }
        .content-area img { max-width: 100%; height: auto; border-radius: 8px; margin: 12px 0; }
        .content-area { line-height: 1.6; font-size: 15px; color: #334155; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- 상단 헤더 -->
    <header class="header shadow-lg">
        <div class="btn-back" onclick="handleBack()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <h1 id="header-title" class="text-lg font-black">공지사항</h1>
    </header>

    <!-- 1. 공지사항 목록 화면 -->
    <div id="view-list" class="max-w-md mx-auto min-h-screen">
        <div id="notice-list-container">
            <!-- 목록이 여기에 렌더링됩니다 -->
            <div class="p-10 text-center text-slate-400 font-bold">로딩 중...</div>
        </div>
    </div>

    <!-- 2. 공지사항 상세 화면 -->
    <div id="view-detail" class="max-w-md mx-auto min-h-screen bg-white hidden">
        <div class="p-6 border-bottom border-slate-100">
            <div id="detail-category" class="category-badge">공지</div>
            <h2 id="detail-title" class="text-xl font-black text-slate-900 leading-tight mb-2">제목 로딩 중...</h2>
            <div class="flex justify-between items-center text-[12px] font-bold text-slate-400">
                <span id="detail-author">관리자</span>
                <span id="detail-date">2024.00.00</span>
            </div>
        </div>
        <div class="p-6 content-area" id="detail-content">
            내용을 불러오는 중입니다...
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(window.__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.__app_id || 'default-app-id';

        // URL 파라미터 확인 (상세보기 모드인지)
        const urlParams = new URLSearchParams(window.location.search);
        const noticeId = urlParams.get('id');

        // 뒤로가기 버튼 로직
        window.handleBack = function() {
            if (noticeId || !document.getElementById('view-detail').classList.contains('hidden')) {
                window.location.href = 'notice.html'; // 목록으로 초기화
            } else {
                window.location.href = 'index.html'; // 메인으로 이동
            }
        };

        async function init() {
            await signInAnonymously(auth);

            if (noticeId) {
                showDetail(noticeId);
            } else {
                showList();
            }
        }

        // 목록 보기
        function showList() {
            document.getElementById('view-list').classList.remove('hidden');
            document.getElementById('view-detail').classList.add('hidden');
            document.getElementById('header-title').innerText = "공지사항 목록";

            const noticeRef = collection(db, 'artifacts', appId, 'public', 'data', 'notices');
            onSnapshot(noticeRef, (snapshot) => {
                const container = document.getElementById('notice-list-container');
                const notices = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                if (notices.length === 0) {
                    container.innerHTML = `<div class="p-20 text-center text-slate-300 font-bold">등록된 공지가 없습니다.</div>`;
                    return;
                }

                // 최신순 정렬
                notices.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                container.innerHTML = notices.map(n => {
                    const date = n.createdAt?.toDate().toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' }) || '-';
                    return `
                        <div class="list-item" onclick="location.href='notice.html?id=${n.id}'">
                            <span class="category-badge">${n.category || '일반'}</span>
                            <h3 class="font-black text-[16px] text-slate-800 mb-1 truncate">${n.title}</h3>
                            <div class="flex justify-between items-center text-[11px] font-bold text-slate-400">
                                <span>${n.author || '관리자'}</span>
                                <span>${date}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        // 상세 보기
        async function showDetail(id) {
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('hidden');
            document.getElementById('header-title').innerText = "공지사항";

            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'notices', id);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('detail-title').innerText = data.title;
                    document.getElementById('detail-category').innerText = data.category || '공지';
                    document.getElementById('detail-author').innerText = data.author || '관리자';
                    document.getElementById('detail-date').innerText = data.createdAt?.toDate().toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' }) || '-';
                    
                    // HTML 태그가 포함될 수 있으므로 innerHTML로 렌더링 (보안상 필요시 sanitize 고려)
                    document.getElementById('detail-content').innerHTML = data.content.replace(/\n/g, '<br>');
                } else {
                    document.getElementById('detail-content').innerHTML = "삭제된 게시물입니다.";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('detail-content').innerHTML = "데이터를 불러오는 중 오류가 발생했습니다.";
            }
        }

        init();
    </script>
</body>
</html>
