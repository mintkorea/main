<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    body { background: #f4f7f6; padding-bottom: 50px; }
    .container { max-width: 700px; margin-top: 20px; }
    .card-editor { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 25px; }
    #editor-container { height: 200px; background: white; }
    .post-item { background: white; border-radius: 10px; margin-bottom: 12px; cursor: pointer; border-left: 5px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .post-detail { display: none; padding: 20px; background: #fafafa; border-top: 1px solid #eee; border-radius: 0 0 10px 10px; }
    .preview-img { max-width: 100%; border-radius: 8px; margin-top: 15px; border: 1px solid #eee; }
    .badge-공지사항 { background: #dc3545; }
    .badge-성의회관 { background: #0d6efd; }
    .badge-의산연 { background: #198754; }
    .sticky-search { position: sticky; top: 0; z-index: 1000; background: #f4f7f6; padding: 10px 0; }
  </style>
</head>
<body>

<div class="container">
  <h3 class="text-center fw-bold mb-4">🏛️ 성의 교정 통합 게시판</h3>

  <div class="card-editor">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="small fw-bold">👤 접속자: <input type="text" id="currentUser" value="관리자" class="border-0 border-bottom" style="width:80px;"></div>
      <button id="cancel-edit" class="btn btn-sm btn-outline-secondary" onclick="resetForm()" style="display:none;">수정 취소</button>
    </div>
    
    <div class="row g-2 mb-2">
      <div class="col-4">
        <select id="category" class="form-select border-primary shadow-sm">
          <option>공지사항</option><option>성의회관</option><option>의산연</option>
        </select>
      </div>
      <div class="col-8">
        <input type="text" id="title" class="form-control border-primary shadow-sm" placeholder="제목을 입력하세요">
      </div>
    </div>

    <div id="editor-container"></div>
    
    <div class="mt-3 mb-3">
      <label class="form-label small fw-bold text-muted">📎 이미지 첨부</label>
      <input type="file" id="fileInput" accept="image/*" class="form-control">
    </div>

    <input type="hidden" id="edit-id">
    <input type="hidden" id="existing-file-url">
    <button id="submit-btn" class="btn btn-primary w-100 fw-bold py-2" onclick="savePost()">게시글 등록하기</button>
  </div>

  <div class="sticky-search">
    <input type="text" id="searchInput" class="form-control shadow-sm" placeholder="🔍 제목, 내용, 작성자 검색..." onkeyup="filterPosts()">
  </div>

  <div id="post-list" class="mt-3">
    <div class="text-center p-5 text-muted">데이터를 불러오는 중입니다...</div>
  </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
  let allPosts = [];
  const quill = new Quill('#editor-container', { theme: 'snow', modules: { toolbar: [['bold', 'italic'], [{list:'ordered'}, {list:'bullet'}], ['clean']] }});

  // 초기 로딩
  window.onload = fetchPosts;

  function fetchPosts() {
    google.script.run.withSuccessHandler(data => {
      const parsed = JSON.parse(data);
      if(parsed.error) {
        document.getElementById('post-list').innerHTML = `<div class="alert alert-danger">${parsed.error}</div>`;
      } else {
        allPosts = parsed;
        renderPosts();
      }
    }).getPostsJson();
  }

  function renderPosts() {
    const listDiv = document.getElementById('post-list');
    const user = document.getElementById('currentUser').value;
    listDiv.innerHTML = "";

    if (allPosts.length === 0) {
      listDiv.innerHTML = "<div class='text-center p-5 card'>등록된 게시글이 없습니다.</div>";
      return;
    }

    allPosts.slice().reverse().forEach(p => {
      const [id, author, cat, title, content, fileUrl, date] = p;
      const isOwner = (author === user || user === '관리자');
      const fileId = fileUrl ? (fileUrl.match(/[-\w]{25,}/) || [])[0] : null;

      const item = document.createElement('div');
      item.className = 'post-item';
      item.style.borderLeftColor = cat === '공지사항' ? '#dc3545' : (cat === '성의회관' ? '#0d6efd' : '#198754');
      item.innerHTML = `
        <div class="p-3" onclick="toggleContent('${id}')">
          <div class="d-flex justify-content-between mb-1">
            <span class="badge badge-${cat}">${cat}</span>
            <small class="text-muted">${date}</small>
          </div>
          <div class="fw-bold text-dark">${title}</div>
          <div class="small text-muted">작성자: ${author}</div>
        </div>
        <div id="detail-${id}" class="post-detail">
          <div class="content-view">${content}</div>
          ${fileId ? `<img src="https://drive.google.com/thumbnail?id=${fileId}&sz=w800" class="preview-img" onclick="window.open('${fileUrl}')">` : ''}
          ${isOwner ? `
            <div class="d-flex gap-2 mt-4">
              <button class="btn btn-sm btn-outline-success flex-fill" onclick="startEdit('${id}', '${cat}', \`${title.replace(/`/g, '\\`')}\`, \`${content.replace(/`/g, '\\`')}\`, '${fileUrl}')">수정</button>
              <button class="btn btn-sm btn-outline-danger flex-fill" onclick="deletePost('${id}')">삭제</button>
            </div>` : ''}
        </div>
      `;
      listDiv.appendChild(item);
    });
  }

  async function savePost() {
    const btn = document.getElementById('submit-btn');
    const title = document.getElementById('title').value;
    const fileInput = document.getElementById('fileInput').files[0];

    if(!title) return alert("제목을 입력하세요.");
    btn.disabled = true; btn.innerText = "처리 중...";

    let imageData = null;
    if (fileInput) {
      imageData = await new Promise(r => {
        const reader = new FileReader();
        reader.onload = e => r({ base64: e.target.result.split(',')[1], mimeType: fileInput.type, name: fileInput.name });
        reader.readAsDataURL(fileInput);
      });
    }

    const payload = {
      action: document.getElementById('edit-id').value ? "update" : "insert",
      id: document.getElementById('edit-id').value || Date.now().toString(),
      user: document.getElementById('currentUser').value,
      category: document.getElementById('category').value,
      title: title,
      content: quill.root.innerHTML,
      imageBtn: imageData,
      existingFileUrl: document.getElementById('existing-file-url').value,
      date: new Date().toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
    };

    google.script.run.withSuccessHandler(res => {
      alert(res);
      resetForm();
      fetchPosts();
      btn.disabled = false;
      btn.innerText = "게시글 등록하기";
    }).processAction(payload);
  }

  function toggleContent(id) {
    const detail = document.getElementById('detail-' + id);
    const isVisible = detail.style.display === 'block';
    document.querySelectorAll('.post-detail').forEach(d => d.style.display = 'none');
    detail.style.display = isVisible ? 'none' : 'block';
  }

  function filterPosts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('.post-item').forEach(item => {
      item.style.display = item.innerText.toLowerCase().includes(q) ? "" : "none";
    });
  }

  function startEdit(id, cat, title, content, fileUrl) {
    document.getElementById('edit-id').value = id;
    document.getElementById('category').value = cat;
    document.getElementById('title').value = title;
    document.getElementById('existing-file-url').value = fileUrl;
    quill.root.innerHTML = content;
    document.getElementById('submit-btn').innerText = "수정 완료하기";
    document.getElementById('cancel-edit').style.display = "block";
    window.scrollTo(0,0);
  }

  function deletePost(id) {
    if(!confirm("정말 삭제하시겠습니까?")) return;
    google.script.run.withSuccessHandler(res => { alert(res); fetchPosts(); }).processAction({action: "delete", id: id});
  }

  function resetForm() {
    document.getElementById('edit-id').value = "";
    document.getElementById('title').value = "";
    document.getElementById('existing-file-url').value = "";
    document.getElementById('fileInput').value = "";
    quill.root.innerHTML = "";
    document.getElementById('submit-btn').innerText = "게시글 등록하기";
    document.getElementById('cancel-edit').style.display = "none";
  }
</script>
</body>
</html>
