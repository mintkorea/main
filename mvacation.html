<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 모바일 관리</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --border: #000; --orange: #fff4e6; --red: #fff5f5; --blue: #e7f5ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        body { background: #fff; padding: 5px; }

        .app-container { max-width: 800px; margin: 0 auto; border-top: 1px solid var(--border); border-left: 1px solid var(--border); }
        
        .row { display: flex; width: 100%; min-height: 32px; } /* 높이 최소화 */

        /* 좌측 탭 (60px 고정) */
        .tab-cell { 
            width: 60px; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 11px; background: #f0f0f0; flex-shrink: 0;
            border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
        }

        /* 오른쪽 그리드 영역 */
        .grid-area { display: grid; grid-template-columns: repeat(4, 1fr); flex-grow: 1; }

        /* [핵심] 모든 카드 크기 동일 & 높이 최소화 */
        .card { 
            border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
            height: 32px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #fff;
        }
        
        /* [핵심] 건물명 레이블: 좌측 탭을 제외한 그리드 영역에만 배치 */
        .building-label { 
            grid-column: span 4; background: #444; color: #fff; font-size: 12px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; height: 32px;
            border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
        }

        .half { grid-column: span 2; } /* 지휘부/반장 2개씩 배치 */

        /* 텍스트 스타일: 소장/부소장 외 이름만 */
        .pos { font-size: 7px; color: #777; line-height: 1; }
        .name { font-size: 13px; font-weight: 900; line-height: 1; }

        /* 조별 색상 */
        .gr-A { background: var(--orange); }
        .gr-B { background: var(--red); }
        .gr-C { background: var(--blue); }
        .active { background: #ffff00 !important; } /* 연차 데이터 있을 때 */

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; max-width: 500px; padding: 20px; border-radius: 15px 15px 0 0; }
        .m-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .m-btn { width: 100%; padding: 12px; margin-top: 10px; background: #000; color: #fff; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container" id="main-table"></div>

<div id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="m-name" style="text-align:center; margin-bottom:15px;"></h3>
        <div class="m-grid" id="m-grid"></div>
        <button class="m-btn" onclick="save()">저장하기</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU",
        authDomain: "catholic-security-system.firebaseapp.com",
        projectId: "catholic-security-system",
        storageBucket: "catholic-security-system.firebasestorage.app",
        messagingSenderId: "978946205343",
        appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let staffList = [], vData = {}, selectedUser = null;
    const currentY = new Date().getFullYear();

    for(let i=1; i<=12; i++) {
        document.getElementById('m-grid').innerHTML += `<div style="text-align:center; border:1px solid #eee; padding:5px;"><label style="font-size:10px;">${i}월</label><br><input type="text" id="month-${i}" style="width:100%; border:none; text-align:center; font-weight:bold;"></div>`;
    }

    function init() {
        db.collection("vacation_app").doc("data").onSnapshot(doc => {
            if(doc.exists) {
                staffList = doc.data().staff || [];
                vData = doc.data().vocation || {};
                render();
            }
        });
    }

    function render() {
        const container = document.getElementById('main-table');
        container.innerHTML = '';

        // 1. 지휘부 섹션
        const leaders = staffList.filter(s => s.g === "지휘부");
        container.appendChild(createRow("지휘부", leaders, true));

        // 2. 성의회관 파트 (레이블 + 반장 + 조원)
        container.appendChild(createBuildingSection("성 의 회 관", "유정수", "성의"));

        // 3. 옴니버스파크 파트 (레이블 + 반장 + 조원)
        container.appendChild(createBuildingSection("옴 니 버 스 파 크", "오제준", "옴니"));
    }

    function createBuildingSection(bName, chiefName, filterKey) {
        const wrapper = document.createDocumentFragment();
        
        // 건물명 레이블 행 (좌측 탭 살아있고 오른쪽만 레이블)
        const lblRow = document.createElement('div');
        lblRow.className = 'row';
        lblRow.innerHTML = `<div class="tab-cell"></div><div class="grid-area"><div class="building-label">${bName}</div></div>`;
        wrapper.appendChild(lblRow);

        // 반장 행
        const chief = staffList.filter(s => s.g === "반장" && s.n === chiefName);
        wrapper.appendChild(createRow("반장", chief, false, true));

        // 조별 행
        ["A조", "B조", "C조"].forEach(g => {
            const members = staffList.filter(s => s.g === g && (s.p.includes(filterKey) || s.p.includes("의산연")));
            if(members.length > 0) wrapper.appendChild(createRow(g, members, false, false, "gr-" + g[0]));
        });

        return wrapper;
    }

    function createRow(title, members, isLeader = false, isChief = false, colorClass = "") {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<div class="tab-cell">${title}</div><div class="grid-area"></div>`;
        const grid = row.querySelector('.grid-area');

        members.forEach(s => {
            const card = document.createElement('div');
            card.className = `card ${colorClass} ${(isLeader || isChief) ? 'half' : ''}`;
            
            // 소장, 부소장만 직함 표시 / 나머지는 이름만
            const isTop = (s.p === "보안소장" || s.p === "부소장");
            card.innerHTML = `${isTop ? `<span class="pos">${s.p}</span>` : ''}<span class="name">${s.n}</span>`;
            
            for(let i=1; i<=12; i++) if(vData[`${currentY}-${String(i).padStart(2,'0')}`]?.[s.n]) card.classList.add('active');
            
            card.onclick = () => openModal(s);
            grid.appendChild(card);
        });

        // 빈칸 채우기
        const currentCount = (isLeader || isChief) ? members.length * 2 : members.length;
        for(let i=0; i < (4 - currentCount); i++) {
            const empty = document.createElement('div');
            empty.className = `card ${colorClass}`;
            grid.appendChild(empty);
        }

        return row;
    }

    function openModal(s) {
        selectedUser = s;
        document.getElementById('m-name').innerText = s.p + " " + s.n;
        for(let i=1; i<=12; i++) document.getElementById(`month-${i}`).value = vData[`${currentY}-${String(i).padStart(2,'0')}`]?.[s.n] || "";
        document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    async function save() {
        const up = {};
        for(let i=1; i<=12; i++) up[`vocation.${currentY}-${String(i).padStart(2,'0')}.${selectedUser.n}`] = document.getElementById(`month-${i}`).value.trim();
        await db.collection("vacation_app").doc("data").update(up);
        closeModal();
    }
    window.onload = init;
</script>
</body>
</html>
