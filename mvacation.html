<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>연차 관리</title>
    <style>
        :root { --bg: #f2f4f7; --color-a: #d3f9d8; --color-b: #ffec99; --color-c: #ffc9c9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        body { background: var(--bg); padding: 5px; } /* 외부 여백 최소화 */
        .app-container { max-width: 800px; margin: 0 auto; }
        
        .section-row { 
            display: flex; background: #fff; border-radius: 12px; 
            margin-bottom: 6px; overflow: hidden; /* 행 간격 대폭 축소 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eef0f2;
        }
        .tab-cell { 
            width: 50px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 12px; color: #495057; background: #f1f3f5;
            flex-shrink: 0; text-align: center;
        }
        .grid-area { display: grid; grid-template-columns: repeat(4, 1fr); flex-grow: 1; gap: 5px; padding: 8px; }

        .label-building { 
            grid-column: span 2; background: #495057; color: #fff; font-size: 9px; 
            font-weight: bold; display: flex; align-items: center; justify-content: center; 
            height: 20px; border-radius: 4px; margin-bottom: 0px;
        }

        .card { 
            background: #fff; border-radius: 8px; height: 38px; /* 카드 높이 축소 */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid #eee;
        }
        .pos { font-size: 8px; color: #339af0; font-weight: bold; margin-bottom: 0px; }
        .name { font-size: 14px; font-weight: 900; color: #212529; }

        .row-A .tab-cell { background: var(--color-a); }
        .row-B .tab-cell { background: var(--color-b); }
        .row-C .tab-cell { background: var(--color-c); }
        .empty-card { border: none; background: transparent; }
    </style>
</head>
<body>

<div class="app-container" id="main-table"></div>

<script>
    const staffData = [
        { section: "지휘부", name: "이규용", pos: "보안소장" },
        { section: "지휘부", name: "박상현", pos: "부소장" },
        { section: "반장", name: "유정수", pos: "" },
        { section: "반장", name: "오제준", pos: "" },
        { section: "A조", name: "배준용", pos: "" }, { section: "A조", name: "이명구", pos: "" },
        { section: "A조", name: "손병휘", pos: "" }, { section: "A조", name: "권순호", pos: "" },
        { section: "A조", name: "김영중", pos: "" }, { section: "A조", name: "김삼동", pos: "" },
        { section: "A조", name: "김전식", pos: "" },
        { section: "B조", name: "심규천", pos: "" }, { section: "B조", name: "임종현", pos: "" },
        { section: "B조", name: "황일범", pos: "" }, { section: "B조", name: "이상길", pos: "" },
        { section: "B조", name: "권영국", pos: "" }, { section: "B조", name: "전준수", pos: "" },
        { section: "B조", name: "허용", pos: "" },
        { section: "C조", name: "황재업", pos: "" }, { section: "C조", name: "이태원", pos: "" },
        { section: "C조", name: "피재영", pos: "" }, { section: "C조", name: "남형민", pos: "" },
        { section: "C조", name: "김태언", pos: "" }, { section: "C조", name: "이정석", pos: "" },
        { section: "C조", name: "강경훈", pos: "" }
    ];

    function render() {
        const container = document.getElementById('main-table');
        let html = '';

        // 1. 지휘부 (소장 회관중앙, 부소장 옴니중앙 정렬)
        const leaders = staffData.filter(d => d.section === "지휘부");
        html += `<div class="section-row"><div class="tab-cell">지휘부</div><div class="grid-area">
                    <div class="empty-card"></div>${createCard(leaders[0])} <div class="empty-card"></div>${createCard(leaders[1])} </div></div>`;

        // 2. 레이블 (반장 위)
        html += `<div style="display:flex; margin-bottom:2px;">
                    <div style="width:50px;"></div>
                    <div class="grid-area" style="padding:0 8px;">
                        <div class="label-building">성 의 회 관</div><div class="label-building">옴 니 버 스 파 크</div>
                    </div></div>`;

        // 3. 반장 (각각 중앙 정렬)
        const chiefs = staffData.filter(d => d.section === "반장");
        html += `<div class="section-row"><div class="tab-cell">반장</div><div class="grid-area">
                    <div class="empty-card"></div>${createCard(chiefs[0])} <div class="empty-card"></div>${createCard(chiefs[1])} </div></div>`;

        // 4. A, B, C조 (여백 최소화)
        ["A조", "B조", "C조"].forEach(g => {
            const members = staffData.filter(d => d.section === g);
            html += `<div class="section-row row-${g[0]}"><div class="tab-cell">${g}</div><div class="grid-area">`;
            for(let i=0; i<8; i++) html += createCard(members[i] || null);
            html += `</div></div>`;
        });

        container.innerHTML = html;
    }

    function createCard(person) {
        if(!person) return `<div class="card empty-card"></div>`;
        const posLabel = person.pos ? `<span class="pos">${person.pos}</span>` : '';
        return `<div class="card">${posLabel}<span class="name">${person.name}</span></div>`;
    }

    render();
</script>
</body>
</html>
