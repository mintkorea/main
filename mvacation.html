<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        header { background: white; border-radius: 0.75rem; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); border: 1px solid #e5e7eb; margin-bottom: 0.75rem; padding: 0.75rem; }
        .section-row { display: flex; background: #fff; border-radius: 8px; margin-bottom: 4px; overflow: hidden; border: 1px solid #f1f3f5; }
        .tab-cell { width: 44px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; color: #495057; background: #f1f3f5; flex-shrink: 0; }
        .grid-area { display: grid; grid-template-columns: repeat(4, 1fr); flex-grow: 1; gap: 4px; padding: 6px; }
        .bg-sung { background-color: #f3ece3; color: #5d564f; border: 1px solid #e5dbcd; }
        .bg-omni { background-color: #d9eada; color: #4d5d4d; border: 1px solid #c9decb; }
        .border-leader { border: 2px solid #cbd5e1 !important; }
        .border-sung { border: 2px solid #e5dbcd !important; }
        .border-omni { border: 2px solid #c9decb !important; }
        .label-building { grid-column: span 2; font-size: 15px; font-weight: 900; display: flex; align-items: center; justify-content: center; height: 40px; border-radius: 6px; letter-spacing: 1px; }
        .card { background: #fff; border-radius: 5px; height: 34px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .pos { font-size: 8px; font-weight: 900; color: #64748b; margin-bottom: 1px; }
        .name { font-size: 14px; font-weight: 900; color: #1e293b; }
        /* 연차 숫자 배지: 빨간색 원형 */
        .v-badge { position: absolute; top: -6px; right: -4px; background: #ef4444; color: white; font-size: 10px; font-weight: 900; min-width: 16px; height: 16px; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 10; border: 1px solid white; }
        .center-grid { display: grid; grid-template-columns: 0.5fr 1fr 0.5fr 0.5fr 1fr 0.5fr; flex-grow: 1; gap: 4px; padding: 6px; }
        .row-A .tab-cell { background: #d3f9d8; }
        .row-B .tab-cell { background: #ffec99; }
        .row-C .tab-cell { background: #ffc9c9; }
        /* 모달 디자인: 시인성 극대화 */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 360px; border-radius: 20px; padding: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .month-box { border: 2px solid #f8f9fa; border-radius: 12px; padding: 12px 0; text-align: center; background: #f8f9fa; }
        .month-name { font-size: 26px; font-weight: 900; color: #1e293b; line-height: 1; }
        .month-input { width: 100%; border: none; text-align: center; font-size: 18px; font-weight: 900; color: #2563eb; outline: none; background: transparent; }
    </style>
</head>
<body class="p-2">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl">📅</span>
                <h1 class="text-lg font-black text-slate-800">보안 연차 현황 (실시간)</h1>
            </div>
            <div id="db-status" class="text-[9px] font-bold text-slate-400">● 연결 중...</div>
        </header>

        <div class="space-y-1 mt-2">
            <div class="section-row">
                <div class="tab-cell">지휘부</div>
                <div class="center-grid">
                    <div></div><div class="card border-leader" onclick="openModal('이규용')"><span class="v-badge"></span><span class="pos">보안소장</span><span class="name">이규용</span></div><div></div>
                    <div></div><div class="card border-leader" onclick="openModal('박상현')"><span class="v-badge"></span><span class="pos">부소장</span><span class="name">박상현</span></div><div></div>
                </div>
            </div>

            <div class="flex"><div style="width:44px;"></div>
                <div class="grid-area" style="padding:4px 8px; gap:6px;">
                    <div class="label-building bg-sung">성 의 회 관</div>
                    <div class="label-building bg-omni">옴니버스 파크</div>
                </div>
            </div>

            <div class="section-row">
                <div class="tab-cell">반장</div>
                <div class="center-grid">
                    <div></div><div class="card border-sung" onclick="openModal('유정수')"><span class="v-badge"></span><span class="name">유정수</span></div><div></div>
                    <div></div><div class="card border-omni" onclick="openModal('오제준')"><span class="v-badge"></span><span class="name">오제준</span></div><div></div>
                </div>
            </div>

            <div class="section-row row-A"><div class="tab-cell">A조</div>
                <div class="grid-area">
                    <div class="card border-sung" onclick="openModal('배준용')"><span class="v-badge"></span><span class="name">배준용</span></div>
                    <div class="card border-sung" onclick="openModal('이명구')"><span class="v-badge"></span><span class="name">이명구</span></div>
                    <div class="card border-omni" onclick="openModal('손병휘')"><span class="v-badge"></span><span class="name">손병휘</span></div>
                    <div class="card border-omni" onclick="openModal('권순호')"><span class="v-badge"></span><span class="name">권순호</span></div>
                    <div class="card border-omni" onclick="openModal('김영중')"><span class="v-badge"></span><span class="name">김영중</span></div>
                    <div class="card border-omni" onclick="openModal('김삼동')"><span class="v-badge"></span><span class="name">김삼동</span></div>
                    <div class="card border-omni" onclick="openModal('김전식')"><span class="v-badge"></span><span class="name">김전식</span></div>
                    <div class="card border-omni opacity-20"></div>
                </div>
            </div>
            </div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h2 id="modalName" class="font-black text-xl text-slate-800">이름</h2>
                <button onclick="closeModal()" class="px-5 py-2 bg-blue-600 text-white rounded-xl font-black text-sm shadow-md">저장 및 확인</button>
            </div>
            <div class="month-grid" id="monthGrid"></div>
        </div>
    </div>

    <script>
        // 🛠 파이어베이스 설정 (본인의 정보를 입력하세요)
        const firebaseConfig = {
            apiKey: "본인의_API_KEY",
            databaseURL: "본인의_데이터베이스_URL",
            projectId: "본인의_프로젝트ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let targetName = "";

        // 실시간 동기화: DB 값이 변경될 때마다 화면 배지 자동 업데이트
        db.ref('vacations').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            document.getElementById('db-status').innerText = "● 실시간 연결됨";
            document.getElementById('db-status').style.color = "#10b981";
            
            document.querySelectorAll('.card').forEach(card => {
                const name = card.querySelector('.name')?.innerText;
                const badge = card.querySelector('.v-badge');
                if(name && data[name]) {
                    const total = data[name].reduce((a, b) => a + (parseInt(b) || 0), 0);
                    if(total > 0) {
                        badge.innerText = total;
                        badge.style.display = 'flex';
                    } else { badge.style.display = 'none'; }
                }
            });
        });

        function openModal(name) {
            targetName = name;
            document.getElementById('modalName').innerText = name + " 연차 기록";
            const grid = document.getElementById('monthGrid');
            grid.innerHTML = '';

            db.ref('vacations/' + name).once('value').then((snapshot) => {
                const vals = snapshot.val() || Array(12).fill(0);
                for(let i=0; i<12; i++) {
                    grid.innerHTML += `
                        <div class="month-box">
                            <div class="month-name">${i+1}월</div>
                            <input type="number" class="month-input" value="${vals[i]}" 
                                   onchange="updateDB(${i}, this.value)">
                        </div>`;
                }
                document.getElementById('modal').style.display = 'flex';
            });
        }

        function updateDB(idx, val) {
            db.ref('vacations/' + targetName).once('value').then((snapshot) => {
                let currentData = snapshot.val() || Array(12).fill(0);
                currentData[idx] = parseInt(val) || 0;
                db.ref('vacations/' + targetName).set(currentData);
            });
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
