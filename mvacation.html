<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 연차 관리</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #f8fafc; --primary: #1e293b; --accent: #3b82f6; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg); padding-bottom: 80px; }
        .app-header { background: white; padding: 20px; text-align: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        #sync-status { font-size: 10px; padding: 4px 10px; border-radius: 20px; background: #fee2e2; color: #991b1b; margin-top: 5px; display: inline-block; font-weight: bold; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; min-height: 300px; }
        .group-section { margin-bottom: 20px; }
        .group-title { font-size: 13px; font-weight: 800; color: #64748b; margin: 0 0 10px 5px; display: flex; align-items: center; }
        .group-title::before { content: ""; width: 3px; height: 12px; background: var(--accent); margin-right: 6px; border-radius: 2px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; background: white; padding: 12px; border-radius: 16px; border: 1px solid var(--border); }
        .person-card { background: #f1f5f9; border: 1px solid var(--border); border-radius: 10px; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; color: #334155; cursor: pointer; }
        .person-card.active { border-color: var(--accent); background: #eff6ff; color: var(--accent); border-width: 2px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: white; border-top: 1px solid var(--border); display: flex; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #94a3b8; font-size: 10px; font-weight: 800; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

<header class="app-header">
    <h1 style="font-size:18px; font-weight:900;">🛡️ 성의교정 연차 관리</h1>
    <div id="sync-status">📡 서버 연결 시도 중...</div>
</header>

<div class="container" id="group-list">
    <div id="loading-msg" style="text-align:center; padding-top:100px; color:#94a3b8; font-weight:bold;">
        데이터를 불러오고 있습니다...<br><span style="font-size:12px;">(10초 이상 소요 시 DB 설정을 확인하세요)</span>
    </div>
</div>

<nav class="nav-bar">
    <a href="#" class="nav-item active">연차입력</a>
    <a href="calendar.html" class="nav-item">달력보기</a>
</nav>

<script>
    // 1. 임시 로컬 데이터 (DB 연결 실패 시 보여줄 기본 명단)
    const TEMP_STAFF = [
        { n: "황재업", g: "지휘부" },
        { n: "김태언", g: "A조" }, { n: "이정석", g: "A조" },
        { n: "이태원", g: "B조" }
    ];

    // 2. Firebase 설정 (마이그레이션한 DB 정보)
    const firebaseConfig = {
        apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU",
        projectId: "catholic-security-system",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let vData = {};

    function init() {
        const status = document.getElementById('sync-status');
        
        // 실시간 감시 시작
        db.collection("vocation_app").doc("data").onSnapshot(doc => {
            if(doc.exists) {
                const data = doc.data();
                vData = data.vocation || {};
                const staff = data.staff || [];
                
                if (staff.length > 0) {
                    render(staff);
                    status.innerText = "● 실시간 동기화 완료";
                    status.style.background = "#c6f6d5"; status.style.color = "#22543d";
                } else {
                    status.innerText = "⚠ 명단 데이터가 비어있음 (임시 표시)";
                    render(TEMP_STAFF);
                }
            } else {
                status.innerText = "❌ DB 문서(data)를 찾을 수 없음 (임시 표시)";
                render(TEMP_STAFF);
            }
        }, err => {
            status.innerText = "❌ 연결 오류: " + err.code;
            render(TEMP_STAFF);
        });
    }

    function render(staff) {
        const list = document.getElementById('group-list');
        list.innerHTML = ''; // 로딩 메시지 제거
        
        const groups = ["지휘부/반장", "A조", "B조", "C조"];
        groups.forEach(gName => {
            const members = staff.filter(p => {
                if(gName === "지휘부/반장") return p.g === "지휘부" || p.g === "반장";
                return p.g === gName;
            });

            if(members.length > 0) {
                const sec = document.createElement('div');
                sec.className = 'group-section';
                sec.innerHTML = `<div class="group-title">${gName}</div><div class="card-grid"></div>`;
                const grid = sec.querySelector('.card-grid');
                members.forEach(p => {
                    const active = (vData[p.n]) ? 'active' : '';
                    grid.innerHTML += `<div class="person-card ${active}">${p.n}</div>`;
                });
                list.appendChild(sec);
            }
        });
    }

    window.onload = init;
</script>
</body>
</html>
