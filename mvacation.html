<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        header { background: white; border-radius: 0.75rem; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); border: 1px solid #e5e7eb; margin-bottom: 0.75rem; padding: 0.75rem; }

        .section-row { display: flex; background: #fff; border-radius: 8px; margin-bottom: 4px; overflow: hidden; border: 1px solid #f1f3f5; }
        .tab-cell { width: 44px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; color: #495057; background: #f1f3f5; flex-shrink: 0; }
        .grid-area { display: grid; grid-template-columns: repeat(4, 1fr); flex-grow: 1; gap: 4px; padding: 6px; }

        .bg-sung { background-color: #f3ece3; color: #5d564f; border: 1px solid #e5dbcd; }
        .bg-omni { background-color: #d9eada; color: #4d5d4d; border: 1px solid #c9decb; }
        
        .border-leader { border: 2px solid #cbd5e1 !important; }
        .border-sung { border: 2px solid #e5dbcd !important; } 
        .border-omni { border: 2px solid #c9decb !important; } 

        .label-building { grid-column: span 2; font-size: 15px; font-weight: 900; display: flex; align-items: center; justify-content: center; height: 40px; border-radius: 6px; letter-spacing: 1px; }

        .card { background: #fff; border-radius: 5px; height: 34px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .pos { font-size: 8px; font-weight: 900; color: #64748b; margin-bottom: 1px; }
        .name { font-size: 14px; font-weight: 900; color: #1e293b; }
        
        /* 연차 숫자 표시 */
        .v-count { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; font-size: 8px; padding: 1px 3px; border-radius: 4px; display: none; font-weight: bold; }

        .center-grid { display: grid; grid-template-columns: 0.5fr 1fr 0.5fr 0.5fr 1fr 0.5fr; flex-grow: 1; gap: 4px; padding: 6px; }
        
        /* 조별 배경색 */
        .row-A .tab-cell { background: #d3f9d8; }
        .row-B .tab-cell { background: #ffec99; }
        .row-C .tab-cell { background: #ffc9c9; }

        /* 모달 스타일 */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 360px; border-radius: 20px; padding: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .month-box { border: 2px solid #f1f3f5; border-radius: 12px; padding: 10px 5px; text-align: center; cursor: pointer; transition: 0.2s; }
        .month-name { font-size: 24px; font-weight: 900; color: #1e293b; }
        .month-input { width: 100%; border: none; background: transparent; text-align: center; font-size: 18px; font-weight: 900; color: #3b82f6; outline: none; }
        .month-box.editing { border-color: #3b82f6; background: #eff6ff; }
    </style>
</head>
<body class="p-2">
    <div class="max-w-md mx-auto">
        <header>
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <span class="text-xl">📅</span>
                    <h1 class="text-lg font-black text-slate-800">보안 연차 현황</h1>
                </div>
                <div class="text-[8px] font-bold text-green-500">● DB 연동됨</div>
            </div>
            <div class="flex items-center gap-2 w-full">
                <div class="bg-slate-50 border rounded-lg h-9 flex-[1.2] flex items-center px-3">
                    <span class="text-xs font-black text-slate-700">2026년 연차 마스터</span>
                </div>
                <a href="calendar.html" class="h-9 bg-slate-800 text-white rounded-lg font-black flex-1 flex items-center justify-center text-xs">근무달력 🔗</a>
            </div>
        </header>

        <div class="space-y-1">
            <div class="section-row">
                <div class="tab-cell">지휘부</div>
                <div class="center-grid">
                    <div></div><div class="card border-leader" onclick="openModal('이규용')"><span class="pos">보안소장</span><span class="name">이규용</span><span class="v-count">0</span></div><div></div>
                    <div></div><div class="card border-leader" onclick="openModal('박상현')"><span class="pos">부소장</span><span class="name">박상현</span><span class="v-count">0</span></div><div></div>
                </div>
            </div>

            <div class="flex"><div style="width:44px;"></div>
                <div class="grid-area" style="padding:4px 8px; gap:6px;">
                    <div class="label-building bg-sung">성 의 회 관</div>
                    <div class="label-building bg-omni">옴니버스 파크</div>
                </div>
            </div>

            <div class="section-row">
                <div class="tab-cell">반장</div>
                <div class="center-grid">
                    <div></div><div class="card border-sung" onclick="openModal('유정수')"><span class="name">유정수</span><span class="v-count">0</span></div><div></div>
                    <div></div><div class="card border-omni" onclick="openModal('오제준')"><span class="name">오제준</span><span class="v-count">0</span></div><div></div>
                </div>
            </div>

            <div class="section-row row-A"><div class="tab-cell">A조</div>
                <div class="grid-area">
                    <div class="card border-sung" onclick="openModal('배준용')"><span class="name">배준용</span><span class="v-count">0</span></div>
                    <div class="card border-sung" onclick="openModal('이명구')"><span class="name">이명구</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('손병휘')"><span class="name">손병휘</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('권순호')"><span class="name">권순호</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('김영중')"><span class="name">김영중</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('김삼동')"><span class="name">김삼동</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('김전식')"><span class="name">김전식</span><span class="v-count">0</span></div>
                    <div class="card border-omni border-dashed opacity-20"></div>
                </div>
            </div>

            <div class="section-row row-B"><div class="tab-cell">B조</div>
                <div class="grid-area">
                    <div class="card border-sung" onclick="openModal('심규천')"><span class="name">심규천</span><span class="v-count">0</span></div>
                    <div class="card border-sung" onclick="openModal('임종현')"><span class="name">임종현</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('황일범')"><span class="name">황일범</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('이상길')"><span class="name">이상길</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('권영국')"><span class="name">권영국</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('전준수')"><span class="name">전준수</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('허용')"><span class="name">허용</span><span class="v-count">0</span></div>
                    <div class="card border-omni border-dashed opacity-20"></div>
                </div>
            </div>

            <div class="section-row row-C"><div class="tab-cell">C조</div>
                <div class="grid-area">
                    <div class="card border-sung" onclick="openModal('황재업')"><span class="name">황재업</span><span class="v-count">0</span></div>
                    <div class="card border-sung" onclick="openModal('이태원')"><span class="name">이태원</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('피재영')"><span class="name">피재영</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('남형민')"><span class="name">남형민</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('김태언')"><span class="name">김태언</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('이정석')"><span class="name">이정석</span><span class="v-count">0</span></div>
                    <div class="card border-omni" onclick="openModal('강경훈')"><span class="name">강경훈</span><span class="v-count">0</span></div>
                    <div class="card border-omni border-dashed opacity-20"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center border-b pb-3 mb-2">
                <h2 id="modalTitle" class="font-black text-lg text-slate-800">연차 입력</h2>
                <button onclick="saveAndClose()" class="text-blue-600 font-black">저장</button>
            </div>
            <div class="month-grid" id="monthGrid"></div>
        </div>
    </div>

    <script>
        let currentTarget = "";
        const storageKey = "vacation_db_2026";

        // 초기 데이터 로드
        window.onload = () => { refreshCounts(); };

        function openModal(name) {
            currentTarget = name;
            document.getElementById('modalTitle').innerText = name + ' 연차 관리';
            const grid = document.getElementById('monthGrid');
            grid.innerHTML = '';

            const db = JSON.parse(localStorage.getItem(storageKey) || "{}");
            const userData = db[name] || Array(12).fill(0);

            for(let i=1; i<=12; i++) {
                const box = document.createElement('div');
                box.className = 'month-box';
                box.innerHTML = `
                    <div class="month-name">${i}월</div>
                    <input type="number" class="month-input" value="${userData[i-1]}" 
                           onfocus="this.parentElement.classList.add('editing')" 
                           onblur="this.parentElement.classList.remove('editing')">
                `;
                grid.appendChild(box);
            }
            document.getElementById('modal').style.display = 'flex';
        }

        function saveAndClose() {
            const inputs = document.querySelectorAll('.month-input');
            const data = Array.from(inputs).map(input => parseInt(input.value) || 0);
            
            const db = JSON.parse(localStorage.getItem(storageKey) || "{}");
            db[currentTarget] = data;
            localStorage.setItem(storageKey, JSON.stringify(db));
            
            document.getElementById('modal').style.display = 'none';
            refreshCounts();
        }

        function refreshCounts() {
            const db = JSON.parse(localStorage.getItem(storageKey) || "{}");
            document.querySelectorAll('.card').forEach(card => {
                const name = card.querySelector('.name')?.innerText;
                const badge = card.querySelector('.v-count');
                if(name && db[name]) {
                    const total = db[name].reduce((a, b) => a + b, 0);
                    if(total > 0) {
                        badge.innerText = total;
                        badge.style.display = 'block';
                    } else {
                        badge.style.display = 'none';
                    }
                }
            });
        }

        function closeModal(e) { if(e.target.id === 'modal') saveAndClose(); }
    </script>
</body>
</html>
