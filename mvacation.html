<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { 
            --calendar-border: #efefef;
            --text-main: #111;
            --text-sub: #888;
            --color-seongui: #f3ece3; --color-omnibus: #d9eada;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; letter-spacing: -0.8px; }
        body { background: #fff; overflow: hidden; } /* 달력처럼 깔끔한 화이트 배경 */
        
        .app-container { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }

        /* [핵심] 달력 디자인 그대로 베낀 상단바 */
        .header-bar {
            height: 55px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid var(--calendar-border);
            background: #fff;
        }
        .month-selector { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 800; color: var(--text-main); }
        .nav-arrow { color: #ccc; font-size: 24px; cursor: pointer; font-weight: 300; }
        .header-title { font-size: 16px; font-weight: 700; color: #444; }
        .calendar-btn { font-size: 13px; color: #777; border: 1px solid #ddd; padding: 5px 12px; border-radius: 6px; text-decoration: none; }

        /* 압축형 컨텐츠 레이아웃 */
        .content { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }

        .section-row { 
            display: flex; background: #fff; border-radius: 10px; 
            margin-bottom: 4px; overflow: hidden; border: 1px solid #f2f2f2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .tab-cell { 
            width: 45px; display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 11px; color: #555; background: #f8f9fa; flex-shrink: 0;
        }
        .grid-area { display: grid; grid-template-columns: repeat(4, 1fr); flex-grow: 1; gap: 6px; padding: 8px; }

        /* 건물 배지 */
        .label-row { display: flex; margin: 2px 0; }
        .label-building { 
            grid-column: span 2; font-size: 12px; font-weight: 800; 
            display: flex; align-items: center; justify-content: center; 
            height: 28px; border-radius: 6px;
        }
        .label-seongui { background: var(--color-seongui); color: #5d564f; border: 1px solid #e2d7cb; }
        .label-omnibus { background: var(--color-omnibus); color: #4d5d4d; border: 1px solid #c9decb; }

        /* 카드 높이 38px로 압축 고정 */
        .card { 
            background: #fff; border-radius: 8px; height: 38px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid #f0f0f0; width: 100%;
        }
        .pos { font-size: 7.5px; color: #339af0; font-weight: 800; margin-bottom: 1px; }
        .name { font-size: 14.5px; font-weight: 800; color: #222; }

        /* 지휘부/반장용 중앙 정렬 그리드 */
        .center-grid { display: grid; grid-template-columns: 0.5fr 1fr 0.5fr 0.5fr 1fr 0.5fr; flex-grow: 1; gap: 6px; padding: 8px; }

        .row-A .tab-cell { background: #d3f9d8; }
        .row-B .tab-cell { background: #ffec99; }
        .row-C .tab-cell { background: #ffc9c9; }
        .empty-card { height: 38px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-bar">
        <div class="month-selector">
            <span class="nav-arrow">〈</span>
            <span>2026. 04</span>
            <span class="nav-arrow">〉</span>
        </div>
        <div class="header-title">보안 연차 현황</div>
        <a href="#" class="calendar-btn">근무달력</a>
    </div>

    <div class="content">
        <div class="section-row"><div class="tab-cell">지휘부</div><div class="center-grid">
            <div class="empty-card"></div><div class="card"><span class="pos">보안소장</span><span class="name">이규용</span></div><div class="empty-card"></div>
            <div class="empty-card"></div><div class="card"><span class="pos">부소장</span><span class="name">박상현</span></div><div class="empty-card"></div>
        </div></div>

        <div class="label-row"><div style="width:45px;"></div>
            <div class="grid-area" style="padding:0 8px; gap:6px;">
                <div class="label-building label-seongui">성 의 회 관</div><div class="label-building label-omnibus">옴 니 버 스 파 크</div>
            </div></div>

        <div class="section-row"><div class="tab-cell">반장</div><div class="center-grid">
            <div class="empty-card"></div><div class="card"><span class="name">유정수</span></div><div class="empty-card"></div>
            <div class="empty-card"></div><div class="card"><span class="name">오제준</span></div><div class="empty-card"></div>
        </div></div>

        <div id="staff-rows" style="display:contents;"></div>
    </div>
</div>

<script>
    const data = [
        { t: "A조", n: ["배준용","이명구","손병휘","권순호","김영중","김삼동","김전식"] },
        { t: "B조", n: ["심규천","임종현","황일범","이상길","권영국","전준수","허용"] },
        { t: "C조", n: ["황재업","이태원","피재영","남형민","김태언","이정석","강경훈"] }
    ];
    document.getElementById('staff-rows').innerHTML = data.map(g => `
        <div class="section-row row-${g.t[0]}"><div class="tab-cell">${g.t}</div>
        <div class="grid-area">${Array.from({length:8}, (_,i)=> g.n[i] 
            ? `<div class="card"><span class="name">${g.n[i]}</span></div>` 
            : `<div class="empty-card"></div>`).join('')}
        </div></div>`).join('');
</script>
</body>
</html>
