<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 식단안내</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { 
            font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #1e293b;
            letter-spacing: -0.05em; margin: 0; padding: 0;
        }
        /* 인덱스와 통일된 헤더 스타일 */
        .brand-header { 
            background: linear-gradient(135deg, #2d3e75 0%, #1e293b 100%);
            padding: 20px 16px 45px 16px; color: white; 
            border-bottom-left-radius: 24px; border-bottom-right-radius: 24px;
        }
        .custom-date-trigger {
            background-color: rgba(255, 255, 255, 0.15);
            color: white; font-size: 16px; font-weight: 800; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center;
            margin-top: 10px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .content-card {
            background: white; border-radius: 16px; margin: -25px 12px 12px 12px;
            padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative; z-index: 10;
        }
        .meal-title { font-size: 1.1rem; font-weight: 900; color: #1e293b; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .meal-box { background-color: #f8fafc; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .menu-text { font-size: 1.05rem; font-weight: 700; color: #334155; line-height: 1.6; word-break: keep-all; }
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; background: white; 
            display: flex; justify-content: space-around; padding: 12px;
            border-top: 1px solid #e2e8f0; box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        }
        .nav-btn { font-size: 0.85rem; font-weight: 800; color: #64748b; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .active-nav { color: #2d3e75; }
    </style>
</head>
<body class="pb-20">
    <div class="brand-header">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter">식단 상세조회</h1>
                <div id="datePickerTrigger" class="custom-date-trigger">날짜 선택</div>
            </div>
            <div id="shift-badge" class="px-3 py-1.5 rounded-lg font-black text-[12px] bg-white/20 text-white">
                오늘의 식단
            </div>
        </div>
    </div>

    <div class="content-card">
        <div class="meal-title"><span class="text-orange-500">☀️</span> 중식 (11:30~13:30)</div>
        <div class="meal-box">
            <div id="lunch-menu" class="menu-text">데이터를 불러오는 중...</div>
        </div>

        <div class="meal-title"><span class="text-indigo-500">🌙</span> 야식 (23:30~00:30)</div>
        <div class="meal-box">
            <div id="night-menu" class="menu-text">데이터를 불러오는 중...</div>
        </div>
        
        <p class="text-[11px] text-slate-400 font-medium text-center mt-4">
            * 식단은 식당 사정에 따라 변경될 수 있습니다.
        </p>
    </div>

    <nav class="nav-bar">
        <div onclick="moveDate(-1)" class="nav-btn"><span>◀</span><span>이전날</span></div>
        <div onclick="moveDate(0)" class="nav-btn active-nav"><span>📅</span><span>오늘</span></div>
        <div onclick="moveDate(1)" class="nav-btn"><span>▶</span><span>다음날</span></div>
        <div onclick="location.href='index.html'" class="nav-btn"><span>🏠</span><span>홈으로</span></div>
    </nav>

    <script>
        const MEAL_API = "https://script.google.com/macros/s/AKfycbxZkcn8EEcGcxMaT98l_CKJTCM_0Ual_S2JefpHptm_dbEtQ5tjM00TEhU2XdqTObLh/exec";
        let currentDate = new Date();
        let mealData = null;

        // URL 파라미터 날짜 확인
        function initDate() {
            const params = new URLSearchParams(window.location.search);
            const dateParam = params.get('date');
            if (dateParam) {
                const parsed = new Date(dateParam);
                if (!isNaN(parsed)) currentDate = parsed;
            }
        }

        async function fetchMeals() {
            try {
                const res = await fetch(MEAL_API);
                mealData = await res.json();
                updateDisplay();
            } catch (e) {
                document.getElementById('lunch-menu').innerText = "식단 정보를 가져오지 못했습니다.";
            }
        }

        function updateDisplay() {
            const days = ['일','월','화','수','목','금','토'];
            const y = currentDate.getFullYear();
            const m = String(currentDate.getMonth() + 1).padStart(2, '0');
            const d = String(currentDate.getDate()).padStart(2, '0');
            const dateStr = `${y}-${m}-${d}`;

            // 날짜 표시 업데이트
            document.getElementById('datePickerTrigger').innerText = `${y}.${currentDate.getMonth()+1}.${currentDate.getDate()} (${days[currentDate.getDay()]})`;
            
            if (mealData && mealData[dateStr]) {
                const lunch = mealData[dateStr]["중식"]?.menu || "등록된 식단이 없습니다.";
                const night = mealData[dateStr]["야식"]?.menu || "등록된 식단이 없습니다.";
                document.getElementById('lunch-menu').innerText = lunch;
                document.getElementById('night-menu').innerText = night;
            } else {
                document.getElementById('lunch-menu').innerText = "등록된 식단 정보가 없습니다.";
                document.getElementById('night-menu').innerText = "등록된 식단 정보가 없습니다.";
            }
        }

        function moveDate(offset) {
            if (offset === 0) currentDate = new Date();
            else currentDate.setDate(currentDate.getDate() + offset);
            updateDisplay();
        }

        window.onload = () => {
            initDate();
            flatpickr("#datePickerTrigger", { 
                locale: "ko", 
                dateFormat: "Y-m.d (D)", 
                defaultDate: currentDate,
                disableMobile: true,
                onChange: (dates) => {
                    if(dates.length) {
                        currentDate = dates[0];
                        updateDisplay();
                    }
                }
            });
            fetchMeals();
        };
    </script>
</body>
</html>
