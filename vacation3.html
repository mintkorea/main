<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성의교정 연차 관리 시스템</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --sat-bg: #f5faff; --sun-bg: #fff5f5; --primary-blue: #3498db; }
        body { margin: 0; padding: 20px; font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; }
        #paper { background: white; width: 285mm; padding: 20px; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        table { border-collapse: collapse; width: 100%; border: 1.5pt solid #000; table-layout: fixed; }
        td { border: 0.5pt solid #000; text-align: center; height: 25px; font-size: 11px; }
        .hdr { background: #f2f2f2 !important; font-weight: bold; }
        .v-mark { background-color: #d4edda !important; color: #28a745; font-weight: bold; }
        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 9999; }
        .btn { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="paper">
    <h2 id="viewTitle" style="text-align:center; text-decoration: underline;"></h2>
    <table id="displayTable"></table>
</div>

<div class="controls">
    <input type="month" id="targetMonth" onchange="render()">
    <button class="btn" style="background:#27ae60;" onclick="exportToExcel()">엑셀 다운로드</button>
    <button class="btn" style="background:#3498db;" onclick="window.print()">인쇄</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU",
        authDomain: "catholic-security-system.firebaseapp.com",
        projectId: "catholic-security-system",
        storageBucket: "catholic-security-system.firebasestorage.app",
        messagingSenderId: "978946205343",
        appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let staffData = [], vData = {};

    function initSync() {
        db.collection("vacation_system").doc("data").onSnapshot(doc => {
            if (doc.exists) {
                const d = doc.data();
                staffData = d.staff || []; vData = d.vacation || {};
                render();
            }
        });
    }

    function render() {
        const val = document.getElementById('targetMonth').value;
        if(!val) return;
        const [y, m] = val.split('-').map(Number);
        const last = new Date(y, m, 0).getDate();
        document.getElementById('viewTitle').innerText = `성의교정 연차 일정표(${y}년 ${m}월)`;

        let h = `<thead><tr class="hdr"><td>구분</td><td>조</td><td>직위</td><td>성명</td>`;
        for(let i=1; i<=last; i++) h += `<td>${i}</td>`;
        h += `</tr></thead><tbody>`;

        staffData.forEach((s, idx) => {
            const isNewG = idx===0 || staffData[idx-1].g !== s.g;
            const isNewS = idx===0 || staffData[idx-1].s !== s.s || staffData[idx-1].g !== s.g;
            h += `<tr>`;
            if(isNewG) h += `<td rowspan="${staffData.filter(x=>x.g===s.g).length}">${s.g}</td>`;
            if(isNewS) h += `<td rowspan="${staffData.filter(x=>x.g===s.g && x.s===s.s).length}">${s.s}</td>`;
            h += `<td>${s.p}</td><td>${s.n}</td>`;
            
            const mk = `${y}-${String(m).padStart(2,'0')}`;
            const vArr = (vData[mk]?.[s.n] || "").split(',').map(x=>x.trim());
            for(let i=1; i<=last; i++) {
                const isV = vArr.includes(String(i));
                h += `<td class="${isV?'v-mark':''}">${isV?'V':''}</td>`;
            }
            h += `</tr>`;
        });
        document.getElementById('displayTable').innerHTML = h + `</tbody>`;
    }

    function exportToExcel() {
        // HTML 테이블을 엑셀 워크북으로 변환 (셀 병합 정보 유지)
        const wb = XLSX.utils.table_to_book(document.getElementById('displayTable'), {
            sheet: "연차일정표", 
            raw: true
        });

        // 엑셀 옵션 설정 (인쇄 시 A4 가로 설정 등)
        const ws = wb.Sheets["연차일정표"];
        ws['!pageSetup'] = { orientation: 'landscape', paperSize: 9 }; // 9는 A4
        
        const title = document.getElementById('viewTitle').innerText;
        XLSX.writeFile(wb, `${title}.xlsx`);
    }

    window.onload = () => {
        document.getElementById('targetMonth').value = new Date().toISOString().substring(0, 7);
        initSync();
    };
</script>
</body>
</html>
