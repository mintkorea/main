<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시설관리 보안 마스터</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; }
        body { font-family: 'Malgun Gothic', sans-serif; background: #ecf0f1; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { border-left: 5px solid var(--primary); padding-left: 15px; color: var(--primary); }
        .section { background: #f9f9f9; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; }
        input, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { cursor: pointer; font-weight: bold; transition: 0.3s; border: none; }
        .btn-master { background: var(--primary); color: white; width: 100%; height: 45px; }
        .btn-csv { background: var(--accent); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #eee; }
        .hint { font-size: 0.85rem; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔑 시설 보안 관리 시스템 (v3.0)</h2>
    
    <div class="section">
        <label><strong>1. 마스터 비밀번호 입력</strong></label>
        <input type="password" id="masterKey" placeholder="이 비번을 모르면 데이터를 볼 수 없습니다" style="width: 100%;">
        <button class="btn-master" onclick="unlockData()">데이터 잠금 해제 / 조회</button>
        <p class="hint">※ 최초 사용 시 CSV를 먼저 업로드하여 암호화 저장하세요.</p>
    </div>

    <div class="section">
        <label><strong>2. 데이터 일괄 등록 (CSV)</strong></label><br>
        <input type="file" id="csvFile" accept=".csv">
        <button class="btn-csv" onclick="importCSV()">CSV 암호화 저장</button>
        <p class="hint">형식: 호실,비밀번호 (헤더 없이 입력)</p>
    </div>

    <div id="displayArea">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>호실 (Room)</th>
                    <th>비밀번호 (Password)</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const STORAGE_KEY = 'encrypted_doorlock_data';

    // 1. CSV 파일 읽기 및 AES 암호화 저장
    function importCSV() {
        const fileInput = document.getElementById('csvFile');
        const masterKey = document.getElementById('masterKey').value;

        if (!masterKey) {
            alert("암호화에 사용할 마스터 비밀번호를 먼저 입력하세요!");
            return;
        }

        if (fileInput.files.length === 0) {
            alert("CSV 파일을 선택해주세요.");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const rows = text.split('\n').filter(row => row.trim() !== '');
            const dataObj = {};

            rows.forEach(row => {
                const [room, pw] = row.split(',').map(s => s.trim());
                if(room && pw) dataObj[room] = pw;
            });

            // AES 암호화
            const encrypted = CryptoJS.AES.encrypt(JSON.stringify(dataObj), masterKey).toString();
            localStorage.setItem(STORAGE_KEY, encrypted);
            
            alert("총 " + Object.keys(dataObj).length + "개의 데이터가 암호화되어 저장되었습니다.");
            location.reload();
        };
        reader.readAsText(fileInput.files[0]);
    }

    // 2. 마스터 비번으로 데이터 복호화 및 조회
    function unlockData() {
        const masterKey = document.getElementById('masterKey').value;
        const encryptedData = localStorage.getItem(STORAGE_KEY);

        if (!encryptedData) {
            alert("저장된 데이터가 없습니다. CSV를 먼저 업로드하세요.");
            return;
        }

        try {
            // 복호화 시도
            const bytes = CryptoJS.AES.decrypt(encryptedData, masterKey);
            const decryptedData = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));

            renderTable(decryptedData);
        } catch (e) {
            alert("마스터 비밀번호가 틀렸거나 데이터가 손상되었습니다.");
        }
    }

    // 3. 테이블 출력
    function renderTable(data) {
        const tbody = document.querySelector("#resultTable tbody");
        tbody.innerHTML = "";
        
        Object.keys(data).sort().forEach(room => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${room}</td><td><strong>${data[room]}</strong></td>`;
            tbody.appendChild(tr);
        });

        document.getElementById('resultTable').style.display = 'table';
    }
</script>

</body>
</html>
