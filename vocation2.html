<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성의교정 연차 관리 시스템 v1.3</title>
    <style>
        :root { 
            --sat-bg: #f5faff; --sun-bg: #fff5f5; 
            --today-border: #ff0000; /* 오늘 날짜: 적색 */
            --select-border: #0044ff; /* 선택 날짜: 청색 */
        }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Malgun Gothic', 'Dotum', sans-serif; background: #f0f2f5; 
        }

        .floating-bar { 
            position: fixed; bottom: 20px; right: 20px; display: flex; align-items: center; gap: 8px; 
            z-index: 1000; background: white; padding: 10px 15px; border-radius: 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid #ddd; 
        }
        .btn { padding: 8px 12px; cursor: pointer; border: none; font-weight: bold; font-size: 13px; border-radius: 20px; transition: 0.2s; }
        .btn-orange { background: #e67e22; color: white; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #27ae60; color: white; }
        .btn-print { background: #2c3e50; color: white; }

        .content-area { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #paper { 
            background: white; width: 297mm; height: 210mm; box-sizing: border-box;
            padding: 15mm 10mm; display: flex; flex-direction: column; align-items: center;
            position: relative; /* 하이라이트 박스 기준점 */
        }

        #viewTitle {
            text-align: center; margin: 0 0 12px 0; font-size: 22px; 
            text-decoration: underline; text-underline-offset: 5px; text-decoration-thickness: 1.5px; letter-spacing: 2px;
        }
        
        table { border-collapse: collapse; width: 100%; border: 1.8pt solid #000; table-layout: fixed; position: relative; }
        th, td { border: 0.5pt solid #000; text-align: center; font-weight: bold; height: 16.2pt; padding: 0; box-sizing: border-box; white-space: nowrap; overflow: hidden; }

        .hdr { background: #f2f2f2 !important; height: 21pt; font-size: 11px; border-bottom: 1.5pt solid #000; cursor: pointer; }
        .col-info { font-size: 10.5px; } 
        .col-data { font-size: 9.5px; width: 45px; }

        .thick-border { border-bottom: 1.8pt solid #000 !important; }
        .border-right-bold { border-right: 1.5pt solid #000 !important; }

        /* 하이라이트 박스 스타일 (전체 열을 감쌈) */
        .col-highlight {
            position: absolute; pointer-events: none; z-index: 10;
            top: 0; height: 100%; box-sizing: border-box;
        }
        .hl-today { border: 2.5px solid var(--today-border); }
        .hl-select { border: 2.5px solid var(--select-border); }
        
        .sat { background-color: var(--sat-bg) !important; color: #007bff !important; }
        .sun { background-color: var(--sun-bg) !important; color: #dc3545 !important; }
        .v-mark { background-color: #d4edda !important; color: #28a745; font-size: 11px; cursor: pointer; }

        .edit-input { display: block; width: 100%; height: 100%; border: none; outline: none; text-align: center; font-weight: bold; box-sizing: border-box; }
        .name-edit { background-color: #E3F2FD !important; }

        /* 모달 스타일 */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; z-index: 2000; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #ccc; min-width: 250px; }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1999; }
        .modal-hdr { font-size: 16px; font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        .modal-body { font-size: 14px; line-height: 1.6; color: #333; }
        .close-btn { margin-top: 15px; width: 100%; padding: 8px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; }

        @media print {
            @page { size: A4 landscape; margin: 0; }
            .floating-bar, #modal, #modalOverlay, .col-highlight { display: none !important; }
            #paper { box-shadow: none; margin: 0; zoom: 100%; }
        }
    </style>
</head>
<body>

<div id="modalOverlay" onclick="closeModal()"></div>
<div id="modal">
    <div class="modal-hdr" id="modalTitle">상세 내역</div>
    <div class="modal-body" id="modalContent"></div>
    <button class="close-btn" onclick="closeModal()">닫기</button>
</div>

<div class="content-area">
    <div id="paper">
        <h2 id="viewTitle"></h2>
        <div id="tableWrapper" style="position:relative; width:100%;">
            <!-- 하이라이트 박스들이 이곳에 동적으로 배치됨 -->
            <table id="displayTable"></table>
        </div>
    </div>
</div>

<div class="floating-bar">
    <input type="month" id="targetMonth" onchange="render()">
    <button class="btn btn-orange" onclick="changeTab('ledger')">연차대장</button>
    <button class="btn btn-blue" onclick="changeTab('schedule')">연차일정표</button>
    <button class="btn btn-green" onclick="downloadBackup()">백업 ↓</button>
    <button class="btn btn-green" onclick="document.getElementById('fileInput').click()">복구 ↑</button>
    <button class="btn btn-print" onclick="window.print()">인쇄</button>
    <input type="file" id="fileInput" style="display:none" onchange="uploadBackup(event)" accept=".json">
</div>

<script>
    let currentTab = 'schedule';
    let activeEditColumn = null;
    let selectedScheduleDay = null;

    let staffData = JSON.parse(localStorage.getItem('staff_list_v2')) || [
        { g: "성의교정", s: "관리", p: "소장", n: "이규용" }, { g: "성의교정", s: "관리", p: "부소장", n: "박상현" },
        { g: "성의회관", s: "관리", p: "반장", n: "유정수" }, { g: "성의회관", s: "A조", p: "조장", n: "배준용" },
        { g: "성의회관", s: "A조", p: "조원", n: "김영중" }, { g: "성의회관", s: "A조", p: "조원", n: "이명구" },
        { g: "성의회관", s: "A조", p: "조원", n: "김삼동" }, { g: "성의회관", s: "B조", p: "조장", n: "심규천" },
        { g: "성의회관", s: "B조", p: "조원", n: "권영국" }, { g: "성의회관", s: "B조", p: "조원", n: "임종현" },
        { g: "성의회관", s: "B조", p: "조원", n: "전준수" }, { g: "성의회관", s: "C조", p: "조장", n: "황재업" },
        { g: "성의회관", s: "C조", p: "조원", n: "김태언" }, { g: "성의회관", s: "C조", p: "조원", n: "이태원" },
        { g: "성의회관", s: "C조", p: "조원", n: "이정석" }, { g: "옴니버스", s: "관리", p: "반장", n: "오재준" },
        { g: "옴니버스", s: "A조", p: "조장", n: "손병휘" }, { g: "옴니버스", s: "A조", p: "조원", n: "김전식" },
        { g: "옴니버스", s: "A조", p: "조원", n: "권순호" }, { g: "옴니버스", s: "B조", p: "조장", n: "황일범" },
        { g: "옴니버스", s: "B조", p: "조원", n: "이상길" }, { g: "옴니버스", s: "B조", p: "조원", n: "허용" },
        { g: "옴니버스", s: "C조", p: "조장", n: "피재영" }, { g: "옴니버스", s: "C조", p: "조원", n: "남형민" },
        { g: "옴니버스", s: "C조", p: "조원", n: "강경훈" }, { g: "기숙사", s: "관리", p: "반장", n: "이강택" },
        { g: "기숙사", s: "관리", p: "조원", n: "유시균" }, { g: "기숙사", s: "관리", p: "조원", n: "이상현" }
    ];

    let vData = JSON.parse(localStorage.getItem('v_data_v34')) || {};

    function showVDetail(name, monthStr) {
        const raw = vData[monthStr]?.[name] || "없음";
        document.getElementById('modalTitle').innerText = `${name} (${monthStr}) 연차 정보`;
        document.getElementById('modalContent').innerHTML = `<strong>연차 날짜:</strong><br>${raw}`;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('modalOverlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('modalOverlay').style.display = 'none';
    }

    function render() {
        const [y, mSelected] = document.getElementById('targetMonth').value.split('-').map(Number);
        if (currentTab === 'ledger') renderLedger(y);
        else renderSchedule(y, mSelected);
        
        // 렌더링 후 박스 위치 계산을 위해 짧은 지연
        setTimeout(() => updateHighlightBoxes(y, mSelected), 10);
    }

    function updateHighlightBoxes(y, m) {
        // 기존 박스 제거
        document.querySelectorAll('.col-highlight').forEach(el => el.remove());
        if (currentTab !== 'schedule') return;

        const table = document.getElementById('displayTable');
        const today = new Date();
        const isCurrentMonth = today.getFullYear() === y && today.getMonth() + 1 === m;
        const todayDay = isCurrentMonth ? today.getDate() : -1;

        // 오늘 날짜 박스
        if (todayDay !== -1) createBox(todayDay, 'hl-today');
        // 선택 날짜 박스
        if (selectedScheduleDay) createBox(selectedScheduleDay, 'hl-select');

        function createBox(day, className) {
            const headerCell = document.querySelector(`.day-cell-${day}`);
            if (!headerCell) return;
            
            const box = document.createElement('div');
            box.className = `col-highlight ${className}`;
            box.style.left = headerCell.offsetLeft + 'px';
            box.style.width = headerCell.offsetWidth + 'px';
            box.style.top = '0px';
            box.style.height = table.offsetHeight + 'px';
            document.getElementById('tableWrapper').appendChild(box);
        }
    }

    function renderSchedule(y, m) {
        const lastDay = new Date(y, m, 0).getDate();
        document.getElementById('viewTitle').innerText = `성의교정 연차 일정표(${y}년 ${m}월)`;
        
        let h = `<colgroup><col style="width:65px;"><col style="width:45px;"><col style="width:45px;"><col style="width:65px;"></colgroup>`;
        h += `<thead><tr class="hdr"><td>구분</td><td>조</td><td>직위</td><td class="border-right-bold">성명</td>`;
        for(let i=1; i<=lastDay; i++) {
            const d = new Date(y, m-1, i);
            const we = d.getDay()===0 ? 'sun' : (d.getDay()===6 ? 'sat' : '');
            h += `<td class="${we} day-cell-${i}" style="width:23px; font-size:8.5px;" onclick="selectDay(${i})">${i}</td>`;
        }
        h += `</tr></thead><tbody>${generateRows(y, m, 0)}</tbody>`;
        document.getElementById('displayTable').innerHTML = h;
    }

    function renderLedger(y) {
        document.getElementById('viewTitle').innerText = `성의교정 연차 관리대장(${y}년)`;
        let editMonthNum = activeEditColumn && activeEditColumn.includes('-') ? parseInt(activeEditColumn.split('-')[1]) : 0;
        let h = `<colgroup><col style="width:65px;"><col style="width:45px;"><col style="width:45px;"><col style="width:65px;"></colgroup>`;
        h += `<thead><tr class="hdr"><td>구분</td><td>조</td><td>직위</td><td class="border-right-bold" onclick="toggleEditCol('name')">성명</td>`;
        for(let i=1; i<=12; i++) {
            const mk = `${y}-${String(i).padStart(2,'0')}`;
            if (editMonthNum > 0 && i < editMonthNum) continue;
            h += `<td onclick="toggleEditCol('${mk}')" class="col-data">${i}월</td>`;
        }
        if (!editMonthNum) h += `<td class="col-data">합계</td>`;
        h += `</tr></thead><tbody>${generateRows(y, null, editMonthNum)}</tbody>`;
        document.getElementById('displayTable').innerHTML = h;
    }

    function generateRows(y, m, editMonthNum) {
        let rows = "";
        staffData.forEach((staff, idx) => {
            const isLast = (idx === staffData.length - 1) || (staffData[idx+1].s !== staff.s || staffData[idx+1].g !== staff.g);
            rows += `<tr class="${isLast ? 'thick-border' : ''}">`;
            if(idx===0 || staffData[idx-1].g !== staff.g) rows += `<td class="col-info" rowspan="${staffData.filter(x=>x.g===staff.g).length}">${staff.g}</td>`;
            if(idx===0 || staffData[idx-1].s !== staff.s || staffData[idx-1].g !== staff.g) rows += `<td class="col-info" rowspan="${staffData.filter(x=>x.g===staff.g && x.s===staff.s).length}">${staff.s}</td>`;
            rows += `<td class="col-info">${staff.p}</td>`;
            rows += (activeEditColumn === 'name') ? `<td class="border-right-bold col-info"><input type="text" class="edit-input name-edit" value="${staff.n}" onchange="updateName(${idx}, this.value)"></td>` : `<td class="border-right-bold col-info">${staff.n}</td>`;
            
            if (m === null) {
                let total = 0;
                for(let i=1; i<=12; i++) {
                    const mk = `${y}-${String(i).padStart(2,'0')}`;
                    const val = vData[mk]?.[staff.n] || "";
                    total += (val && val.trim() !== "") ? val.split(',').length : 0;
                    if (editMonthNum > 0 && i < editMonthNum) continue;
                    rows += (activeEditColumn === mk) ? `<td class="col-data"><input type="text" class="edit-input data-edit" value="${val}" onchange="updateV('${mk}', '${staff.n}', this.value)"></td>` : `<td class="col-data">${val}</td>`;
                }
                if (!editMonthNum) rows += `<td class="col-data" style="color:blue;">${total || ''}</td>`;
            } else {
                const mk = `${y}-${String(m).padStart(2,'0')}`;
                const vArr = (vData[mk]?.[staff.n] || "").split(',').map(s => s.trim());
                for(let i=1; i<=new Date(y, m, 0).getDate(); i++) {
                    const isV = vArr.includes(String(i));
                    const d = new Date(y, m-1, i);
                    rows += `<td class="${isV ? 'v-mark' : ''} ${d.getDay()===0?'sun':d.getDay()===6?'sat':''} col-data" ${isV ? `onclick="showVDetail('${staff.n}', '${mk}')"` : ''}>${isV?'V':''}</td>`;
                }
            }
            rows += `</tr>`;
        });
        return rows;
    }

    function selectDay(day) { selectedScheduleDay = (selectedScheduleDay === day) ? null : day; render(); }
    function toggleEditCol(colId) { activeEditColumn = (activeEditColumn === colId) ? null : colId; render(); }
    function updateName(idx, val) { staffData[idx].n = val; localStorage.setItem('staff_list_v2', JSON.stringify(staffData)); }
    function updateV(mk, n, v) { if(!vData[mk]) vData[mk] = {}; vData[mk][n] = v; localStorage.setItem('v_data_v34', JSON.stringify(vData)); }
    function changeTab(tab) { currentTab = tab; activeEditColumn = null; selectedScheduleDay = null; render(); }

    function downloadBackup() {
        const data = { staff: staffData, vocation: vData };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `성의교정_백업_${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
    }

    function uploadBackup(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const imported = JSON.parse(e.target.result);
            staffData = imported.staff; vData = imported.vocation;
            localStorage.setItem('staff_list_v2', JSON.stringify(staffData));
            localStorage.setItem('v_data_v34', JSON.stringify(vData));
            render();
        };
        reader.readAsText(event.target.files[0]);
    }

    window.onload = function() {
        const today = new Date();
        document.getElementById('targetMonth').value = today.toISOString().substring(0, 7);
        render();
    };
</script>
</body>
</html>
