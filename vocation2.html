<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연차 관리 시스템 (기존 틀 100% 유지본)</title>
    <style>
        /* [1] 사용자님의 기존 스타일 시트 100% 그대로 복사 */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; }
        .wrapper { display: flex; height: 100vh; overflow: hidden; }
        
        .left-frame {
            width: 400px; background: #2c3e50; padding: 12px;
            display: flex; flex-direction: column; border-right: 3px solid #000; overflow-y: auto;
        }
        
        .menu-container { background: #34495e; padding: 10px; border-radius: 4px; margin-bottom: 12px; border: 1px solid #1a252f; }
        .menu-row { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
        
        .btn { padding: 6px 10px; cursor: pointer; border: 1px solid #000; font-weight: bold; font-size: 12px; border-radius: 2px; flex: 1; text-align: center; }
        .btn-blue { background: #3498db; color: white; }
        .btn-orange { background: #e67e22; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-white { background: #ffffff; color: black; }
        .btn-print { background: #95a5a6; color: white; }
        
        table { background: white; border-collapse: collapse; width: 100%; border: 2px solid #000; }
        th, td { border: 1.1px solid #000 !important; text-align: center; font-size: 11px; font-weight: bold; height: 22px; color: #000; padding: 0; }
        #inputTable { table-layout: fixed; }
        .name-td { background-color: #e3f2fd !important; }
        .v-input { background-color: #fff3e0 !important; width: 92%; border: 1px solid #ffcc80; text-align: center; font-weight: bold; }
        .hdr { background: #dee2e6 !important; height: 28px; font-size: 12px; }

        .right-frame { flex: 1; background: #7f8c8d; padding: 5px; overflow: auto; display: flex; justify-content: center; }
        #paper { background: white; padding: 15mm 10mm; width: 297mm; box-shadow: 0 0 20px rgba(0,0,0,0.5); box-sizing: border-box; }
        #outputTable { table-layout: fixed; width: 100%; border-collapse: collapse; }

        /* [2] 인쇄 및 색상 설정 유지 */
        .sat { background-color: #e7f5ff !important; color: blue !important; }
        .sun { background-color: #fff5f5 !important; color: red !important; }
        .v-mark { background-color: #90ee90 !important; }
        .thick-border { border-bottom: 2.5px solid #000 !important; }

        /* [3] 모바일에서만 작동하는 최소한의 보정 (디자인 변경 없음) */
        @media screen and (max-width: 768px) {
            .wrapper { flex-direction: column; overflow: auto; }
            .left-frame, .right-frame { width: 100% !important; height: auto; border: none; }
            #paper { width: 100%; padding: 5mm; box-shadow: none; }
        }

        @media print {
            .left-frame { display: none !important; }
            .right-frame { padding: 0; background: white; width: 100%; }
            #paper { box-shadow: none; width: 100%; padding: 0; margin: 0; border: none; }
            @page { size: A4 landscape; margin: 10mm; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="left-frame">
        <div class="menu-container">
            <div class="menu-row">
                <button class="btn btn-orange" onclick="render()">연차대장</button>
                <button class="btn btn-blue" onclick="render()">연차달력</button>
                <button class="btn btn-print" onclick="window.print()">인쇄</button>
            </div>
            <div class="menu-row">
                <button class="btn btn-green" onclick="downloadFile()">파일저장</button>
                <button class="btn btn-white" onclick="document.getElementById('fileInput').click()">파일열기</button>
                <input type="file" id="fileInput" style="display:none" onchange="uploadFile(event)">
            </div>
            <div class="menu-row">
                <input type="month" id="targetMonth" value="2026-05" onchange="render()" style="padding:4px; font-weight:bold; width:100%; text-align:center;">
            </div>
        </div>

        <table id="inputTable">
            <thead><tr class="hdr"><td>구분</td><td>조</td><td>직위</td><td>성명</td><td>연차</td></tr></thead>
            <tbody id="inputBody"></tbody>
        </table>
    </div>

    <div class="right-frame">
        <div id="paper">
            <h2 id="mainTitle" style="text-align:center; margin-top:0;"></h2>
            <table id="outputTable"></table>
        </div>
    </div>
</div>

<script>
    /* [4] 사용자님의 원본 데이터 및 로직 100% 유지 */
    let staffData = [
        { g: "성의교정", s: "관리", p: "소장", n: "이규용" },
        { g: "성의교정", s: "관리", p: "부소장", n: "박상현" },
        { g: "성의회관", s: "관리", p: "반장", n: "유정수" },
        { g: "성의회관", s: "A조", p: "조장", n: "배준용" },
        { g: "성의회관", s: "A조", p: "조원", n: "김영중" },
        { g: "성의회관", s: "A조", p: "조원", n: "이명구" },
        { g: "성의회관", s: "A조", p: "조원", n: "김삼동" },
        { g: "성의회관", s: "B조", p: "조장", n: "심규천" },
        { g: "성의회관", s: "B조", p: "조원", n: "권영국" },
        { g: "성의회관", s: "B조", p: "조원", n: "임종헌" },
        { g: "성의회관", s: "B조", p: "조원", n: "전준수" },
        { g: "성의회관", s: "C조", p: "조장", n: "황재업" },
        { g: "성의회관", s: "C조", p: "조원", n: "김태언" },
        { g: "성의회관", s: "C조", p: "조원", n: "이태원" },
        { g: "성의회관", s: "C조", p: "조원", n: "이정석" },
        { g: "옴니버스", s: "관리", p: "반장", n: "오재준" },
        { g: "옴니버스", s: "A조", p: "조장", n: "손병휘" },
        { g: "옴니버스", s: "A조", p: "조원", n: "김전식" },
        { g: "옴니버스", s: "A조", p: "조원", n: "권순호" },
        { g: "옴니버스", s: "B조", p: "조장", n: "황일범" },
        { g: "옴니버스", s: "B조", p: "조원", n: "이상길" },
        { g: "옴니버스", s: "B조", p: "조원", n: "허용" },
        { g: "옴니버스", s: "C조", p: "조장", n: "피재영" },
        { g: "옴니버스", s: "C조", p: "조원", n: "남형민" },
        { g: "옴니버스", s: "C조", p: "조원", n: "강경훈" },
        { g: "기숙사", s: "관리", p: "반장", n: "이강택" },
        { g: "기숙사", s: "관리", p: "조원", n: "유시균" },
        { g: "기숙사", s: "관리", p: "조원", n: "이상현" }
    ];

    let vData = JSON.parse(localStorage.getItem('v_data_v34')) || {};

    function render() {
        const [y, m] = document.getElementById('targetMonth').value.split('-').map(Number);
        const mKey = `${y}-${String(m).padStart(2,'0')}`;
        
        // 입력 테이블 렌더링 (디자인 유지)
        let inH = "";
        staffData.forEach((staff, idx) => {
            const curV = vData[mKey]?.[staff.n] || "";
            const isLast = (idx === staffData.length - 1) || (staffData[idx+1].s !== staff.s || staffData[idx+1].g !== staff.g);
            inH += `<tr class="${isLast ? 'thick-border' : ''}">`;
            if(idx===0 || staffData[idx-1].g !== staff.g) inH += `<td rowspan="${staffData.filter(x=>x.g===staff.g).length}">${staff.g}</td>`;
            if(idx===0 || staffData[idx-1].s !== staff.s || staffData[idx-1].g !== staff.g) inH += `<td rowspan="${staffData.filter(x=>x.g===staff.g && x.s===staff.s).length}">${staff.s}</td>`;
            inH += `<td>${staff.p}</td><td class="name-td">${staff.n}</td>`;
            inH += `<td><input type="text" class="v-input" value="${curV}" onblur="updateV('${staff.n}', this.value)"></td></tr>`;
        });
        document.getElementById('inputBody').innerHTML = inH;

        // 일정표 테이블 렌더링 (디자인 유지)
        const lastDay = new Date(y, m, 0).getDate();
        document.getElementById('mainTitle').innerHTML = `<b>${y}년 ${m}월 연차 일정표 (성의교정 보안팀)</b>`;
        let outH = `<thead><tr class="hdr"><td>구분</td><td>조</td><td>직위</td><td>성명</td>`;
        for(let i=1; i<=lastDay; i++) {
            const d = new Date(y, m-1, i);
            const we = d.getDay()===0 ? 'sun' : (d.getDay()===6 ? 'sat' : '');
            outH += `<td class="${we}">${i}</td>`;
        }
        outH += `</tr></thead><tbody>`;

        staffData.forEach((staff, idx) => {
            const curV = vData[mKey]?.[staff.n] || "";
            const vArr = curV.split(',').map(s => s.trim());
            const isLast = (idx === staffData.length - 1) || (staffData[idx+1].s !== staff.s || staffData[idx+1].g !== staff.g);
            outH += `<tr class="${isLast?'thick-border':''}">`;
            if(idx===0 || staffData[idx-1].g !== staff.g) outH += `<td rowspan="${staffData.filter(x=>x.g===staff.g).length}">${staff.g}</td>`;
            if(idx===0 || staffData[idx-1].s !== staff.s || staffData[idx-1].g !== staff.g) outH += `<td rowspan="${staffData.filter(x=>x.g===staff.g && x.s===staff.s).length}">${staff.s}</td>`;
            outH += `<td>${staff.p}</td><td>${staff.n}</td>`;
            for(let i=1; i<=lastDay; i++) {
                const isV = vArr.includes(String(i));
                outH += `<td class="${isV?'v-mark':''}">${isV?'V':''}</td>`;
            }
            outH += `</tr>`;
        });
        document.getElementById('outputTable').innerHTML = outH + `</tbody>`;
        
        // 근무달력 앱 연동 데이터 업데이트
        localStorage.setItem('v_data_v34_full', JSON.stringify({ staff: staffData, v: vData }));
    }

    function updateV(name, val) {
        const mKey = document.getElementById('targetMonth').value;
        if(!vData[mKey]) vData[mKey] = {};
        vData[mKey][name] = val;
        localStorage.setItem('v_data_v34', JSON.stringify(vData));
        render();
    }

    function downloadFile() {
        const dataStr = JSON.stringify({ staff: staffData, v: vData }, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob); a.download = `연차데이터_${document.getElementById('targetMonth').value}.json`;
        a.click();
    }

    function uploadFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const imported = JSON.parse(e.target.result);
            if (imported.v) {
                vData = imported.v; localStorage.setItem('v_data_v34', JSON.stringify(vData));
                render();
            }
        };
        reader.readAsText(file);
    }
    window.onload = render;
</script>
</body>
</html>
