<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 연차 관리 시스템</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --sat-bg: #f5faff; --sun-bg: #fff5f5; --primary-blue: #3498db; --today-red: #ef4444; --select-blue: #3b82f6; }
        
        html, body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; }
        .content-area { display: flex; justify-content: center; padding: 20px 10px; min-height: 100vh; box-sizing: border-box; }
        
        #paper { 
            background: white; width: 285mm; padding: 10px; display: flex; flex-direction: column; 
            align-items: center; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); border-radius: 4px; max-width: 100%; 
        }

        #viewTitle { text-align: center; margin: 10px 0 20px 0; font-size: 24px; font-weight: bold; text-decoration: underline; text-underline-offset: 5px; }
        
        /* 스크롤 영역 */
        #tableWrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #ddd; }
        table { border-collapse: collapse; width: 100%; min-width: 1100px; border: 1.5pt solid #000; table-layout: fixed; background: white; }
        td { border: 0.5pt solid #000; text-align: center; font-weight: bold; height: 18pt; font-size: 11px; padding: 0; position: relative; }
        
        .hdr { background: #f2f2f2 !important; height: 26pt; cursor: pointer; }
        .border-right-bold { border-right: 1.5pt solid #000 !important; }
        
        /* 오늘 날짜 하이라이트 (붉은색) */
        .is-today { outline: 2px solid var(--today-red) !important; z-index: 10; background: #fff5f5 !important; }
        
        /* 선택된 수정 컬럼 하이라이트 (청색 외곽선) */
        .selected-column { outline: 2px solid var(--select-blue) !important; z-index: 11; background: #e3f2fd !important; }
        
        .sat { background-color: var(--sat-bg) !important; color: #007bff !important; }
        .sun { background-color: var(--sun-bg) !important; color: #dc3545 !important; }
        .v-mark { background-color: #d4edda !important; color: #28a745; font-weight: bold; cursor: pointer; }

        /* 입력창 스타일 */
        .edit-input { width: 95%; border: none; text-align: center; background: transparent; font-weight: bold; font-size: 11px; outline: none; }

        /* 컨트롤바 */
        .controls-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; z-index: 2000; }
        .floating-bar { display: flex; align-items: center; gap: 8px; background: white; padding: 10px 20px; border-radius: 40px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); border: 1px solid #ddd; }
        
        .btn { padding: 9px 18px; cursor: pointer; border: none; font-weight: bold; font-size: 13px; border-radius: 25px; color: white; transition: 0.2s; }
        .btn-orange { background: #e67e22; }
        .btn-blue { background: #3498db; }
        .btn-gray { background: #95a5a6; }

        /* 모달 */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; z-index: 3000; border-radius: 20px; width: 90%; max-width: 350px; overflow: hidden; }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2999; backdrop-filter: blur(2px); }
        .modal-hdr { background: var(--primary-blue); color: white; padding: 18px; font-weight: bold; text-align: center; }
        .modal-body { padding: 25px; text-align: center; }
        .close-btn { width: 100%; padding: 15px; border: none; border-top: 1px solid #eee; cursor: pointer; font-weight: bold; }

        @media screen and (max-width: 768px) {
            #paper { width: 100%; padding: 5px; }
            .floating-bar { padding: 8px 12px; scale: 0.85; transform-origin: right bottom; }
        }
    </style>
</head>
<body>

<div id="modalOverlay" onclick="closeModal()"></div>
<div id="modal">
    <div class="modal-hdr" id="modalTitle">정보</div>
    <div class="modal-body" id="modalContent"></div>
    <button class="close-btn" onclick="closeModal()">닫기</button>
</div>

<div class="content-area">
    <div id="paper">
        <h2 id="viewTitle">데이터 로딩 중...</h2>
        <div id="tableWrapper">
            <table id="displayTable"></table>
        </div>
    </div>
</div>

<div class="controls-container">
    <div class="floating-bar">
        <input type="month" id="targetMonth" onchange="render()" style="border:1px solid #ddd; padding:5px; border-radius:15px;">
        <button class="btn btn-orange" onclick="changeTab('ledger')">연차대장</button>
        <button class="btn btn-blue" onclick="changeTab('schedule')">연차일정</button>
        <button class="btn btn-blue" onclick="preparePrint()">인쇄</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU",
        authDomain: "catholic-security-system.firebaseapp.com",
        projectId: "catholic-security-system",
        storageBucket: "catholic-security-system.firebasestorage.app",
        messagingSenderId: "978946205343",
        appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentTab = 'schedule';
    let activeEditCol = null; // 하이라이트 및 수정 모드 상태
    let staffData = [];
    let vData = {};
    const today = new Date();

    function initSync() {
        db.collection("vocation_app").doc("data").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                staffData = data.staff || [];
                vData = data.vocation || {};
                render();
            }
        });
    }

    function render() {
        const val = document.getElementById('targetMonth').value;
        if(!val) return;
        const [y, mSelected] = val.split('-').map(Number);
        
        if (currentTab === 'ledger') renderLedger(y);
        else renderSchedule(y, mSelected);
    }

    // 연차 일정표 렌더링
    function renderSchedule(y, m) {
        const lastDay = new Date(y, m, 0).getDate();
        document.getElementById('viewTitle').innerText = `성의교정 연차 일정표(${y}년 ${m}월)`;
        
        let h = `<colgroup><col style="width:50px;"><col style="width:35px;"><col style="width:40px;"><col style="width:60px;"></colgroup>
                 <thead><tr class="hdr"><td>구분</td><td>조</td><td>직위</td><td class="border-right-bold">성명</td>`;
        
        for(let i=1; i<=lastDay; i++) {
            const dateObj = new Date(y, m-1, i);
            const we = dateObj.getDay();
            const isToday = (y === today.getFullYear() && m === (today.getMonth()+1) && i === today.getDate());
            h += `<td class="${we===0?'sun':we===6?'sat':''} ${isToday?'is-today':''}" style="width:25px;" onclick="showDayStatus(${m}, ${i})">${i}</td>`;
        }
        h += `</tr></thead><tbody>${generateRows(y, m)}</tbody>`;
        document.getElementById('displayTable').innerHTML = h;
    }

    // 연차 대장 렌더링
    function renderLedger(y) {
        document.getElementById('viewTitle').innerText = `성의교정 연차 관리대장(${y}년)`;
        
        let h = `<colgroup><col style="width:50px;"><col style="width:35px;"><col style="width:40px;"><col style="width:60px;"></colgroup>
                 <thead><tr class="hdr"><td>구분</td><td>조</td><td>직위</td><td class="border-right-bold" onclick="toggleEdit('name')">성명</td>`;
        
        for(let i=1; i<=12; i++) {
            const mKey = `${y}-${String(i).padStart(2,'0')}`;
            const isThisMonth = (y === today.getFullYear() && i === (today.getMonth()+1));
            h += `<td class="${activeEditCol === mKey ? 'selected-column' : ''} ${isThisMonth ? 'is-today' : ''}" 
                      onclick="toggleEdit('${mKey}')" style="width:45px;">${i}월</td>`;
        }
        h += `<td style="width:45px;">합계</td></tr></thead><tbody>${generateRows(y, null)}</tbody>`;
        document.getElementById('displayTable').innerHTML = h;
    }

    function generateRows(y, m) {
        let rows = "";
        staffData.forEach((staff, idx) => {
            rows += `<tr>`;
            if(idx===0 || staffData[idx-1].g !== staff.g) {
                const gCount = staffData.filter(x => x.g === staff.g).length;
                rows += `<td rowspan="${gCount}">${staff.g}</td>`;
            }
            if(idx===0 || staffData[idx-1].s !== staff.s || staffData[idx-1].g !== staff.g) {
                const sCount = staffData.filter(x => x.g === staff.g && x.s === staff.s).length;
                rows += `<td rowspan="${sCount}">${staff.s}</td>`;
            }
            rows += `<td>${staff.p}</td>`;
            
            // 이름 수정 모드 하이라이트
            if(activeEditCol === 'name') {
                rows += `<td class="border-right-bold selected-column"><input class="edit-input" value="${staff.n}" onchange="updateStaffName(${idx}, this.value)"></td>`;
            } else {
                rows += `<td class="border-right-bold">${staff.n}</td>`;
            }
            
            if (m === null) { // 연차 대장 데이터 셀
                let total = 0;
                for(let i=1; i<=12; i++) {
                    const mKey = `${y}-${String(i).padStart(2,'0')}`;
                    const val = vData[mKey]?.[staff.n] || "";
                    if(val) total += val.split(',').length;
                    
                    if(activeEditCol === mKey) {
                        rows += `<td class="selected-column"><input class="edit-input" value="${val}" onchange="updateVocation('${mKey}', '${staff.n}', this.value)"></td>`;
                    } else {
                        rows += `<td>${val}</td>`;
                    }
                }
                rows += `<td style="color:blue;">${total || ''}</td>`;
            } else { // 연차 일정표 데이터 셀
                const mKey = `${y}-${String(m).padStart(2,'0')}`;
                const vArr = (vData[mKey]?.[staff.n] || "").split(',').map(s => s.trim());
                for(let i=1; i<=new Date(y, m, 0).getDate(); i++) {
                    const isV = vArr.includes(String(i));
                    const we = new Date(y, m-1, i).getDay();
                    rows += `<td class="${isV ? 'v-mark' : ''} ${we===0?'sun':we===6?'sat':''}" ${isV ? `onclick="showVDetail('${staff.n}', ${m}, ${i})"` : ''}>${isV?'V':''}</td>`;
                }
            }
            rows += `</tr>`;
        });
        return rows;
    }

    // 수정 모드 토글 (하이라이트 및 입력창 활성화)
    function toggleEdit(colId) {
        if(confirm("수정 모드를 전환하시겠습니까?")) {
            activeEditCol = (activeEditCol === colId) ? null : colId;
            render();
        }
    }

    async function updateStaffName(idx, newVal) {
        staffData[idx].n = newVal;
        await db.collection("vocation_app").doc("data").update({ staff: staffData });
    }

    async function updateVocation(mKey, name, val) {
        if(!vData[mKey]) vData[mKey] = {};
        vData[mKey][name] = val;
        await db.collection("vocation_app").doc("data").update({ vocation: vData });
    }

    function showVDetail(name, m, d) {
        document.getElementById('modalTitle').innerText = "상세 정보";
        document.getElementById('modalContent').innerHTML = `<b>${name}</b><br><br><span style="color:red;">📅 ${m}월 ${d}일 연차</span>`;
        openModal();
    }

    function showDayStatus(m, d) {
        const val = document.getElementById('targetMonth').value;
        const [y] = val.split('-');
        const mKey = `${y}-${String(m).padStart(2,'0')}`;
        document.getElementById('modalTitle').innerText = `${m}월 ${d}일 연차 현황`;
        let list = staffData.filter(s => (vData[mKey]?.[s.n] || "").split(',').map(x=>x.trim()).includes(String(d)));
        document.getElementById('modalContent').innerHTML = list.length ? list.map(s => `<div style="margin-bottom:5px;">[${s.g}] ${s.s} ${s.n}</div>`).join('') : '연차 인원 없음';
        openModal();
    }

    function openModal() { document.getElementById('modal').style.display = 'block'; document.getElementById('modalOverlay').style.display = 'block'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('modalOverlay').style.display = 'none'; }
    function changeTab(tab) { currentTab = tab; activeEditCol = null; render(); }
    function preparePrint() { document.title = document.getElementById('viewTitle').innerText; window.print(); }

    window.onload = function() {
        document.getElementById('targetMonth').value = today.toISOString().substring(0, 7);
        initSync();
    };
</script>
</body>
</html>
