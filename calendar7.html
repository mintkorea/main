<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="pageTitle">성의교정 커스텀 근무달력</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; }
        .calendar-cell { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; background: white; position: relative; aspect-ratio: 1 / 1.35; cursor: pointer; }

        /* [핵심] 숫자 상단 사각형 투톤 레이아웃 */
        .date-area { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 700; 
            position: relative; 
            z-index: 10; 
            font-size: 15px;
            /* 기본 상태에서도 살짝 밝은 사각형 투톤 */
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* [핵심] 조별 강조 시 상단 사각형을 더 투명하고 밝게 처리 (투톤 극대화) */
        .cell-highlighted .date-area { 
            background-color: rgba(255, 255, 255, 0.45) !important; 
            color: #ffffff !important; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .cell-highlighted .shift-area { 
            color: #ffffff !important; 
        }

        /* 연차 표시용 보라색 원 (작게 유지) */
        .v-highlight { 
            position: absolute; 
            width: 28px; 
            height: 28px; 
            background-color: #f3e8ff; 
            border: 1px solid #d8b4fe; 
            border-radius: 50%; 
            z-index: -1; 
        }
        /* 강조 시 연차 원 색상 조정 */
        .cell-highlighted .v-highlight {
            background-color: rgba(255, 255, 255, 0.4) !important;
            border-color: rgba(255, 255, 255, 0.6) !important;
        }
        
        .shift-area { flex: 1.3; display: flex; align-items: center; justify-content: center; font-weight: 900; position: relative; z-index: 10; font-size: 18px; }

        /* 오늘 날짜 표시 */
        .is-selected-day::before { content: ''; position: absolute; inset: 0; border: 4px solid #ef4444; z-index: 20; pointer-events: none; }
        .is-selected-day::after { content: "TODAY"; position: absolute; top: 4px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: 900; color: #ef4444; z-index: 21; }

        .sunday { color: #ef4444; }
        .saturday { color: #3b82f6; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; border-radius: 24px; width: 100%; max-width: 320px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    </style>
</head>
<body class="p-3">

    <div class="max-w-md mx-auto">
        <header class="bg-white rounded-2xl shadow-sm border border-gray-200 mb-4 p-4">
            <div class="flex items-center justify-between mb-3 border-b border-gray-50 pb-2">
                <div class="flex items-center gap-2">
                    <span class="text-xl">📅</span>
                    <h1 id="displayAppTitle" class="text-xl font-black text-slate-800">근무달력</h1>
                </div>
                <button onclick="openModal('authModal')" class="text-[11px] font-extrabold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg">⚙️ 관리자</button>
            </div>
            
            <div class="flex items-center justify-between mb-4 bg-purple-50 p-2 rounded-xl border border-purple-100">
                <span class="text-xs font-bold text-purple-600 ml-1">조별 강조:</span>
                <select id="shiftSelect" class="text-xs p-1.5 bg-white rounded-lg font-bold outline-none w-32 border border-purple-200 text-purple-700" onchange="render()"></select>
            </div>

            <div class="flex items-center justify-between bg-white p-1 rounded-xl border border-gray-100 font-black">
                <button onclick="changeMonth(-1)" class="w-10 h-10 bg-slate-50 rounded-xl">＜</button>
                <h2 id="currentDisplayTitle" class="text-[17px] text-slate-700"></h2>
                <button onclick="changeMonth(1)" class="w-10 h-10 bg-slate-50 rounded-xl">＞</button>
            </div>
        </header>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
            <div class="grid grid-cols-7 text-center font-bold text-[11px] py-3 bg-slate-50 border-b border-gray-100 text-slate-400">
                <div class="sunday">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="saturday">토</div>
            </div>
            <div id="singleCalendarBody" class="calendar-grid"></div>
        </div>
    </div>

    <div id="vModal" class="modal-overlay" onclick="closeModal('vModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="vModalHeader" class="p-5 border-b bg-purple-50 font-black text-center text-purple-700"></div>
            <div id="vModalBody" class="p-6 max-h-72 overflow-y-auto space-y-3 font-bold text-slate-700 text-center"></div>
            <button onclick="closeModal('vModal')" class="w-full p-4 bg-purple-700 text-white font-bold">확인</button>
        </div>
    </div>

    <div id="authModal" class="modal-overlay" onclick="closeModal('authModal')">
        <div class="modal-content p-8 text-center" onclick="event.stopPropagation()">
            <h3 class="font-black mb-4">관리자 인증</h3>
            <input type="password" id="authPasswordInput" class="w-full p-3 bg-slate-50 border rounded-xl mb-4 text-center tracking-widest" placeholder="••••">
            <div class="flex gap-2">
                <button onclick="closeModal('authModal')" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold">취소</button>
                <button id="confirmAuthBtn" class="flex-1 py-3 bg-slate-800 text-white rounded-xl font-bold">확인</button>
            </div>
        </div>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('shift_config_v2')) || {
            appTitle: '근무달력', appIcon: '📅', baseDate: '2025-01-01', adminPassword: '0000',
            pattern: [
                { name: 'C', color: '#dbeafe', highlight: '#3b82f6' },
                { name: 'A', color: '#fef3c7', highlight: '#f59e0b' },
                { name: 'B', color: '#fee2e2', highlight: '#ef4444' }
            ]
        };

        // 샘플 데이터
        let staffData = JSON.parse(localStorage.getItem('staff_v27')) || [
            { g: "성의회관", s: "C조", p: "조장", n: "황재업" }
        ];
        let vData = JSON.parse(localStorage.getItem('v_data_v27')) || { "2026-04": { "황재업": "29" } };

        let currentYear = 2026, currentMonth = 3; 
        const today = new Date(); today.setHours(0,0,0,0);

        function initApp() {
            document.getElementById('displayAppTitle').textContent = config.appTitle;
            const select = document.getElementById('shiftSelect');
            select.innerHTML = '<option value="none">강조 없음</option>';
            config.pattern.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name; opt.textContent = `${p.name}조 강조`;
                select.appendChild(opt);
            });
            render();
        }

        function render() {
            const mKey = `${currentYear}-${String(currentMonth + 1).padStart(2,'0')}`;
            document.getElementById('currentDisplayTitle').textContent = `${currentYear}년 ${currentMonth + 1}월`;
            const container = document.getElementById('singleCalendarBody');
            container.innerHTML = '';
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const base = new Date(config.baseDate); base.setHours(0,0,0,0);
            const targetShift = document.getElementById('shiftSelect').value;

            for (let i = 0; i < firstDay; i++) container.appendChild(Object.assign(document.createElement('div'), { className: 'calendar-cell bg-slate-50/50' }));

            for (let d = 1; d <= lastDate; d++) {
                const curr = new Date(currentYear, currentMonth, d); curr.setHours(0,0,0,0);
                const diff = Math.floor((curr - base) / 86400000);
                const pIdx = ((diff % config.pattern.length) + config.pattern.length) % config.pattern.length;
                const shift = config.pattern[pIdx];

                const vList = staffData.filter(s => (vData[mKey]?.[s.n] || "").split(',').map(v=>v.trim()).includes(String(d)));

                const cell = document.createElement('div');
                cell.className = 'calendar-cell';
                if (curr.getTime() === today.getTime()) cell.classList.add('is-selected-day');

                const isHighlighted = (targetShift === shift.name);
                if (isHighlighted) {
                    cell.classList.add('cell-highlighted');
                    cell.style.backgroundColor = shift.highlight;
                }
                
                cell.onclick = () => showVModal(d, vList);

                // 상단 숫자 사각형 영역
                const dDiv = document.createElement('div');
                dDiv.className = `date-area ${curr.getDay()===0?'sunday':curr.getDay()===6?'saturday':''}`;
                
                if (vList.length > 0) {
                    const vCircle = document.createElement('div');
                    vCircle.className = 'v-highlight';
                    dDiv.appendChild(vCircle);
                }
                dDiv.appendChild(document.createTextNode(d));

                // 하단 조 정보 영역
                const sDiv = document.createElement('div');
                sDiv.className = 'shift-area';
                if (!isHighlighted) sDiv.style.backgroundColor = shift.color;
                sDiv.textContent = shift.name;

                cell.append(dDiv, sDiv);
                container.appendChild(cell);
            }
        }

        function showVModal(day, list) {
            const header = document.getElementById('vModalHeader');
            const body = document.getElementById('vModalBody');
            header.innerHTML = `${currentMonth + 1}월 ${day}일 연차 명단`;
            if (list.length === 0) {
                body.innerHTML = `<p class="py-8 font-medium text-slate-400 text-sm">신청자가 없습니다.</p>`;
            } else {
                body.innerHTML = list.map(s => `
                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100 shadow-sm mb-2">
                        <span class="text-lg">${s.n}</span>
                        <span class="text-xs text-purple-600 font-black uppercase tracking-widest">${s.p}</span>
                    </div>
                `).join('');
            }
            openModal('vModal');
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function changeMonth(v) { currentMonth += v; if(currentMonth<0){currentMonth=11;currentYear--;} else if(currentMonth>11){currentMonth=0;currentYear++;} render(); }

        window.onload = initApp;
    </script>
</body>
</html>
