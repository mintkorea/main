<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 통합 근무달력</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* 달력 그리드 구조 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; }
        .calendar-cell { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; background: white; position: relative; aspect-ratio: 1 / 1.35; cursor: pointer; }

        /* [요청] 투톤 디자인: 상단 숫자 영역 */
        .date-area { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 15px; position: relative; z-index: 10;
            background-color: rgba(255, 255, 255, 0.6); 
        }
        
        /* [요청] 투톤 디자인: 하단 근무 영역 */
        .shift-area { 
            flex: 1.3; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 18px; position: relative; z-index: 10; 
        }

        /* [요청] 강조 시 투톤 글자색 변경 */
        .cell-highlighted .date-area { background-color: rgba(255, 255, 255, 0.2) !important; color: #ffffff !important; }
        .cell-highlighted .shift-area { color: #ffffff !important; }

        /* [요청] 오늘 하이라이트 Today 표시 */
        .is-today { border: 3.5px solid #ef4444 !important; z-index: 30; }
        .is-today::after {
            content: 'TODAY'; position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
            background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 1px 4px; border-radius: 0 0 4px 4px; z-index: 31;
        }

        /* [요청] 연차 표시 보라색 원 */
        .v-mark { position: absolute; width: 30px; height: 30px; background-color: #f3e8ff; border: 1px solid #d8b4fe; border-radius: 50%; z-index: -1; }

        .sunday { color: #ef4444; }
        .saturday { color: #3b82f6; }

        /* 모달 시스템 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        
        .nav-btn { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 10px; background-color: #f1f5f9; color: #475569; font-weight: 800; }
    </style>
</head>
<body class="p-3">

    <div class="max-w-md mx-auto">
        <header class="bg-white rounded-2xl shadow-sm border border-gray-200 mb-4 p-4">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <span class="text-xl">📅</span>
                    <h1 class="text-xl font-black text-slate-800">성의교정 근무달력</h1>
                </div>
                <button onclick="openConfigModal()" class="text-[11px] font-extrabold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg">⚙️ 설정</button>
            </div>
            
            <div class="flex items-center justify-between mb-4 bg-slate-50 p-2 rounded-xl border border-slate-100">
                <span class="text-xs font-bold text-slate-500 ml-1">강조 표시:</span>
                <select id="shiftSelect" class="text-xs p-1.5 bg-white text-gray-700 rounded-lg font-bold outline-none w-32 border border-gray-200" onchange="render()"></select>
            </div>

            <div class="flex items-center justify-between bg-white p-1 rounded-xl border border-gray-100">
                <button onclick="changeMonth(-1)" class="nav-btn">＜</button>
                <h2 id="monthTitle" class="text-[17px] font-black text-slate-800"></h2>
                <button onclick="changeMonth(1)" class="nav-btn">＞</button>
            </div>
        </header>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
            <div class="grid grid-cols-7 text-center font-bold text-[11px] py-3 bg-slate-50 border-b text-slate-400">
                <div class="sunday">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="saturday">토</div>
            </div>
            <div id="calendarBody" class="calendar-grid"></div>
        </div>
    </div>

    <div id="commonModal" class="modal-overlay" onclick="closeModal()">
        <div class="bg-white rounded-3xl w-72 overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <div id="modalHeader" class="p-4 border-b font-black text-center text-lg"></div>
            <div id="modalBody" class="p-5 space-y-3 font-bold text-center"></div>
            <div id="modalFooter" class="flex border-t">
                <button onclick="closeModal()" class="flex-1 p-4 bg-slate-100 text-slate-600 font-bold">닫기</button>
                <button id="modalConfirmBtn" class="flex-1 p-4 bg-slate-800 text-white font-bold hidden">확인</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            baseDate: '2025-01-01',
            adminPassword: '0000',
            pattern: [
                { name: 'C', color: '#dbeafe', highlight: '#3b82f6' },
                { name: 'A', color: '#fef3c7', highlight: '#f59e0b' },
                { name: 'B', color: '#fee2e2', highlight: '#ef4444' }
            ]
        };

        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        const today = new Date(); today.setHours(0,0,0,0);

        function init() {
            const select = document.getElementById('shiftSelect');
            select.innerHTML = '<option value="none">강조 없음</option>';
            config.pattern.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name; opt.textContent = `${p.name}조 강조`;
                if(p.name === 'C') opt.selected = true;
                select.appendChild(opt);
            });
            render();
        }

        function render() {
            // [해결] vocation.html의 연차 데이터 읽기 (v_data_v34)
            const vData = JSON.parse(localStorage.getItem('v_data_v34')) || {};
            const mKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            
            document.getElementById('monthTitle').textContent = `${currentYear}년 ${currentMonth + 1}월`;
            const container = document.getElementById('calendarBody');
            container.innerHTML = '';
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const base = new Date(config.baseDate); base.setHours(0,0,0,0);
            const targetShift = document.getElementById('shiftSelect').value;

            for (let i = 0; i < firstDay; i++) {
                container.appendChild(Object.assign(document.createElement('div'), { className: 'calendar-cell bg-slate-50/30' }));
            }

            for (let d = 1; d <= lastDate; d++) {
                const curr = new Date(currentYear, currentMonth, d); curr.setHours(0,0,0,0);
                const diff = Math.floor((curr - base) / 86400000);
                const shift = config.pattern[((diff % 3) + 3) % 3];

                // [해결] 연차 날짜 매칭 로직 (쉼표 구분 대응)
                let vNames = [];
                const monthV = vData[mKey] || {};
                for (let name in monthV) {
                    const daysArr = monthV[name].split(',').map(v => v.trim());
                    if (daysArr.includes(String(d))) vNames.push(name);
                }

                const cell = document.createElement('div');
                cell.className = 'calendar-cell';
                
                // [해결] 오늘 날짜 하이라이트 Today
                if (curr.getTime() === today.getTime()) cell.classList.add('is-today');

                const isHighlighted = (targetShift === shift.name);
                if (isHighlighted) {
                    cell.classList.add('cell-highlighted');
                    cell.style.backgroundColor = shift.highlight;
                }

                const dDiv = document.createElement('div');
                dDiv.className = `date-area ${curr.getDay()===0?'sunday':curr.getDay()===6?'saturday':''}`;
                
                // [해결] 연차 보라색 원 표시
                if (vNames.length > 0) {
                    const mark = document.createElement('div');
                    mark.className = 'v-mark';
                    dDiv.appendChild(mark);
                }
                dDiv.textContent = d;

                const sDiv = document.createElement('div');
                sDiv.className = 'shift-area';
                if (!isHighlighted) sDiv.style.backgroundColor = shift.color;
                sDiv.textContent = shift.name;

                cell.onclick = () => {
                    if (vNames.length > 0) showVocationModal(`${currentMonth+1}월 ${d}일 연차자`, vNames);
                };

                cell.append(dDiv, sDiv);
                container.appendChild(cell);
            }
        }

        // 연차 확인 모달
        function showVocationModal(title, names) {
            const head = document.getElementById('modalHeader');
            head.textContent = title;
            head.className = "p-4 border-b font-black text-center text-lg bg-purple-50 text-purple-700";
            document.getElementById('modalBody').innerHTML = names.map(n => `<div class="bg-slate-50 p-3 rounded-xl border border-slate-100">${n}</div>`).join('');
            document.getElementById('modalConfirmBtn').classList.add('hidden');
            document.getElementById('commonModal').classList.add('active');
        }

        // [해결] 설정 인증 모달 (인증 버튼 포함)
        function openConfigModal() {
            const head = document.getElementById('modalHeader');
            head.textContent = "⚙️ 관리자 인증";
            head.className = "p-4 border-b font-black text-center text-lg bg-slate-50 text-slate-700";
            document.getElementById('modalBody').innerHTML = `
                <p class="text-sm text-slate-500 mb-1">비밀번호를 입력하세요</p>
                <input type="password" id="pwInput" class="w-full p-4 bg-slate-100 rounded-2xl text-center text-xl tracking-widest outline-none border-2 border-transparent focus:border-slate-300" placeholder="••••">
            `;
            const cBtn = document.getElementById('modalConfirmBtn');
            cBtn.classList.remove('hidden');
            cBtn.onclick = () => {
                if(document.getElementById('pwInput').value === config.adminPassword) {
                    alert('인증 성공! 설정 메뉴로 이동합니다.');
                    closeModal();
                } else {
                    alert('비밀번호가 올바르지 않습니다.');
                }
            };
            document.getElementById('commonModal').classList.add('active');
            setTimeout(() => document.getElementById('pwInput').focus(), 100);
        }

        function closeModal() { document.getElementById('commonModal').classList.remove('active'); }
        function changeMonth(v) { currentMonth += v; if(currentMonth<0){currentMonth=11;currentYear--;} else if(currentMonth>11){currentMonth=0;currentYear++;} render(); }
        
        window.onload = init;
        window.onfocus = render; 
    </script>
</body>
</html>
