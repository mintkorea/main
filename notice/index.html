<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUK Campus Security - 보안 관제 센터</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for JSX parsing in browser -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Firebase Mocking or Setup (이미지의 로직 반영)
        // 실제 운영시는 상단에 Firebase SDK를 추가해야 합니다.
        
        const App = () => {
            const [view, setView] = useState('report'); // 'report', 'history', 'setup'
            const [user, setUser] = useState({ uid: 'Guest-' + Math.random().toString(36).substr(2, 9) });
            const [title, setTitle] = useState('');
            const [location, setLocation] = useState('');
            const [description, setDescription] = useState('');
            const [history, setHistory] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [successMsg, setSuccessMsg] = useState(false);

            // 초기 로드 시 더미 데이터 또는 로컬 스토리지 데이터 로드
            useEffect(() => {
                const saved = localStorage.getItem('incident_reports');
                if (saved) setHistory(JSON.parse(saved));
            }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!title || !location) return;

                setIsSubmitting(true);
                
                const newReport = {
                    id: Date.now(),
                    title,
                    location,
                    description,
                    status: '접수대기',
                    createdAt: new Date().toLocaleString()
                };

                const updatedHistory = [newReport, ...history];
                setHistory(updatedHistory);
                localStorage.setItem('incident_reports', JSON.stringify(updatedHistory));

                setTimeout(() => {
                    setSuccessMsg(true);
                    setTitle('');
                    setLocation('');
                    setDescription('');
                    setIsSubmitting(false);
                    setTimeout(() => {
                        setSuccessMsg(false);
                        setView('history');
                    }, 2000);
                }, 800);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-2xl mx-auto">
                    {/* Header */}
                    <header className="mb-8 flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                                <span className="p-2 bg-blue-600 rounded-lg">🛡️</span>
                                보안 관제 센터
                            </h1>
                            <p className="text-slate-400 text-sm mt-1">CUK Campus Security System</p>
                        </div>
                        <button 
                            onClick={() => setView('setup')}
                            className="p-2 hover:bg-slate-800 rounded-full transition-colors"
                        >
                            <i data-lucide="settings" className="w-5 h-5 text-slate-400"></i>
                        </button>
                    </header>

                    {/* Nav Tabs */}
                    <div className="flex bg-slate-800/50 p-1 rounded-xl mb-6">
                        <button 
                            onClick={() => setView('report')}
                            className={`flex-1 py-3 text-sm font-semibold rounded-lg transition-all ${view === 'report' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}
                        >
                            사건 신고
                        </button>
                        <button 
                            onClick={() => setView('history')}
                            className={`flex-1 py-3 text-sm font-semibold rounded-lg transition-all ${view === 'history' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}
                        >
                            신고 내역
                        </button>
                    </div>

                    {/* Content Area */}
                    <main className="glass-card rounded-2xl p-6 shadow-2xl">
                        {view === 'report' && (
                            <div className="space-y-4">
                                {successMsg ? (
                                    <div className="text-center py-10 animate-bounce">
                                        <div className="w-16 h-16 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                            <i data-lucide="check-circle-2" className="w-10 h-10"></i>
                                        </div>
                                        <h2 className="text-xl font-bold">성공적으로 접수되었습니다</h2>
                                        <p className="text-slate-400 mt-2">상황실에서 즉시 확인 후 조치하겠습니다.</p>
                                    </div>
                                ) : (
                                    <form onSubmit={handleSubmit} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">사건명</label>
                                            <input 
                                                type="text"
                                                value={title}
                                                onChange={(e) => setTitle(e.target.value)}
                                                placeholder="사건명을 입력하세요 (예: 거동 수상자)"
                                                className="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">발생 장소</label>
                                            <input 
                                                type="text"
                                                value={location}
                                                onChange={(e) => setLocation(e.target.value)}
                                                placeholder="발생 장소를 입력하세요 (예: 니콜스관 2층)"
                                                className="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">상세 내용</label>
                                            <textarea 
                                                value={description}
                                                onChange={(e) => setDescription(e.target.value)}
                                                placeholder="상황을 상세히 기술해주세요..."
                                                className="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-white h-32 resize-none focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                            ></textarea>
                                        </div>
                                        <button 
                                            type="submit"
                                            disabled={isSubmitting}
                                            className="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2"
                                        >
                                            {isSubmitting ? '접수 중...' : (
                                                <>
                                                    <i data-lucide="send" className="w-5 h-5"></i>
                                                    신고 제출하기
                                                </>
                                            )}
                                        </button>
                                    </form>
                                )}
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-4">
                                <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                                    <i data-lucide="list" className="w-5 h-5 text-blue-500"></i>
                                    나의 신고 내역
                                </h3>
                                {history.length === 0 ? (
                                    <div className="text-center py-10 text-slate-500">
                                        내역이 없습니다.
                                    </div>
                                ) : (
                                    history.map(item => (
                                        <div key={item.id} className="bg-slate-900/50 border border-slate-800 p-4 rounded-xl flex flex-col gap-2">
                                            <div className="flex justify-between items-start">
                                                <h4 className="font-bold text-blue-400">{item.title}</h4>
                                                <span className="text-[10px] px-2 py-1 bg-blue-600/20 text-blue-400 rounded-full font-bold">
                                                    {item.status}
                                                </span>
                                            </div>
                                            <div className="flex items-center gap-2 text-xs text-slate-400">
                                                <i data-lucide="map-pin" className="w-3 h-3"></i>
                                                {item.location}
                                            </div>
                                            <div className="flex items-center gap-2 text-xs text-slate-500">
                                                <i data-lucide="clock" className="w-3 h-3"></i>
                                                {item.createdAt}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {view === 'setup' && (
                            <div className="space-y-4">
                                <h3 className="text-lg font-bold mb-4">시스템 설정</h3>
                                <p className="text-sm text-slate-400">운영자 ID: <span className="text-blue-400">{user.uid}</span></p>
                                <div className="p-4 bg-red-500/10 border border-red-500/20 rounded-xl">
                                    <p className="text-xs text-red-400 leading-relaxed">
                                        <strong>주의:</strong> Firebase 설정값이 누락된 경우 오프라인 모드로 동작합니다. 실제 서버 연동을 위해서는 API Key 설정이 필요합니다.
                                    </p>
                                </div>
                                <button 
                                    onClick={() => setView('report')}
                                    className="w-full py-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-all"
                                >
                                    돌아가기
                                </button>
                            </div>
                        )}
                    </main>

                    <footer className="mt-8 text-center text-[10px] text-slate-600">
                        &copy; 2026 The Catholic University of Korea Security Services.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize icons after render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
