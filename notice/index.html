<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Docs - Pro Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        .editor-area { min-height: 450px; outline: none; background: white; padding: 2rem; }
        .editor-area:empty:before { content: attr(placeholder); color: #cbd5e1; }
        
        /* 컴포넌트 래퍼 */
        .comp-wrapper {
            border: 2px solid #f1f5f9;
            border-radius: 1rem;
            margin: 1.5rem 0;
            background: #fff;
            position: relative;
        }
        .comp-header {
            background: #f8fafc;
            padding: 10px 16px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .comp-preview {
            width: 100%;
            min-height: 250px;
            border: none;
            display: block;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        #toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: white; padding: 0.8rem 2rem;
            border-radius: 99px; font-weight: 600; z-index: 1000;
            opacity: 0; transition: all 0.3s; pointer-events: none;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="toast">알림 메시지</div>

    <div class="max-w-5xl mx-auto">
        <!-- 상단 바 -->
        <header class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-3 cursor-pointer" onclick="goToList()">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black shadow-xl shadow-indigo-200 text-xl">S</div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 leading-tight">SMART DOCS</h1>
                    <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Management System</p>
                </div>
            </div>
            <button id="btn-new-main" onclick="openNewEditor()" class="bg-indigo-600 text-white px-7 py-3 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 flex items-center gap-2">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
                새 문서 작성
            </button>
        </header>

        <!-- [1] 목록 화면 -->
        <section id="view-list" class="view-section active fade-in">
            <div id="list-grid" class="grid md:grid-cols-2 gap-6">
                <!-- 리스트 출력 영역 -->
            </div>
        </section>

        <!-- [2] 편집/수정 화면 -->
        <section id="view-write" class="view-section fade-in">
            <div class="flex items-center justify-between mb-6">
                <h2 id="write-view-title" class="text-2xl font-black text-slate-800">문서 작성하기</h2>
                <button onclick="goToList()" class="text-slate-400 font-bold hover:text-slate-600">닫기</button>
            </div>

            <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-8 border-b border-slate-100">
                    <input type="text" id="post-title" placeholder="제목을 입력하세요" class="w-full text-4xl font-black outline-none placeholder:text-slate-200 text-slate-800">
                </div>
                
                <div class="bg-slate-50/50 px-8 py-4 border-b border-slate-100 flex flex-wrap gap-4 items-center">
                    <button onclick="document.getElementById('file-loader').click()" class="bg-white border-2 border-slate-200 text-slate-600 px-5 py-2.5 rounded-xl font-bold hover:border-indigo-500 hover:text-indigo-600 transition-all flex items-center gap-2 text-sm">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
                        HTML 컴포넌트(달력/표) 불러오기
                    </button>
                    <input type="file" id="file-loader" class="hidden" accept=".html" onchange="handleFileImport(event)">
                </div>

                <div id="main-editor" contenteditable="true" placeholder="이곳에 내용을 입력하거나 파일을 불러오세요..." class="editor-area prose prose-slate max-w-none"></div>
            </div>

            <div class="mt-8 flex justify-end gap-4 pb-20">
                <button onclick="goToList()" class="px-8 py-3 text-slate-400 font-bold hover:text-slate-600 transition-colors">취소</button>
                <button onclick="saveDocument()" class="bg-slate-900 text-white px-14 py-4 rounded-[1.5rem] font-bold hover:bg-black hover:scale-[1.02] active:scale-95 transition-all shadow-xl shadow-slate-200">
                    저장하고 게시하기
                </button>
            </div>
        </section>

        <!-- [3] 상세 보기 화면 -->
        <section id="view-detail" class="view-section fade-in">
            <div class="bg-white rounded-[2.5rem] p-10 md:p-16 shadow-sm border border-slate-200">
                <div class="mb-10">
                    <div id="detail-date" class="text-indigo-500 font-bold text-xs tracking-widest mb-3">DATE</div>
                    <h2 id="detail-title" class="text-5xl font-black text-slate-900 leading-tight"></h2>
                </div>
                
                <div id="detail-content" class="prose prose-indigo max-w-none min-h-[300px] text-slate-700"></div>
                
                <div class="mt-20 pt-10 border-t border-slate-100 flex justify-between items-center">
                    <button onclick="goToList()" class="flex items-center gap-2 text-slate-400 font-bold hover:text-slate-800 transition-colors">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"></path></svg>
                        목록으로
                    </button>
                    <div class="flex gap-3">
                        <button onclick="deleteDoc()" class="bg-red-50 text-red-500 px-6 py-3 rounded-2xl font-bold hover:bg-red-100 transition-colors">삭제</button>
                        <button onclick="editDoc()" class="bg-indigo-600 text-white px-10 py-3 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">수정하기</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('smart_docs_pro_v3') || '[]');
        let currentId = null; // 현재 작업 중인 문서 ID

        function notify(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            document.getElementById('btn-new-main').style.display = (viewId === 'list') ? 'flex' : 'none';
            window.scrollTo(0, 0);
        }

        function goToList() {
            renderList();
            showView('list');
        }

        function openNewEditor() {
            currentId = null;
            document.getElementById('write-view-title').innerText = "문서 작성하기";
            document.getElementById('post-title').value = "";
            document.getElementById('main-editor').innerHTML = "";
            showView('write');
        }

        // HTML 파일 임포트 및 컴포넌트 생성
        function handleFileImport(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                const rawHtml = ev.target.result;
                const encodedSource = btoa(unescape(encodeURIComponent(rawHtml)));
                
                const wrapper = document.createElement('div');
                wrapper.className = 'comp-wrapper';
                wrapper.setAttribute('contenteditable', 'false');
                wrapper.setAttribute('data-source', encodedSource);
                wrapper.setAttribute('data-filename', file.name);

                wrapper.innerHTML = `
                    <div class="comp-header">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">FILE: ${file.name}</span>
                        <button onclick="this.closest('.comp-wrapper').remove()" class="text-slate-300 hover:text-red-500 p-1">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    <iframe class="comp-preview" srcdoc="${rawHtml.replace(/"/g, '&quot;')}"></iframe>
                `;
                
                document.getElementById('main-editor').appendChild(wrapper);
                document.getElementById('main-editor').appendChild(document.createElement('p')).innerHTML = "<br>";
                
                const iframe = wrapper.querySelector('iframe');
                iframe.onload = () => {
                    setTimeout(() => {
                        iframe.style.height = (iframe.contentWindow.document.body.scrollHeight + 30) + 'px';
                    }, 500);
                };
            };
            reader.readAsText(file);
            e.target.value = "";
        }

        // 저장 로직 (신규 & 수정 통합)
        function saveDocument() {
            const title = document.getElementById('post-title').value.trim();
            if (!title) return notify("제목을 입력해 주세요.");

            const editor = document.getElementById('main-editor');
            const clone = editor.cloneNode(true);
            
            // 컴포넌트는 소스코드만 남기고 저장용 플레이스홀더로 변환
            clone.querySelectorAll('.comp-wrapper').forEach(w => {
                const source = w.getAttribute('data-source');
                const filename = w.getAttribute('data-filename');
                const p = document.createElement('div');
                p.className = 'saved-component';
                p.setAttribute('data-source', source);
                p.setAttribute('data-filename', filename);
                w.parentNode.replaceChild(p, w);
            });

            const docData = {
                id: currentId || Date.now(),
                title: title,
                content: clone.innerHTML,
                date: new Date().toLocaleDateString('ko-KR', {year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})
            };

            if (currentId) {
                // 수정 모드
                const idx = db.findIndex(item => item.id === currentId);
                if (idx !== -1) db[idx] = docData;
            } else {
                // 신규 모드
                db.push(docData);
            }

            localStorage.setItem('smart_docs_pro_v3', JSON.stringify(db));
            notify(currentId ? "수정되었습니다." : "저장되었습니다.");
            setTimeout(goToList, 500);
        }

        function renderList() {
            const grid = document.getElementById('list-grid');
            if (db.length === 0) {
                grid.innerHTML = `
                    <div class="md:col-span-2 py-32 text-center border-2 border-dashed border-slate-200 rounded-[2.5rem] bg-white">
                        <p class="text-slate-300 font-bold text-lg">작성된 문서가 없습니다.</p>
                    </div>
                `;
                return;
            }
            grid.innerHTML = db.slice().reverse().map(item => `
                <div onclick="openDetail(${item.id})" class="bg-white p-10 rounded-[2.5rem] border border-slate-200 cursor-pointer hover:shadow-2xl hover:border-indigo-100 transition-all group relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-2 h-full bg-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <span class="text-[10px] font-black text-indigo-500 tracking-tighter uppercase">${item.date}</span>
                    <h3 class="text-2xl font-black mt-3 text-slate-800 group-hover:text-indigo-600 transition-colors line-clamp-2">${item.title}</h3>
                    <div class="mt-8 flex items-center gap-2 text-slate-400 font-bold text-xs">
                        문서 열기
                        <svg class="group-hover:translate-x-1 transition-transform" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M13 7l5 5-5 5M6 7l5 5-5 5"></path></svg>
                    </div>
                </div>
            `).join('');
        }

        function openDetail(id) {
            const item = db.find(i => i.id === id);
            if (!item) return;
            currentId = id;
            document.getElementById('detail-title').innerText = item.title;
            document.getElementById('detail-date').innerText = item.date;
            
            const viewer = document.getElementById('detail-content');
            viewer.innerHTML = item.content;
            restoreComponents(viewer, false);
            
            showView('detail');
        }

        // 수정 모드로 진입하는 함수
        function editDoc() {
            const item = db.find(i => i.id === currentId);
            if (!item) return;

            document.getElementById('write-view-title').innerText = "문서 수정하기";
            document.getElementById('post-title').value = item.title;
            
            const editor = document.getElementById('main-editor');
            editor.innerHTML = item.content;
            
            // 플레이스홀더를 다시 iframe으로 변환
            restoreComponents(editor, true);
            
            showView('write');
        }

        // 저장된 컴포넌트 데이터를 다시 실행 가능한 iframe으로 변환
        function restoreComponents(container, isEditable) {
            container.querySelectorAll('.saved-component').forEach(placeholder => {
                const sourceEncoded = placeholder.getAttribute('data-source');
                const filename = placeholder.getAttribute('data-filename');
                const rawHtml = decodeURIComponent(escape(atob(sourceEncoded)));

                const wrapper = document.createElement('div');
                wrapper.className = 'comp-wrapper';
                wrapper.setAttribute('contenteditable', 'false');
                wrapper.setAttribute('data-source', sourceEncoded);
                wrapper.setAttribute('data-filename', filename);

                wrapper.innerHTML = `
                    <div class="comp-header">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">FILE: ${filename}</span>
                        ${isEditable ? `
                        <button onclick="this.closest('.comp-wrapper').remove()" class="text-slate-300 hover:text-red-500 p-1">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>` : ''}
                    </div>
                    <iframe class="comp-preview" srcdoc="${rawHtml.replace(/"/g, '&quot;')}"></iframe>
                `;
                
                placeholder.parentNode.replaceChild(wrapper, placeholder);
                
                const iframe = wrapper.querySelector('iframe');
                iframe.onload = () => {
                    setTimeout(() => {
                        iframe.style.height = (iframe.contentWindow.document.body.scrollHeight + 30) + 'px';
                    }, 500);
                };
            });
        }

        function deleteDoc() {
            if (!confirm("이 문서를 삭제할까요? 복구할 수 없습니다.")) return;
            db = db.filter(item => item.id !== currentId);
            localStorage.setItem('smart_docs_pro_v3', JSON.stringify(db));
            goToList();
            notify("삭제되었습니다.");
        }

        // 초기 실행
        renderList();
    </script>
</body>
</html>
