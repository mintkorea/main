<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced WYSIWYG Workstation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8fafc;
        }

        /* WYSIWYG Editor Styling */
        .editor-content {
            min-height: 700px;
            background: white;
            padding: 50px 60px;
            outline: none;
            line-height: 1.8;
            font-size: 16px;
            color: #334155;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }

        .editor-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 15px 0;
            display: block;
            transition: all 0.2s;
            cursor: pointer;
        }

        .editor-content img.active-img {
            outline: 3px solid #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        /* File Attachment Styling */
        .file-box {
            display: inline-flex;
            align-items: center;
            background: #f1f5f9;
            border: 1px dashed #cbd5e1;
            padding: 12px 20px;
            border-radius: 12px;
            margin: 10px 0;
            gap: 15px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .file-box:hover { background: #e2e8f0; }

        /* HTML Widget Box */
        .widget-box {
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            margin: 25px 0;
            overflow: hidden;
            background: #fff;
        }
        .widget-toolbar {
            background: #f8fafc;
            padding: 8px 16px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Custom Toolbar Specifics */
        .tool-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            color: #475569;
            transition: all 0.2s;
        }
        .tool-btn:hover { background: #f1f5f9; color: #6366f1; }
        .tool-btn.active { background: #e0e7ff; color: #4338ca; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Top Navbar -->
    <header class="h-16 bg-white border-b px-6 flex items-center justify-between shadow-sm z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <i class="fa-solid fa-pen-nib text-indigo-600"></i>
                <span>WYSIWYG Pro <span class="text-xs font-normal text-slate-400">v2.5</span></span>
            </h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="exportDocument()" class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-slate-600 border rounded-lg hover:bg-slate-50">
                <i class="fa-solid fa-file-export"></i> HTML 내보내기
            </button>
            <button onclick="saveToLocal()" class="flex items-center gap-2 px-6 py-2 text-sm font-bold bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">
                저장하기
            </button>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- Main Editor Area -->
        <main class="flex-1 overflow-y-auto bg-slate-50 flex flex-col items-center py-10 px-4">
            
            <!-- Floating Toolbar -->
            <div class="w-full max-w-4xl bg-white mb-6 p-2 rounded-xl shadow-md border flex flex-wrap items-center gap-1 sticky top-0 z-40">
                <button onclick="format('bold')" class="tool-btn" title="굵게"><i class="fa-solid fa-bold"></i></button>
                <button onclick="format('italic')" class="tool-btn" title="기울임"><i class="fa-solid fa-italic"></i></button>
                <button onclick="format('underline')" class="tool-btn" title="밑줄"><i class="fa-solid fa-underline"></i></button>
                <button onclick="format('strikeThrough')" class="tool-btn" title="취소선"><i class="fa-solid fa-strikethrough"></i></button>
                
                <div class="h-6 w-px bg-slate-200 mx-1"></div>
                
                <!-- Font Size Custom -->
                <div class="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded-lg">
                    <i class="fa-solid fa-text-height text-[10px] text-slate-400"></i>
                    <input type="number" id="fontSizeInput" value="16" min="8" max="100" class="w-12 bg-transparent text-sm font-bold outline-none" onchange="applyFontSize()">
                    <span class="text-[10px] text-slate-400 font-bold">PX</span>
                </div>

                <div class="h-6 w-px bg-slate-200 mx-1"></div>

                <!-- Colors -->
                <div class="flex items-center gap-2 ml-1">
                    <div class="relative group flex items-center gap-1">
                        <i class="fa-solid fa-font text-xs text-slate-400"></i>
                        <input type="color" oninput="format('foreColor', this.value)" class="w-6 h-6 border-none bg-transparent cursor-pointer p-0" title="글자 색상">
                    </div>
                    <div class="relative group flex items-center gap-1">
                        <i class="fa-solid fa-highlighter text-xs text-slate-400"></i>
                        <input type="color" value="#ffff00" oninput="format('hiliteColor', this.value)" class="w-6 h-6 border-none bg-transparent cursor-pointer p-0" title="배경 형광펜">
                    </div>
                </div>

                <div class="h-6 w-px bg-slate-200 mx-1"></div>

                <button onclick="format('justifyLeft')" class="tool-btn"><i class="fa-solid fa-align-left"></i></button>
                <button onclick="format('justifyCenter')" class="tool-btn"><i class="fa-solid fa-align-center"></i></button>
                <button onclick="format('justifyRight')" class="tool-btn"><i class="fa-solid fa-align-right"></i></button>
                
                <div class="h-6 w-px bg-slate-200 mx-1"></div>

                <button onclick="format('insertUnorderedList')" class="tool-btn"><i class="fa-solid fa-list-ul"></i></button>
                <button onclick="format('insertOrderedList')" class="tool-btn"><i class="fa-solid fa-list-ol"></i></button>
                
                <div class="h-6 w-px bg-slate-200 mx-1"></div>

                <button onclick="format('removeFormat')" class="tool-btn text-red-400" title="서식 지우기"><i class="fa-solid fa-eraser"></i></button>
            </div>

            <!-- Paper Surface -->
            <div class="w-full max-w-4xl">
                <input type="text" id="docTitle" placeholder="문서 제목 없음" class="w-full bg-transparent text-4xl font-bold mb-6 px-2 outline-none border-l-4 border-transparent focus:border-indigo-500 transition-all">
                <div id="editor" class="editor-content" contenteditable="true" spellcheck="false">
                    <p>이곳에 내용을 입력하거나 파일을 드래그하여 드롭하세요...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <!-- HTML Source Editor Modal -->
    <div id="htmlModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[100] p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-4xl h-[80vh] rounded-2xl flex flex-col shadow-2xl overflow-hidden">
            <div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-orange-500"></div>
                    <span class="font-bold text-slate-700">HTML 위젯 소스 코드 편집</span>
                </div>
                <button onclick="closeModal('htmlModal')" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <textarea id="htmlCodeInput" class="flex-1 p-6 font-mono text-sm bg-[#1e1e1e] text-emerald-400 outline-none resize-none leading-relaxed" spellcheck="false"></textarea>
            <div class="p-4 bg-white border-t flex justify-end gap-3">
                <button onclick="closeModal('htmlModal')" class="px-6 py-2 font-semibold text-slate-500 hover:bg-slate-100 rounded-lg">취소</button>
                <button onclick="updateHtmlWidget()" class="px-8 py-2 font-bold bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 shadow-md">변경사항 적용</button>
            </div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const fontSizeInput = document.getElementById('fontSizeInput');
        let currentEditingWidget = null;

        // --- Core Editor Functions ---
        function format(cmd, val = null) {
            document.execCommand(cmd, false, val);
            editor.focus();
        }

        function applyFontSize() {
            const size = fontSizeInput.value;
            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            const range = selection.getRangeAt(0);
            const span = document.createElement('span');
            span.style.fontSize = size + 'px';
            
            if (range.toString().length > 0) {
                span.textContent = range.toString();
                range.deleteContents();
                range.insertNode(span);
            } else {
                span.innerHTML = '&#8203;'; // Zero-width space
                range.insertNode(span);
                const newRange = document.createRange();
                newRange.setStart(span, 1);
                newRange.collapse(true);
                selection.removeAllRanges();
                selection.addRange(newRange);
            }
        }

        // --- Drag & Drop for Images & Files & HTML ---
        editor.addEventListener('dragover', e => e.preventDefault());
        editor.addEventListener('drop', async (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (!files.length) return;

            // 삽입 위치 조정
            if (document.caretRangeFromPoint) {
                const range = document.caretRangeFromPoint(e.clientX, e.clientY);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }

            for (const file of files) {
                const extension = file.name.split('.').pop().toLowerCase();
                
                if (['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp'].includes(extension)) {
                    insertImage(file);
                } else if (extension === 'html' || extension === 'htm') {
                    insertHtmlWidget(file);
                } else {
                    insertFileBox(file);
                }
            }
        });

        function insertImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.onclick = function() {
                    document.querySelectorAll('.active-img').forEach(el => el.classList.remove('active-img'));
                    this.classList.add('active-img');
                };
                insertAtCursor(img);
            };
            reader.readAsDataURL(file);
        }

        function insertFileBox(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const box = document.createElement('div');
                box.className = 'file-box';
                box.contentEditable = "false";
                box.setAttribute('data-name', file.name);
                box.setAttribute('data-content', e.target.result);
                box.onclick = () => downloadData(e.target.result, file.name);
                
                box.innerHTML = `
                    <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-file-arrow-down text-xl"></i>
                    </div>
                    <div class="flex flex-col text-left">
                        <span class="text-sm font-bold text-slate-700">${file.name}</span>
                        <span class="text-[10px] text-slate-400 font-semibold uppercase">${file.size.toLocaleString()} bytes • 클릭하여 다운로드</span>
                    </div>
                `;
                insertAtCursor(box);
            };
            reader.readAsDataURL(file);
        }

        function insertHtmlWidget(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                const widgetId = 'widget-' + Date.now();
                const container = document.createElement('div');
                container.id = widgetId;
                container.className = 'widget-box';
                container.contentEditable = "false";
                
                container.innerHTML = `
                    <div class="widget-toolbar">
                        <span class="text-[10px] font-bold text-slate-400 flex items-center gap-1">
                            <i class="fa-solid fa-code"></i> HTML WIDGET: ${file.name}
                        </span>
                        <div class="flex gap-3">
                            <button onclick="openHtmlEditor('${widgetId}')" class="text-xs font-bold text-indigo-600 hover:text-indigo-800">편집</button>
                            <button onclick="document.getElementById('${widgetId}').remove()" class="text-xs font-bold text-red-400">삭제</button>
                        </div>
                    </div>
                    <div class="widget-preview p-4">
                        <iframe srcdoc="${content.replace(/"/g, '&quot;')}" class="w-full border-none pointer-events-none" style="min-height: 100px;"></iframe>
                    </div>
                    <script type="text/source" style="display:none;">${content}<\/script>
                `;
                insertAtCursor(container);
                
                // Iframe Auto-height
                const iframe = container.querySelector('iframe');
                iframe.onload = function() {
                    this.style.height = this.contentWindow.document.body.scrollHeight + 'px';
                };
            };
            reader.readAsText(file);
        }

        function insertAtCursor(node) {
            const sel = window.getSelection();
            if (sel.rangeCount) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                range.insertNode(node);
                
                // 줄바꿈 추가
                const br = document.createElement('p');
                br.innerHTML = '<br>';
                node.after(br);
                
                range.setStartAfter(br);
                range.setEndAfter(br);
                sel.removeAllRanges();
                sel.addRange(range);
            }
            editor.focus();
        }

        // --- HTML Widget Editing ---
        function openHtmlEditor(id) {
            currentEditingWidget = document.getElementById(id);
            const source = currentEditingWidget.querySelector('script[type="text/source"]').innerHTML;
            document.getElementById('htmlCodeInput').value = source;
            document.getElementById('htmlModal').style.display = 'flex';
        }

        function updateHtmlWidget() {
            if (!currentEditingWidget) return;
            const newSource = document.getElementById('htmlCodeInput').value;
            currentEditingWidget.querySelector('script[type="text/source"]').innerHTML = newSource;
            const iframe = currentEditingWidget.querySelector('iframe');
            iframe.srcdoc = newSource;
            closeModal('htmlModal');
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // --- Data Persistence ---
        function saveToLocal() {
            const data = {
                title: document.getElementById('docTitle').value,
                content: editor.innerHTML,
                timestamp: new Date().toISOString()
            };
            localStorage.setItem('wysiwyg_save', JSON.stringify(data));
            
            // 시각적 피드백
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> 저장됨';
            btn.classList.replace('bg-indigo-600', 'bg-emerald-500');
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.replace('bg-emerald-500', 'bg-indigo-600');
            }, 2000);
        }

        window.onload = () => {
            const saved = localStorage.getItem('wysiwyg_save');
            if (saved) {
                const parsed = JSON.parse(saved);
                document.getElementById('docTitle').value = parsed.title || '';
                editor.innerHTML = parsed.content || '<p><br></p>';
                
                // 위젯들 iframe 복구
                editor.querySelectorAll('.widget-box').forEach(w => {
                    const src = w.querySelector('script[type="text/source"]').innerHTML;
                    w.querySelector('iframe').srcdoc = src;
                });
            }
        };

        // --- Export ---
        function downloadData(dataUrl, filename) {
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = filename;
            link.click();
        }

        function exportDocument() {
            const title = document.getElementById('docTitle').value || 'Untitled-Document';
            const html = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>${title}</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 50px auto; line-height: 1.8; color: #333; }
        img { max-width: 100%; height: auto; border-radius: 8px; }
        .file-box { border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: #f9f9f9; display: inline-flex; align-items: center; gap: 10px; }
        .widget-box { border: 1px solid #eee; margin: 20px 0; border-radius: 8px; overflow: hidden; }
        .widget-toolbar { background: #f5f5f5; padding: 5px 15px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <h1>${title}</h1>
    <hr>
    <div>${editor.innerHTML}</div>
</body>
</html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            downloadData(url, title + '.html');
        }
    </script>
</body>
</html>
