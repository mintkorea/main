<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUK Campus Security - 보안 관제 센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .input-dark { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(71, 85, 105, 0.5); color: white; }
        .input-dark:focus { border-color: #3b82f6; ring: 2px; ring-color: #3b82f6; outline: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('loading'); // loading, setup, report, history
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [configRaw, setConfigRaw] = useState('');
            
            // Form States
            const [title, setTitle] = useState('');
            const [location, setLocation] = useState('');
            const [description, setDescription] = useState('');
            const [history, setHistory] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);

            // 1. 초기화 로직: 로컬 스토리지 또는 환경 변수에서 설정 확인
            useEffect(() => {
                const savedConfig = localStorage.getItem('CUK_FIREBASE_CONFIG');
                if (savedConfig) {
                    try {
                        initFirebase(JSON.parse(savedConfig));
                    } catch (e) {
                        setView('setup');
                    }
                } else {
                    setView('setup');
                }
            }, []);

            const initFirebase = (config) => {
                try {
                    if (!firebase.apps.length) {
                        const app = firebase.initializeApp(config);
                        const auth = firebase.auth();
                        const firestore = firebase.firestore();
                        
                        setDb(firestore);
                        
                        auth.signInAnonymously().then(cred => {
                            setUser(cred.user);
                            setView('report');
                            loadHistory(firestore, cred.user.uid);
                        });
                    } else {
                        setView('report');
                    }
                } catch (err) {
                    alert("Firebase 초기화 실패: " + err.message);
                    setView('setup');
                }
            };

            const loadHistory = (firestore, uid) => {
                // 실제 연동 시에는 collection 경로를 수정하세요
                firestore.collection('incident_reports')
                    .where('userId', '==', uid)
                    .orderBy('createdAt', 'desc')
                    .onSnapshot(snapshot => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setHistory(data);
                    }, err => console.error("데이터 로드 오류:", err));
            };

            const handleSaveConfig = (e) => {
                e.preventDefault();
                try {
                    const parsed = JSON.parse(configRaw);
                    localStorage.setItem('CUK_FIREBASE_CONFIG', configRaw);
                    initFirebase(parsed);
                } catch (e) {
                    alert("올바른 JSON 형식이 아닙니다.");
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!db || !user || isSubmitting) return;

                setIsSubmitting(true);
                try {
                    await db.collection('incident_reports').add({
                        userId: user.uid,
                        title,
                        location,
                        description,
                        status: '접수대기',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    setShowSuccess(true);
                    setTitle('');
                    setLocation('');
                    setDescription('');
                    
                    setTimeout(() => {
                        setShowSuccess(false);
                        setView('history');
                        setIsSubmitting(false);
                    }, 2000);
                } catch (err) {
                    alert("제출 실패: " + err.message);
                    setIsSubmitting(false);
                }
            };

            // Loading View
            if (view === 'loading') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen">
                        <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-slate-400 animate-pulse font-bold tracking-widest">SYSTEM BOOTING...</p>
                    </div>
                );
            }

            // Setup View
            if (view === 'setup') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 animate-in">
                        <div className="glass max-w-md w-full p-8 rounded-3xl shadow-2xl">
                            <h2 className="text-2xl font-bold mb-2 flex items-center gap-2">
                                <span className="text-blue-500">⚙️</span> System Setup
                            </h2>
                            <p className="text-slate-400 text-sm mb-6">Firebase 구성 JSON을 입력하여 시스템을 활성화하십시오.</p>
                            <form onSubmit={handleSaveConfig} className="space-y-4">
                                <textarea 
                                    className="w-full h-48 input-dark rounded-xl p-4 text-xs font-mono"
                                    placeholder='{ "apiKey": "...", "authDomain": "...", ... }'
                                    value={configRaw}
                                    onChange={(e) => setConfigRaw(e.target.value)}
                                    required
                                />
                                <button className="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold shadow-lg transition-all">
                                    설정 저장 및 시작
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 flex flex-col animate-in">
                    {/* Header */}
                    <header className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-xl font-black text-white tracking-tight flex items-center gap-2">
                                <div className="w-2 h-6 bg-blue-600 rounded-full"></div>
                                보안 관제 센터
                            </h1>
                            <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">CUK Security Service</p>
                        </div>
                        <div className="text-right">
                            <div className="text-[10px] text-slate-500 font-bold">OPERATOR ID</div>
                            <div className="text-xs text-blue-400 font-mono">{user?.uid.slice(0, 12)}...</div>
                        </div>
                    </header>

                    {/* Tabs */}
                    <nav className="flex bg-slate-900/50 p-1 rounded-2xl mb-6 border border-slate-800">
                        <button 
                            onClick={() => setView('report')}
                            className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all ${view === 'report' ? 'bg-blue-600 shadow-lg text-white' : 'text-slate-500'}`}
                        >
                            사건 신고
                        </button>
                        <button 
                            onClick={() => setView('history')}
                            className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all ${view === 'history' ? 'bg-blue-600 shadow-lg text-white' : 'text-slate-500'}`}
                        >
                            신고 내역
                        </button>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-1 glass rounded-3xl p-6 shadow-xl relative overflow-hidden">
                        {showSuccess && (
                            <div className="absolute inset-0 bg-blue-600 z-50 flex flex-col items-center justify-center animate-in">
                                <div className="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mb-4">
                                    <svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <h2 className="text-xl font-bold">신고 접수 완료</h2>
                                <p className="text-blue-100 text-sm mt-2">상황실에서 확인 중입니다.</p>
                            </div>
                        )}

                        {view === 'report' && (
                            <form onSubmit={handleSubmit} className="space-y-5">
                                <div>
                                    <label className="block text-[10px] font-bold text-slate-500 mb-2 ml-1">INCIDENT TITLE</label>
                                    <input 
                                        type="text" 
                                        value={title}
                                        onChange={(e) => setTitle(e.target.value)}
                                        placeholder="사건명을 입력하세요 (예: 거동 수상자)"
                                        className="w-full p-4 input-dark rounded-2xl text-sm"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold text-slate-500 mb-2 ml-1">LOCATION</label>
                                    <input 
                                        type="text" 
                                        value={location}
                                        onChange={(e) => setLocation(e.target.value)}
                                        placeholder="발생 장소 (예: 니콜스관 2층)"
                                        className="w-full p-4 input-dark rounded-2xl text-sm"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold text-slate-500 mb-2 ml-1">DETAILS</label>
                                    <textarea 
                                        value={description}
                                        onChange={(e) => setDescription(e.target.value)}
                                        placeholder="상황을 상세히 기술해주세요..."
                                        className="w-full p-4 input-dark rounded-2xl text-sm h-32 resize-none"
                                    />
                                </div>
                                <button 
                                    disabled={isSubmitting}
                                    className="w-full py-5 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 rounded-2xl font-bold shadow-lg transition-all flex items-center justify-center gap-2"
                                >
                                    {isSubmitting ? '전송 중...' : '긴급 신고 제출'}
                                </button>
                            </form>
                        )}

                        {view === 'history' && (
                            <div className="space-y-4">
                                {history.length === 0 ? (
                                    <div className="text-center py-20 text-slate-600 font-bold">내역이 없습니다.</div>
                                ) : (
                                    history.map(item => (
                                        <div key={item.id} className="p-4 bg-slate-900/50 border border-slate-800 rounded-2xl">
                                            <div className="flex justify-between items-start mb-2">
                                                <h4 className="font-bold text-blue-400">{item.title}</h4>
                                                <span className="text-[10px] px-2 py-1 bg-blue-500/10 text-blue-500 rounded-lg font-bold">
                                                    {item.status}
                                                </span>
                                            </div>
                                            <div className="text-xs text-slate-400 flex items-center gap-1">
                                                <span>📍 {item.location}</span>
                                            </div>
                                            <div className="text-[10px] text-slate-600 mt-2">
                                                {item.createdAt?.toDate ? item.createdAt.toDate().toLocaleString() : '처리 중...'}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="mt-auto pt-8 pb-4 text-center">
                        <button 
                            onClick={() => { localStorage.removeItem('CUK_FIREBASE_CONFIG'); window.location.reload(); }}
                            className="text-[10px] text-slate-600 underline"
                        >
                            시스템 설정 초기화
                        </button>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
