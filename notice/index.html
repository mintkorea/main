<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Board Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
        }

        .editor-content {
            min-height: 450px;
            outline: none;
            line-height: 1.6;
        }

        /* 에디터 내 테이블 스타일 */
        .editor-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            border: 1px solid #e2e8f0;
        }

        .editor-content td, .editor-content th {
            border: 1px solid #e2e8f0;
            padding: 12px;
            min-width: 50px;
        }

        /* HTML 프리뷰 Iframe 스타일 */
        .html-preview-container {
            border: 2px solid #6366f1;
            border-radius: 12px;
            overflow: hidden;
            margin: 15px 0;
            background: white;
            position: relative;
        }
        
        .html-preview-header {
            background: #6366f1;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .html-preview-frame {
            width: 100%;
            height: 400px;
            border: none;
            display: block;
        }

        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 90; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <!-- 헤더 -->
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-black text-indigo-600 tracking-tighter">BOARD<span class="text-slate-900">PRO</span></h1>
                <p id="view-status" class="text-slate-500 font-medium mt-1">게시글 목록을 확인하세요.</p>
            </div>
            <button id="btn-new-post" onclick="showEditor()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-xl hover:shadow-indigo-200 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                </svg>
                새 글 쓰기
            </button>
        </header>

        <!-- 1. 리스트 뷰 -->
        <section id="section-list" class="view-section active">
            <div class="bg-white rounded-[2rem] shadow-2xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-5 pl-10 text-slate-400 font-bold text-xs uppercase tracking-wider w-24">NO</th>
                            <th class="p-5 text-slate-400 font-bold text-xs uppercase tracking-wider">TITLE</th>
                            <th class="p-5 text-slate-400 font-bold text-xs uppercase tracking-wider w-40 text-center">DATE</th>
                        </tr>
                    </thead>
                    <tbody id="list-body"></tbody>
                </table>
                <div id="list-empty" class="py-32 text-center hidden">
                    <div class="text-slate-300 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                    <p class="text-slate-400 font-medium">등록된 게시글이 없습니다.</p>
                </div>
            </div>
        </section>

        <!-- 2. 에디터 뷰 (쓰기/수정) -->
        <section id="section-editor" class="view-section">
            <div class="bg-white rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100">
                    <input type="text" id="editor-title" placeholder="글 제목을 입력하세요" class="w-full text-2xl font-black outline-none placeholder:text-slate-200">
                </div>
                
                <!-- 에디터 툴바 -->
                <div class="bg-slate-50/80 backdrop-blur-sm border-b border-slate-100 p-3 flex flex-wrap gap-2">
                    <button onclick="execCmd('bold')" class="w-10 h-10 flex items-center justify-center hover:bg-white rounded-xl border border-transparent hover:border-slate-200 transition-all font-black">B</button>
                    <button onclick="execCmd('italic')" class="w-10 h-10 flex items-center justify-center hover:bg-white rounded-xl border border-transparent hover:border-slate-200 transition-all italic font-serif">I</button>
                    <button onclick="execCmd('underline')" class="w-10 h-10 flex items-center justify-center hover:bg-white rounded-xl border border-transparent hover:border-slate-200 transition-all underline">U</button>
                    <div class="w-px h-6 bg-slate-200 my-auto mx-1"></div>
                    <select onchange="execCmd('fontSize', this.value)" class="bg-white px-3 py-1 rounded-xl border border-slate-200 text-sm font-bold outline-none">
                        <option value="3">글자 크기</option>
                        <option value="1">매우 작게</option>
                        <option value="2">작게</option>
                        <option value="4">크게</option>
                        <option value="6">매우 크게</option>
                    </select>
                    <input type="color" onchange="execCmd('foreColor', this.value)" class="w-10 h-10 p-1.5 bg-white border border-slate-200 rounded-xl cursor-pointer">
                    <div class="w-px h-6 bg-slate-200 my-auto mx-1"></div>
                    <button onclick="toggleTableModal()" class="bg-white px-4 py-1 rounded-xl border border-slate-200 text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 transition-all">표 삽입</button>
                    
                    <label class="flex items-center gap-2 bg-indigo-600 text-white px-4 py-1 rounded-xl text-sm font-bold hover:bg-indigo-700 cursor-pointer transition-all shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                        </svg>
                        파일 첨부 (HTML/IMG)
                        <input type="file" id="file-input" class="hidden" accept="image/*, .html" onchange="handleFileUpload(event)">
                    </label>
                </div>

                <div id="editor-body" contenteditable="true" class="editor-content p-8 md:p-12 focus:outline-none"></div>
            </div>
            
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="showList()" class="px-8 py-3 rounded-2xl font-bold text-slate-400 hover:bg-slate-200 transition-all">취소</button>
                <button id="btn-save" onclick="savePost()" class="bg-slate-900 text-white px-10 py-3 rounded-2xl font-bold hover:bg-black shadow-xl transition-all">저장 완료</button>
            </div>
        </section>

        <!-- 3. 읽기 뷰 -->
        <section id="section-read" class="view-section">
            <div class="bg-white rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden">
                <div class="p-8 md:p-12 border-b border-slate-50 bg-slate-50/30">
                    <div class="flex justify-between items-start mb-4">
                        <h2 id="read-title" class="text-4xl font-black text-slate-900 leading-tight"></h2>
                        <div class="flex gap-2">
                            <button onclick="editCurrentPost()" class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all" title="수정">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </button>
                            <button onclick="deleteCurrentPost()" class="p-2 text-red-500 hover:bg-red-50 rounded-xl transition-all" title="삭제">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <p id="read-info" class="text-slate-400 font-medium flex items-center gap-2">
                        <span id="read-date"></span>
                    </p>
                </div>
                <div id="read-content" class="editor-content p-8 md:p-12"></div>
            </div>
            <div class="mt-8 text-center">
                <button onclick="showList()" class="inline-flex items-center gap-2 bg-slate-900 text-white px-12 py-4 rounded-2xl font-bold hover:bg-black shadow-2xl transition-all">
                    목록으로 돌아가기
                </button>
            </div>
        </section>
    </div>

    <!-- 표 모달 -->
    <div id="overlay" class="overlay" onclick="toggleTableModal()"></div>
    <div id="table-modal" class="modal bg-white p-8 rounded-[2rem] shadow-2xl border border-slate-200 w-80">
        <h3 class="text-xl font-black text-slate-800 mb-6">표 만들기</h3>
        <div class="space-y-5 mb-8">
            <div class="flex justify-between items-center">
                <label class="font-bold text-slate-500">줄 (Rows)</label>
                <input type="number" id="row-count" value="3" min="1" max="20" class="w-20 px-3 py-2 border rounded-xl text-center font-bold">
            </div>
            <div class="flex justify-between items-center">
                <label class="font-bold text-slate-500">칸 (Cols)</label>
                <input type="number" id="col-count" value="3" min="1" max="10" class="w-20 px-3 py-2 border rounded-xl text-center font-bold">
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleTableModal()" class="flex-1 py-3 rounded-xl font-bold text-slate-400 hover:bg-slate-50 transition-all">취소</button>
            <button onclick="insertTable()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all">생성</button>
        </div>
    </div>

    <script>
        // 데이터 저장소
        let posts = [];
        let currentPostId = null; // 수정 시 사용
        let isEditMode = false;

        const sections = {
            list: document.getElementById('section-list'),
            editor: document.getElementById('section-editor'),
            read: document.getElementById('section-read')
        };

        // 1. 화면 전환
        function switchSection(name) {
            Object.keys(sections).forEach(key => {
                sections[key].classList.toggle('active', key === name);
            });
            
            const status = document.getElementById('view-status');
            const btnNew = document.getElementById('btn-new-post');

            if (name === 'list') {
                status.innerText = "게시글 목록을 확인하세요.";
                btnNew.style.display = "flex";
                renderList();
            } else if (name === 'editor') {
                status.innerText = isEditMode ? "글을 수정하고 있습니다." : "새로운 글을 작성합니다.";
                btnNew.style.display = "none";
            } else if (name === 'read') {
                status.innerText = "상세 내용을 확인하세요.";
                btnNew.style.display = "none";
            }
            window.scrollTo(0,0);
        }

        function showList() { switchSection('list'); }
        
        function showEditor() {
            isEditMode = false;
            currentPostId = null;
            document.getElementById('editor-title').value = "";
            document.getElementById('editor-body').innerHTML = "";
            document.getElementById('btn-save').innerText = "저장 완료";
            switchSection('editor');
        }

        // 2. 게시글 저장 (신규/수정 공용)
        function savePost() {
            const title = document.getElementById('editor-title').value.trim();
            const content = document.getElementById('editor-body').innerHTML;

            if (!title) {
                alert("제목을 입력해주세요!");
                return;
            }

            if (isEditMode) {
                // 수정
                const idx = posts.findIndex(p => p.id === currentPostId);
                if (idx !== -1) {
                    posts[idx].title = title;
                    posts[idx].content = content;
                    posts[idx].lastEdit = new Date().toLocaleString();
                }
            } else {
                // 신규 등록
                const newPost = {
                    id: Date.now(),
                    title: title,
                    content: content,
                    date: new Date().toLocaleString()
                };
                posts.unshift(newPost);
            }

            showList();
        }

        // 3. 목록 렌더링
        function renderList() {
            const body = document.getElementById('list-body');
            const empty = document.getElementById('list-empty');
            body.innerHTML = "";

            if (posts.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            posts.forEach((post, index) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-50 hover:bg-slate-50/80 cursor-pointer transition-all group";
                tr.innerHTML = `
                    <td class="p-6 pl-10 text-slate-300 font-black text-sm group-hover:text-indigo-400 transition-colors">${posts.length - index}</td>
                    <td class="p-6 font-bold text-slate-700 text-lg">${post.title}</td>
                    <td class="p-6 text-slate-400 text-sm text-center font-medium">${post.date.split('. ')[2] || post.date.split(' ')[0]}</td>
                `;
                tr.onclick = () => readPost(post.id);
                body.appendChild(tr);
            });
        }

        // 4. 글 읽기
        function readPost(id) {
            const post = posts.find(p => p.id === id);
            if (!post) return;

            currentPostId = id;
            document.getElementById('read-title').innerText = post.title;
            document.getElementById('read-date').innerText = `작성일: ${post.date}` + (post.lastEdit ? ` (수정됨: ${post.lastEdit})` : "");
            document.getElementById('read-content').innerHTML = post.content;

            switchSection('read');
        }

        // 5. 글 수정 모드로 전환
        function editCurrentPost() {
            const post = posts.find(p => p.id === currentPostId);
            if (!post) return;

            isEditMode = true;
            document.getElementById('editor-title').value = post.title;
            document.getElementById('editor-body').innerHTML = post.content;
            document.getElementById('btn-save').innerText = "수정 완료";
            
            switchSection('editor');
        }

        // 6. 글 삭제
        function deleteCurrentPost() {
            if (confirm("게시글을 영구적으로 삭제하시겠습니까?")) {
                posts = posts.filter(p => p.id !== currentPostId);
                showList();
            }
        }

        // 7. 파일 업로드 핵심 (HTML 렌더링 포함)
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            if (file.name.toLowerCase().endsWith('.html')) {
                // HTML 파일 읽기
                reader.onload = function(e) {
                    const htmlCode = e.target.result;
                    
                    // 에디터 내부에 iframe 구조 생성하여 실제 렌더링
                    const previewId = "frame-" + Date.now();
                    const htmlContainer = `
                        <div class="html-preview-container" contenteditable="false">
                            <div class="html-preview-header">
                                <span>HTML PREVIEW: ${file.name}</span>
                                <span>Responsive View</span>
                            </div>
                            <iframe id="${previewId}" class="html-preview-frame"></iframe>
                        </div>
                        <p><br></p>
                    `;
                    
                    execCmd('insertHTML', htmlContainer);
                    
                    // iframe 내부에 소스 넣기 (약간의 딜레이 필요)
                    setTimeout(() => {
                        const frame = document.getElementById(previewId);
                        if (frame) {
                            frame.contentWindow.document.open();
                            frame.contentWindow.document.write(htmlCode);
                            frame.contentWindow.document.close();
                        }
                    }, 100);
                };
                reader.readAsText(file);
            } else if (file.type.startsWith('image/')) {
                // 이미지 파일 처리
                reader.onload = function(e) {
                    const imgHtml = `<img src="${e.target.result}" style="max-width:100%; border-radius:15px; margin: 10px 0; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);">`;
                    execCmd('insertHTML', imgHtml);
                };
                reader.readAsDataURL(file);
            }

            event.target.value = "";
        }

        // 에디터 기본 기능
        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('editor-body').focus();
        }

        function toggleTableModal() {
            const modal = document.getElementById('table-modal');
            const overlay = document.getElementById('overlay');
            const isVisible = modal.style.display === 'block';
            modal.style.display = isVisible ? 'none' : 'block';
            overlay.style.display = isVisible ? 'none' : 'block';
        }

        function insertTable() {
            const rows = document.getElementById('row-count').value;
            const cols = document.getElementById('col-count').value;
            let table = '<table>';
            for (let i = 0; i < rows; i++) {
                table += '<tr>';
                for (let j = 0; j < cols; j++) table += '<td>&nbsp;</td>';
                table += '</tr>';
            }
            table += '</table><p><br></p>';
            execCmd('insertHTML', table);
            toggleTableModal();
        }

        // 초기화
        showList();
    </script>
</body>
</html>
