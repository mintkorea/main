<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Table Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
        }

        #editor {
            min-height: 500px;
            outline: none;
            line-height: 1.6;
        }

        #editor table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        #editor td, #editor th {
            border: 1px solid #cbd5e1;
            padding: 12px;
            min-width: 50px;
        }

        /* 폰트 크기 매핑 */
        font[size="1"] { font-size: 12px; }
        font[size="2"] { font-size: 14px; }
        font[size="3"] { font-size: 16px; }
        font[size="4"] { font-size: 20px; }
        font[size="5"] { font-size: 24px; }
        font[size="6"] { font-size: 32px; }
        font[size="7"] { font-size: 48px; }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            z-index: 90;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- 상단 헤더 -->
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Smart Editor</h1>
                <p class="text-slate-500">표 생성 및 서식 지정이 가능한 에디터</p>
            </div>
            <button onclick="saveContent()" class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 flex items-center gap-2">
                저장하기
            </button>
        </header>

        <!-- 에디터 박스 -->
        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
            
            <!-- 툴바 -->
            <div class="bg-slate-50 border-b border-slate-200 p-3 flex flex-wrap gap-2 items-center">
                <!-- 기본 서식 -->
                <button onclick="execCmd('bold')" class="p-2 hover:bg-white rounded-lg border border-transparent hover:border-slate-200 transition-all" title="굵게"><b>B</b></button>
                <button onclick="execCmd('italic')" class="p-2 hover:bg-white rounded-lg border border-transparent hover:border-slate-200 transition-all" title="기울임"><i>I</i></button>
                <button onclick="execCmd('underline')" class="p-2 hover:bg-white rounded-lg border border-transparent hover:border-slate-200 transition-all" title="밑줄"><u>U</u></button>

                <div class="w-px h-6 bg-slate-300 mx-1"></div>

                <!-- 폰트 크기 -->
                <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl border border-slate-200 text-sm">
                    <span class="text-slate-400 font-bold">Size</span>
                    <select onchange="execCmd('fontSize', this.value)" class="outline-none bg-transparent cursor-pointer font-semibold">
                        <option value="3">기본</option>
                        <option value="1">매우 작게</option>
                        <option value="2">작게</option>
                        <option value="4">조금 크게</option>
                        <option value="5">크게</option>
                        <option value="6">매우 크게</option>
                        <option value="7">최대</option>
                    </select>
                </div>

                <!-- 색상 -->
                <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl border border-slate-200 text-sm">
                    <span class="text-slate-400 font-bold">Color</span>
                    <input type="color" onchange="execCmd('foreColor', this.value)" class="w-6 h-6 p-0 border-none bg-transparent cursor-pointer rounded-md">
                </div>

                <div class="w-px h-6 bg-slate-300 mx-1"></div>

                <!-- 표 삽입 버튼 -->
                <button onclick="toggleTableModal()" class="flex items-center gap-2 bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-xl font-bold hover:bg-indigo-100 transition-all">
                    <span>+</span> 표 삽입
                </button>
            </div>

            <!-- 편집 영역 -->
            <div id="editor" contenteditable="true" class="p-8 md:p-12 focus:outline-none">
                <p>내용을 입력하세요...</p>
            </div>
        </div>
    </div>

    <!-- 표 설정 모달 -->
    <div id="overlay" class="overlay" onclick="toggleTableModal()"></div>
    <div id="tableModal" class="modal bg-white p-6 rounded-3xl shadow-2xl border border-slate-200 w-72">
        <h3 class="text-lg font-black text-slate-800 mb-4">표 생성 설정</h3>
        
        <div class="space-y-4 mb-6">
            <div class="flex justify-between items-center">
                <label class="text-sm font-bold text-slate-500">행(Rows)</label>
                <input type="number" id="rowInput" value="3" min="1" max="20" class="w-20 px-3 py-2 border border-slate-200 rounded-xl text-center outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="flex justify-between items-center">
                <label class="text-sm font-bold text-slate-500">열(Cols)</label>
                <input type="number" id="colInput" value="3" min="1" max="10" class="w-20 px-3 py-2 border border-slate-200 rounded-xl text-center outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
        </div>

        <div class="flex gap-2">
            <button onclick="toggleTableModal()" class="flex-1 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-all">취소</button>
            <button onclick="createTable()" class="flex-1 py-2.5 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">생성</button>
        </div>
    </div>

    <!-- 메시지 알림 -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold shadow-2xl transition-all opacity-0 pointer-events-none translate-y-4">
        내용이 저장되었습니다!
    </div>

    <script>
        // 명령어 실행 함수
        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('editor').focus();
        }

        // 모달 토글
        function toggleTableModal() {
            const modal = document.getElementById('tableModal');
            const overlay = document.getElementById('overlay');
            const isVisible = modal.style.display === 'block';

            modal.style.display = isVisible ? 'none' : 'block';
            overlay.style.display = isVisible ? 'none' : 'block';
        }

        // 표 생성 로직
        function createTable() {
            const rows = document.getElementById('rowInput').value;
            const cols = document.getElementById('colInput').value;

            let tableHtml = '<table>';
            for (let i = 0; i < rows; i++) {
                tableHtml += '<tr>';
                for (let j = 0; j < cols; j++) {
                    const isHeader = i === 0;
                    const cellBg = isHeader ? 'background-color: #f1f5f9; font-weight: bold;' : '';
                    tableHtml += `<td style="${cellBg}">&nbsp;</td>`;
                }
                tableHtml += '</tr>';
            }
            tableHtml += '</table><p><br></p>';

            execCmd('insertHTML', tableHtml);
            toggleTableModal();
        }

        // 저장 핸들러
        function saveContent() {
            const content = document.getElementById('editor').innerHTML;
            console.log('저장된 내용:', content);
            
            // 알림 표시
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 20px)';
            }, 2000);
        }

        // 초기 포커스
        window.onload = () => {
            document.getElementById('editor').focus();
        };
    </script>
</body>
</html>
