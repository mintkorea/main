<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성의교정 연차 관리 시스템</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            .no-print { display: none !important; }
            body { background: white; }
            #paper { box-shadow: none !important; width: 100% !important; margin: 0 !important; }
            table { font-size: 9px !important; width: 100% !important; }
        }
        body { margin: 0; padding: 20px; font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; }
        .container { display: flex; flex-direction: column; align-items: center; }
        #paper { background: white; padding: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.1); width: 287mm; }
        table { border-collapse: collapse; width: 100%; border: 1.5pt solid #000; table-layout: fixed; }
        td, th { border: 0.5pt solid #000; text-align: center; height: 25px; font-size: 11px; }
        .hdr { background: #f2f2f2 !important; font-weight: bold; }
        .b-right { border-right: 1.5pt solid #000 !important; }
        .sat { color: #007bff; }
        .sun { color: #dc3545; }
        .v-mark { background: #d4edda !important; color: #28a745; font-weight: bold; }
        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 9999; }
        .btn { padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-blue { background: #3498db; }
        .btn-green { background: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <div id="paper">
        <h2 id="viewTitle" style="text-align:center; text-decoration: underline;"></h2>
        <table id="displayTable"></table>
    </div>
</div>

<div class="controls no-print">
    <input type="month" id="targetMonth" onchange="render()">
    <button class="btn btn-green" onclick="exportToExcel()">엑셀 다운로드</button>
    <button class="btn btn-blue" onclick="window.print()">인쇄</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU",
        authDomain: "catholic-security-system.firebaseapp.com",
        projectId: "catholic-security-system",
        storageBucket: "catholic-security-system.firebasestorage.app",
        messagingSenderId: "978946205343",
        appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let staffData = [], vData = {};

    function initSync() {
        db.collection("vocation_app").doc("data").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                staffData = data.staff || [];
                vData = data.vocation || {};
                render();
            }
        });
    }

    function render() {
        const val = document.getElementById('targetMonth').value;
        if(!val) return;
        const [y, m] = val.split('-').map(Number);
        const lastDay = new Date(y, m, 0).getDate();

        document.getElementById('viewTitle').innerText = `성의교정 연차 일정표(${y}년 ${m}월)`;

        let h = `<thead><tr class="hdr"><td>구분</td><td>조</td><td>직위</td><td class="b-right">성명</td>`;
        for(let i=1; i<=lastDay; i++) h += `<th>${i}</th>`;
        h += `</tr></thead><tbody>`;

        staffData.forEach((s) => {
            h += `<tr><td>${s.g}</td><td>${s.s}</td><td>${s.p}</td><td class="b-right">${s.n}</td>`;
            const mk = `${y}-${String(m).padStart(2,'0')}`;
            const vArr = (vData[mk]?.[s.n] || "").split(',').map(v => v.trim());
            for(let i=1; i<=lastDay; i++) {
                const isV = vArr.includes(String(i));
                h += `<td class="${isV?'v-mark':''}">${isV?'V':''}</td>`;
            }
            h += `</tr>`;
        });
        document.getElementById('displayTable').innerHTML = h + `</tbody>`;
    }

    function exportToExcel() {
        const table = document.getElementById('displayTable');
        const wb = XLSX.utils.table_to_book(table, {sheet: "연차일정표"});
        const title = document.getElementById('viewTitle').innerText;
        XLSX.writeFile(wb, `${title}.xlsx`);
    }

    window.onload = function() {
        document.getElementById('targetMonth').value = "2026-05";
        initSync();
    };
</script>
</body>
</html>
